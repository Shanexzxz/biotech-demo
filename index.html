<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>BD Dataroom · Biotech Capital Intelligence</title>
  <style>
:root {
  color-scheme: dark;
  --bg: #060e16;
  --bg-raised: #0a141d;
  --surface: #0e1a24;
  --surface-2: #12212d;
  --surface-3: #182b39;
  --line: #14252f;
  --line-strong: #24404e;
  --text: #dce8ec;
  --text-strong: #f2f7f8;
  --muted: #8197a2;
  --muted-2: #607884;
  --cyan: #45d2c5;
  --cyan-soft: #173c40;
  --blue: #64a7ff;
  --amber: #e8aa3b;
  --amber-soft: #392d18;
  --violet: #a094f7;
  --violet-soft: #282442;
  --red: #e27378;
  --red-soft: #3a2026;
  --green: #69d393;
  --shadow: 0 20px 56px rgba(0, 0, 0, 0.4);
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
  --radius: 14px;
  --radius-sm: 10px;
  --sidebar: 190px;
  --topbar: 64px;
}

html[data-theme="light"] {
  color-scheme: light;
  --bg: #f4f6f8;
  --bg-raised: #fbfcfd;
  --surface: #ffffff;
  --surface-2: #f6f8fa;
  --surface-3: #eef2f5;
  --line: #edf0f3;
  --line-strong: #dde3e8;
  --text: #33424c;
  --text-strong: #0f1f28;
  --muted: #64757f;
  --muted-2: #8a99a2;
  --cyan: #0e8e87;
  --cyan-soft: #d8efed;
  --blue: #2f6fb8;
  --amber: #9a670f;
  --amber-soft: #f6ead0;
  --violet: #6556b4;
  --violet-soft: #e7e2f6;
  --red: #b8424a;
  --red-soft: #f5dfe1;
  --green: #267b4c;
  --shadow: 0 20px 56px rgba(23, 52, 64, 0.12);
  --shadow-sm: 0 1px 2px rgba(15, 31, 40, 0.04), 0 2px 8px rgba(15, 31, 40, 0.05);
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

button,
input,
select {
  font: inherit;
}

button,
a,
select,
input {
  -webkit-tap-highlight-color: transparent;
}

button {
  color: inherit;
}

a {
  color: var(--cyan);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

button:focus-visible,
a:focus-visible,
select:focus-visible,
input:focus-visible,
[tabindex]:focus-visible {
  outline: 2px solid var(--amber);
  outline-offset: 2px;
}

.skip-link {
  position: fixed;
  z-index: 1000;
  top: 8px;
  left: 8px;
  padding: 9px 12px;
  background: var(--text-strong);
  color: var(--bg);
  transform: translateY(-160%);
}

.skip-link:focus {
  transform: translateY(0);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.topbar {
  position: sticky;
  z-index: 80;
  top: 0;
  height: var(--topbar);
  display: grid;
  grid-template-columns: var(--sidebar) minmax(0, 1fr) auto;
  align-items: center;
  border-bottom: 1px solid var(--line);
  background: var(--bg-raised);
}

.brand-block {
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 0 20px;
  border-right: 1px solid var(--line);
}

.brand-name {
  color: var(--text-strong);
  font-size: 16px;
  font-weight: 720;
  letter-spacing: 0.02em;
}

.brand-sub {
  margin-top: 1px;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 0.035em;
  white-space: nowrap;
}

.snapshot-state,
.top-actions,
.view-status,
.regime-kicker,
.thesis-scope {
  display: flex;
  align-items: center;
  gap: 10px;
}

.snapshot-state {
  padding: 0 22px;
  color: var(--muted);
  font-size: 11px;
}

.live-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 16%, transparent);
}

.top-actions {
  padding-right: 18px;
}

.quiet-button,
.primary-button,
.filter-trigger {
  min-height: 36px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  color: var(--text);
  padding: 7px 12px;
  cursor: pointer;
}

.quiet-button:hover,
.filter-trigger:hover {
  border-color: var(--cyan);
  color: var(--text-strong);
}

.primary-button {
  border-color: var(--cyan);
  background: var(--cyan);
  color: #05201f;
  font-weight: 700;
}

.app-shell {
  display: grid;
  grid-template-columns: var(--sidebar) minmax(0, 1fr);
  min-height: calc(100vh - var(--topbar));
}

.sidebar {
  position: sticky;
  top: var(--topbar);
  height: calc(100vh - var(--topbar));
  padding: 20px 12px;
  border-right: 1px solid var(--line);
  background: var(--bg-raised);
}

.nav-section-label,
.eyebrow,
.status-label,
.panel-index,
.panel-scope,
.scope-badge,
.signal-card small,
.panel-heading p,
.reasoning-card > span,
.decision-spine article > span {
  font-size: 11px;
  letter-spacing: 0.075em;
  text-transform: uppercase;
}

.nav-section-label {
  margin: 0 8px 10px;
  color: var(--muted-2);
}

.nav-list {
  display: grid;
  gap: 0;
}

.nav-group {
  position: relative;
  display: grid;
  gap: 1px;
}
.nav-group + .nav-group {
  margin-top: 12px;
}
.nav-group-label {
  margin: 0 8px 5px;
  font-size: 11px;
  letter-spacing: 0.075em;
  text-transform: uppercase;
  color: var(--muted-2);
  font-weight: 600;
}
.nav-group-foundation .nav-group-label {
  color: var(--cyan);
}

.nav-button {
  width: 100%;
  min-height: 34px;
  padding: 0 10px;
  display: grid;
  grid-template-columns: 24px 1fr;
  align-items: center;
  gap: 6px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--muted);
  text-align: left;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-button span {
  color: var(--muted-2);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.nav-button:hover {
  color: var(--text);
  background: var(--surface);
}

.nav-button.active {
  border-color: var(--line-strong);
  background: var(--surface-2);
  color: var(--cyan);
}

.sidebar-contract {
  position: absolute;
  right: 16px;
  bottom: 18px;
  left: 16px;
  padding-top: 13px;
  border-top: 1px solid var(--line);
  display: grid;
  gap: 3px;
}

.sidebar-contract strong {
  color: var(--text);
  font-size: 11px;
}

.sidebar-contract span {
  color: var(--muted);
  font-size: 11px;
}

.main {
  min-width: 0;
  padding: 16px 16px 42px;
}

.view-head {
  min-height: 70px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.eyebrow {
  color: var(--cyan);
  font-weight: 700;
}

.view-head h1,
.market-regime-band h2,
.panel-heading h2,
.thesis-hero h2,
.foundation-hero h2,
.ontology-section h2,
.reconciliation-section h2,
.coverage-section h2,
.source-registry-section h2,
.release-gate-section h2,
.methods-summary h2 {
  margin: 4px 0 0;
  color: var(--text-strong);
  font-weight: 680;
  letter-spacing: -0.015em;
}

.view-head h1 {
  font-size: 24px;
}

.view-head p {
  max-width: 760px;
  margin: 4px 0 0;
  color: var(--muted);
}

.view-status {
  justify-content: flex-end;
  flex-wrap: wrap;
  color: var(--muted);
  font-size: 11px;
}

.scope-badge,
.status-label,
.panel-scope,
.tag {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  border: 1px solid var(--line-strong);
  border-radius: 999px;
  padding: 2px 8px;
  white-space: nowrap;
}

.scope-public,
.tag-verified {
  border-color: color-mix(in srgb, var(--cyan) 48%, var(--line));
  background: var(--cyan-soft);
  color: var(--cyan);
}

.scope-private {
  border-color: color-mix(in srgb, var(--violet) 48%, var(--line));
  background: var(--violet-soft);
  color: var(--violet);
}

.status-blocked,
.tag-conflicted {
  border-color: color-mix(in srgb, var(--red) 52%, var(--line));
  background: var(--red-soft);
  color: var(--red);
}

.status-referenced {
  border-color: color-mix(in srgb, var(--blue) 52%, var(--line));
  background: color-mix(in srgb, var(--blue) 14%, transparent);
  color: var(--blue);
}

.tag-partial,
.tag-stage {
  border-color: color-mix(in srgb, var(--amber) 45%, var(--line));
  background: var(--amber-soft);
  color: var(--amber);
}

.tag-type {
  color: var(--blue);
}

.market-regime-band {
  margin-top: 16px;
  display: grid;
  grid-template-columns: minmax(300px, 1.3fr) minmax(420px, 1fr);
  gap: 24px;
  align-items: center;
  padding: 15px 17px;
  border: 1px solid var(--line);
  border-left: 3px solid var(--cyan);
  background: var(--surface);
}

.market-regime-band h2 {
  font-size: 17px;
}

.market-regime-band p {
  margin: 5px 0 0;
  color: var(--muted);
}

.regime-metrics,
.methods-summary dl,
.library-metrics {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  margin: 0;
}

.regime-metrics div,
.methods-summary dl div,
.library-metrics div {
  padding: 2px 13px;
  border-left: 1px solid var(--line);
}

.regime-metrics dt,
.methods-summary dt,
.library-metrics dt {
  color: var(--muted);
  font-size: 11px;
}

.regime-metrics dd,
.methods-summary dd,
.library-metrics dd {
  margin: 2px 0 0;
  color: var(--text-strong);
  font-size: 21px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.global-filter-bar {
  display: flex;
  align-items: end;
  gap: 10px;
  padding: 12px 0 9px;
  border-bottom: 1px solid var(--line);
}

.filter-intro {
  min-width: 128px;
  display: grid;
}

.filter-intro strong {
  color: var(--text-strong);
}

.filter-intro span,
.filter-control span {
  color: var(--muted);
  font-size: 11px;
}

.filter-controls {
  min-width: 0;
  flex: 1;
  display: grid;
  grid-template-columns: repeat(5, minmax(105px, 1fr));
  gap: 7px;
}

.filter-control {
  min-width: 0;
  display: grid;
  gap: 3px;
}

.filter-control select {
  width: 100%;
  height: 34px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  padding: 4px 8px;
}

.filter-trigger {
  display: none;
}

.active-filter-chips {
  min-height: 34px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  color: var(--muted);
}

.active-filter-chips button,
.active-filter-chips > span,
.query-presets button {
  min-height: 26px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface);
  color: var(--muted);
  padding: 3px 9px;
}

.active-filter-chips button,
.query-presets button {
  cursor: pointer;
}

.mobile-dimension-switch {
  display: none;
}

.landscape-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr);
  gap: 12px;
  align-items: start;
}

.intelligence-grid {
  min-width: 0;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

/* 结构 + 地域 两栏辅助图区 */
.intelligence-grid-duo {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

/* 主图 hero：左图右表 */
.intel-panel-hero {
  height: auto;
}
.intel-panel-hero .hero-split {
  display: grid;
  grid-template-columns: minmax(0, 1.65fr) minmax(230px, 1fr);
  gap: 16px;
  align-items: start;
  margin-top: 8px;
}
.intel-panel-hero .hero-table .buyer-table-wrap {
  max-height: 300px;
}

/* 模态与靶点：单独一行宽卡，左矩阵 + 右靶点 Top5，拿到更大空间 */
.intel-panel-wide {
  height: auto;
}
.intel-panel-wide .modality-split {
  display: grid;
  grid-template-columns: minmax(0, 1.9fr) minmax(240px, 1fr);
  gap: 20px;
  align-items: start;
  margin-top: 8px;
}
.intel-panel-wide .modality-target-col {
  margin-top: 0;
  padding-top: 0;
  border-top: 0;
  border-left: 1px solid var(--line);
  padding-left: 20px;
}

/* 首页分析边界脚注：全景总结的诚实注脚 */
.landscape-boundary-note {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 14px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--muted) 7%, var(--surface));
}

.landscape-boundary-note p {
  margin: 0;
  flex: 1;
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
}

.landscape-boundary-note p strong {
  color: var(--text);
}

.landscape-boundary-note .boundary-flag {
  align-self: center;
}

.landscape-boundary-note .quiet-button {
  white-space: nowrap;
}

.intel-panel,
.signal-inbox,
  .decision-dock,
  .evidence-drawer,
  .buyer-profile-drawer,
  .thesis-query-bar,
.thesis-hero,
.reasoning-card,
.scenario-section,
.private-context-lock,
.thesis-comparables,
.foundation-hero,
.ontology-section,
.reconciliation-section,
.scope-boundary-grid article,
.library-hero,
.methods-summary,
.methods-policy-grid article,
.coverage-section,
.source-registry-section,
.release-gate-section,
.open-reconciliation-section,
.catalog-section,
.verification-queue {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow-sm);
}

.intel-panel {
  min-width: 0;
  height: 480px;
  overflow: hidden;
  padding: 18px;
}

.intelligence-grid-duo .intel-panel {
  height: 452px;
}

.panel-heading {
  display: grid;
  grid-template-columns: 1fr;
  gap: 5px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}

.panel-heading > div {
  display: flex;
  align-items: center;
  gap: 8px;
}

.panel-index {
  color: var(--cyan);
  font-variant-numeric: tabular-nums;
}

.panel-heading h2 {
  font-size: 16px;
}

.panel-heading p {
  margin: 0;
  color: var(--muted);
  text-transform: none;
  letter-spacing: 0;
  line-height: 1.5;
}

.panel-scope {
  width: max-content;
  justify-self: start;
  align-self: start;
  color: var(--muted);
}

.chart-frame {
  margin-top: 8px;
}

.buyer-scatter {
  display: block;
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  height: auto;
  min-height: 300px;
  overflow: visible;
}

.axis-line {
  stroke: var(--line-strong);
  stroke-width: 1;
}

.grid-line {
  stroke: var(--line);
  stroke-width: 1;
  stroke-dasharray: 2 4;
  opacity: 0.7;
}

.axis-tick {
  fill: var(--muted-2);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.axis-label,
.buyer-mark text {
  fill: var(--muted);
  font-size: 11px;
}

.axis-label {
  font-weight: 600;
  letter-spacing: 0.02em;
}

.buyer-mark {
  cursor: pointer;
}

.buyer-mark .buyer-name {
  font-weight: 600;
  fill: var(--text-strong);
  font-size: 11px;
  paint-order: stroke;
  stroke: var(--surface);
  stroke-width: 3px;
  stroke-linejoin: round;
}

/* 气泡：半透明填充 + 同色描边；颜色按买方国别×类型分组 */
.buyer-bubble {
  fill: color-mix(in srgb, var(--blue) 26%, transparent);
  stroke: color-mix(in srgb, var(--blue) 78%, transparent);
  stroke-width: 1.4;
  transition: r 0.14s ease;
}

.buyer-core {
  fill: color-mix(in srgb, var(--blue) 95%, var(--text-strong));
}

/* US_PHARMA 蓝 / EU_PHARMA 青 / *_BIOTECH 紫 / CHINA_* 红(涨色系, 强调中国出海) */
.buyer-mark.segment-eu-pharma .buyer-bubble { fill: color-mix(in srgb, var(--cyan) 26%, transparent); stroke: color-mix(in srgb, var(--cyan) 78%, transparent); }
.buyer-mark.segment-eu-pharma .buyer-core { fill: var(--cyan); }
.buyer-mark.segment-us-biotech .buyer-bubble,
.buyer-mark.segment-eu-biotech .buyer-bubble,
.buyer-mark.segment-other-biotech .buyer-bubble { fill: color-mix(in srgb, var(--violet) 28%, transparent); stroke: color-mix(in srgb, var(--violet) 78%, transparent); }
.buyer-mark.segment-us-biotech .buyer-core,
.buyer-mark.segment-eu-biotech .buyer-core,
.buyer-mark.segment-other-biotech .buyer-core { fill: var(--violet); }
.buyer-mark.segment-china-pharma .buyer-bubble,
.buyer-mark.segment-china-biotech .buyer-bubble { fill: color-mix(in srgb, var(--red) 26%, transparent); stroke: color-mix(in srgb, var(--red) 78%, transparent); }
.buyer-mark.segment-china-pharma .buyer-core,
.buyer-mark.segment-china-biotech .buyer-core { fill: var(--red); }
.buyer-mark.segment-other-pharma .buyer-bubble { fill: color-mix(in srgb, var(--muted) 26%, transparent); stroke: color-mix(in srgb, var(--muted) 70%, transparent); }
.buyer-mark.segment-other-pharma .buyer-core { fill: var(--muted); }

.buyer-mark:hover .buyer-bubble { stroke-width: 2.4; }

.buyer-mark.is-selected .buyer-bubble {
  stroke: var(--text-strong);
  stroke-width: 2.6;
}

.buyer-mark.is-undisclosed .buyer-bubble {
  fill: transparent;
  stroke: var(--muted);
  stroke-dasharray: 3 3;
}
.buyer-mark.is-undisclosed .buyer-core { fill: var(--muted); }

.buyer-mark .unknown-label {
  fill: var(--muted);
  font-size: 11px;
}

/* 气泡图图例 */
.bubble-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  margin-top: 8px;
  color: var(--muted);
  font-size: 11px;
}
.bubble-legend .bl-item { display: inline-flex; align-items: center; gap: 5px; }
.bubble-legend .bl-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
.bubble-legend .bl-dot.seg-us { background: var(--blue); }
.bubble-legend .bl-dot.seg-eu { background: var(--cyan); }
.bubble-legend .bl-dot.seg-biotech { background: var(--violet); }
.bubble-legend .bl-dot.seg-china { background: var(--red); }
.bubble-legend .bl-size { gap: 3px; }
.bubble-legend .bl-sz { display: inline-block; border-radius: 50%; background: color-mix(in srgb, var(--blue) 30%, transparent); border: 1px solid color-mix(in srgb, var(--blue) 70%, transparent); }
.bubble-legend .bl-sz-lg { width: 14px; height: 14px; }
.bubble-legend .bl-sz-sm { width: 8px; height: 8px; }

.chart-note,
.cell-value {
  color: var(--muted);
  font-size: 11px;
}

.chart-note {
  margin: 5px 0 0;
}

.compact-table-wrap,
.matrix-scroll,
.evidence-table-wrap {
  width: 100%;
  overflow: auto;
  scrollbar-color: var(--line-strong) transparent;
}

.buyer-table-wrap {
  max-height: 164px;
}

.matrix-scroll {
  max-height: 252px;
}

/* 模态宽卡：矩阵与靶点左右分栏，矩阵内滚放宽（宽卡高度自适应，不再被固定高度截断） */
#modality-rotation-panel .matrix-scroll {
  max-height: 320px;
}

.compact-table,
.evidence-table,
.modality-matrix {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

.compact-table th,
.compact-table td,
.evidence-table th,
.evidence-table td,
.modality-matrix th,
.modality-matrix td {
  padding: 8px 7px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
  text-align: left;
}

.compact-table th,
.evidence-table th,
.modality-matrix th {
  position: sticky;
  top: 0;
  z-index: 2;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.compact-table td span,
.evidence-table td span,
.source-registry-section td span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
}

.numeric {
  text-align: right !important;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.table-link,
.compact-table button,
.evidence-table button {
  border: 0;
  background: transparent;
  color: var(--cyan);
  padding: 0;
  text-align: left;
  cursor: pointer;
}

.cell-bar {
  width: 52px;
  height: 3px;
  display: inline-block !important;
  margin: 7px 6px 0 0 !important;
  background: var(--line);
  vertical-align: top;
}

.cell-bar span {
  height: 100%;
  margin: 0 !important;
  background: var(--cyan);
}

.cell-value {
  display: inline !important;
}

.structure-pulse {
  display: grid;
  gap: 6px;
  margin-top: 12px;
}

.structure-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 14px;
  color: var(--muted);
  font-size: 11px;
}

.structure-legend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.structure-legend i {
  width: 12px;
  height: 8px;
  border-radius: 2px;
  display: inline-block;
}

.structure-legend .lg-upfront { background: var(--cyan); }
.structure-legend .lg-contingent { background: var(--amber); opacity: 0.78; }
.structure-legend .lg-magnitude { background: color-mix(in srgb, var(--blue) 60%, transparent); }

.structure-trend {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 9px 11px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--blue) 9%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--blue) 22%, transparent);
  margin-bottom: 4px;
}
.structure-trend.trend-down { background: color-mix(in srgb, var(--green) 9%, var(--surface)); border-color: color-mix(in srgb, var(--green) 24%, transparent); }
.structure-trend .trend-arrow {
  font-size: 18px;
  line-height: 1;
  font-weight: 700;
  color: var(--blue);
}
.structure-trend.trend-down .trend-arrow { color: var(--green); }
.structure-trend p { margin: 0; font-size: 12px; line-height: 1.5; color: var(--muted); }
.structure-trend p b { color: var(--text-strong); font-variant-numeric: tabular-nums; }

.structure-year {
  min-height: 48px;
  display: grid;
  grid-template-columns: 40px minmax(56px, 1fr) 48px;
  grid-template-rows: auto auto;
  gap: 4px 8px;
  align-items: center;
  padding: 4px 6px;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  transition: background 0.14s ease, border-color 0.14s ease;
}

.structure-year:hover {
  border-color: var(--line-strong);
  background: var(--surface-2);
}

.structure-year-label,
.structure-ratio {
  color: var(--text-strong);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.structure-ratio {
  text-align: right;
}

.structure-bar {
  height: 8px;
  display: flex;
  border-radius: 2px;
  overflow: hidden;
  background: var(--line);
}

.structure-upfront {
  background: var(--cyan);
}

.structure-contingent {
  background: var(--amber);
  opacity: 0.78;
}

.structure-magnitude {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-self: end;
}

.magnitude-track {
  width: 52px;
  height: 6px;
  border-radius: 3px;
  background: var(--line);
  overflow: hidden;
}

.magnitude-fill {
  display: block;
  height: 100%;
  background: color-mix(in srgb, var(--blue) 60%, transparent);
}

.magnitude-value {
  color: var(--text);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.structure-meta {
  grid-column: 2 / 4;
  display: flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
}

.coverage-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  display: inline-block;
  background: var(--muted-2);
}

.coverage-dot[data-coverage="high"] { background: var(--green); }
.coverage-dot[data-coverage="mid"] { background: var(--amber); }
.coverage-dot[data-coverage="low"] { background: var(--red); }

.modality-matrix {
  margin-top: 10px;
}

.modality-matrix th:not(:first-child),
.modality-matrix td {
  text-align: center;
}

.modality-matrix th:first-child {
  min-width: 150px;
}

.modality-matrix th button {
  border: 0;
  background: transparent;
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.matrix-cell {
  width: 34px;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 2px;
  background: var(--bg-raised);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  cursor: pointer;
}

.matrix-cell[data-intensity="1"] { background: color-mix(in srgb, var(--green) 20%, var(--surface)); color: var(--text); }
.matrix-cell[data-intensity="2"] { background: color-mix(in srgb, var(--green) 42%, var(--surface)); color: var(--text-strong); }
.matrix-cell[data-intensity="3"] { background: color-mix(in srgb, var(--green) 66%, var(--surface)); color: var(--surface); }
.matrix-cell[data-intensity="4"] { background: var(--green); color: var(--surface); }

.modality-matrix tr.is-selected th,
.modality-matrix tr.is-selected td {
  background: color-mix(in srgb, var(--cyan) 8%, transparent);
}

.matrix-legend {
  display: flex;
  align-items: center;
  gap: 4px;
  margin: 10px 0 2px;
  color: var(--muted);
  font-size: 10.5px;
}

.matrix-legend i {
  width: 15px;
  height: 11px;
  border-radius: 2px;
  display: inline-block;
  border: 1px solid var(--line);
}

.matrix-legend i[data-intensity="1"] { background: color-mix(in srgb, var(--cyan) 18%, var(--surface)); }
.matrix-legend i[data-intensity="2"] { background: color-mix(in srgb, var(--cyan) 32%, var(--surface)); }
.matrix-legend i[data-intensity="3"] { background: color-mix(in srgb, var(--cyan) 50%, var(--surface)); }
.matrix-legend i[data-intensity="4"] { background: var(--cyan); }

.matrix-total {
  min-width: 78px;
}

.matrix-total-bar {
  width: 46px;
  height: 5px;
  border-radius: 3px;
  background: var(--line);
  display: inline-block;
  vertical-align: middle;
  margin-right: 6px;
  overflow: hidden;
}

.matrix-total-bar span {
  display: block;
  height: 100%;
  background: color-mix(in srgb, var(--cyan) 60%, transparent);
}

.matrix-total b {
  font-variant-numeric: tabular-nums;
  color: var(--text-strong);
}

.modality-matrix tr.matrix-foot th,
.modality-matrix tr.matrix-foot td {
  border-top: 1px solid var(--line-strong);
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  background: var(--surface-2);
}

.modality-matrix tr.matrix-foot th {
  color: var(--muted);
  font-weight: 600;
}

.panel-subsection {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}

.panel-subsection h3 {
  margin: 0 0 6px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.target-list {
  margin: 0;
  padding: 0;
  list-style: none;
}

.target-list li {
  display: grid;
  grid-template-columns: 22px minmax(0, 1fr) auto;
  gap: 7px;
  padding: 5px 0;
  border-bottom: 1px solid var(--line);
}

.target-list span,
.target-list em {
  color: var(--muted);
  font-size: 11px;
  font-style: normal;
}

.origin-flow-list {
  display: grid;
  gap: 5px;
  margin-top: 12px;
}

.origin-flow-row {
  min-height: 50px;
  display: grid;
  grid-template-columns: minmax(165px, 0.9fr) minmax(90px, 1fr) 42px;
  gap: 8px;
  align-items: center;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.origin-flow-row:hover,
.origin-flow-row.is-selected {
  border-color: var(--line-strong);
  background: var(--surface-2);
}

.flow-label {
  display: grid;
  grid-template-columns: 1fr 16px 1fr;
  align-items: center;
  gap: 4px;
}

.flow-label span {
  color: var(--muted);
  text-align: center;
}

.flow-track {
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  background: color-mix(in srgb, var(--violet) 14%, var(--line));
}

.flow-track span {
  display: block;
  height: 100%;
  border-radius: 4px;
  background: var(--violet);
}

.flow-value {
  text-align: right;
  color: var(--text-strong);
  font-variant-numeric: tabular-nums;
}

.signal-inbox {
  display: flex;
  flex-direction: column;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
}

.signal-lead {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 11.5px;
}

/* Thesis 页顶部：信号横向排列 */
.signal-list-row {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(240px, 1fr);
  gap: 8px;
  overflow-x: auto;
  scrollbar-color: var(--line-strong) transparent;
}

.signal-list-row .signal-card {
  min-height: 0;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
}

.signal-inbox > header,
.decision-dock > header,
.evidence-drawer > header,
.thesis-comparables > header,
.ontology-section > header,
.reconciliation-section > header,
.coverage-section > header,
.source-registry-section > header,
.release-gate-section > header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 12px 13px;
  border-bottom: 1px solid var(--line);
}

.signal-inbox h2,
.decision-dock h2,
.evidence-drawer h2,
.thesis-comparables h2,
.scenario-section h2,
.verification-queue h2 {
  margin: 2px 0 0;
  color: var(--text-strong);
  font-size: 16px;
}

.signal-count {
  color: var(--cyan);
  font-size: 20px;
  font-weight: 700;
}

/* 分析边界约束条：与可行动分析信号视觉/语义分区，不置顶抢占决策注意力 */
.boundary-band {
  padding: 8px 8px 0;
}

.boundary-note {
  width: 100%;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 9px;
  padding: 9px 10px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--muted) 8%, var(--surface));
  color: var(--text);
  text-align: left;
  cursor: pointer;
}

.boundary-note:hover,
.boundary-note.is-selected {
  border-color: var(--muted);
  background: color-mix(in srgb, var(--muted) 14%, var(--surface));
}

.boundary-flag {
  align-self: flex-start;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--surface-3);
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.boundary-copy {
  display: grid;
  gap: 2px;
  min-width: 0;
}

.boundary-copy strong {
  color: var(--text-strong);
  font-size: 12px;
  font-weight: 600;
}

.boundary-copy small {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
}

.boundary-state {
  align-self: flex-start;
  color: var(--muted-2);
  font-size: 11px;
  white-space: nowrap;
}

.signal-list-label {
  padding: 10px 10px 4px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.signal-list {
  min-height: 0;
  overflow: auto;
  padding: 4px 7px 7px;
}

/* 边界类型决策坞：中性色而非机会色 */
.decision-dock.is-boundary {
  border-color: var(--line-strong);
}

.decision-dock.is-boundary .decision-spine article > span {
  color: var(--muted);
}

.signal-card {
  width: 100%;
  min-height: 116px;
  display: grid;
  grid-template-columns: 28px minmax(0, 1fr) auto;
  gap: 8px;
  padding: 11px 8px;
  border: 1px solid transparent;
  border-bottom-color: var(--line);
  background: transparent;
  text-align: left;
  cursor: pointer;
}

.signal-card:hover,
.signal-card.is-selected {
  border-color: var(--line-strong);
  background: var(--surface-2);
}

.signal-rank {
  width: 25px;
  height: 25px;
  display: grid;
  place-items: center;
  border: 1px solid var(--cyan);
  border-radius: 50%;
  color: var(--cyan);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.signal-copy {
  min-width: 0;
  display: grid;
  gap: 4px;
}

.signal-copy strong {
  color: var(--text-strong);
  line-height: 1.35;
}

.signal-copy > span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.signal-copy small {
  color: var(--muted-2);
  text-transform: none;
  letter-spacing: 0;
}

.signal-state {
  align-self: start;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 2px 6px;
  color: var(--muted);
  font-size: 11px;
}

.signal-state.state-ready { color: var(--green); }
.signal-state.state-watch { color: var(--amber); }
.signal-state.state-blocked { color: var(--red); }

.signal-inbox footer {
  padding: 9px 12px;
  border-top: 1px solid var(--line);
  color: var(--muted);
  font-size: 11px;
}

.decision-dock-trigger {
  width: 100%;
  min-height: 42px;
  margin-top: 10px;
  border: 1px solid var(--amber);
  border-radius: var(--radius-sm);
  background: var(--amber-soft);
  color: var(--amber);
  font-weight: 700;
  cursor: pointer;
}

.decision-dock-trigger:disabled {
  border-color: var(--line);
  background: var(--surface);
  color: var(--muted-2);
  cursor: not-allowed;
}

.decision-dock {
  margin-top: 10px;
  border-color: color-mix(in srgb, var(--amber) 58%, var(--line));
  animation: dockReveal 0.28s ease;
}

@keyframes dockReveal {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (prefers-reduced-motion: reduce) {
  .decision-dock,
  .evidence-drawer {
    animation: none;
  }
}

.decision-spine {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  padding: 8px;
}

.decision-spine article {
  min-width: 0;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  gap: 7px;
  padding: 11px;
  border-right: 1px solid var(--line);
}

.decision-spine article:last-child {
  border-right: 0;
}

.decision-spine article > span {
  color: var(--amber);
}

.decision-spine article > strong {
  color: var(--text-strong);
  font-size: 12px;
  font-weight: 590;
  line-height: 1.55;
}

.decision-spine article small {
  color: var(--muted);
}

.dock-no-evidence {
  margin-top: auto;
  font-style: italic;
}

.decision-spine article button {
  margin-top: auto;
  align-self: flex-start;
  border: 0;
  background: transparent;
  color: var(--amber);
  padding: 0;
  cursor: pointer;
}

.evidence-drawer {
  position: fixed;
  z-index: 120;
  right: 16px;
  bottom: 16px;
  left: calc(var(--sidebar) + 16px);
  max-height: 72vh;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: drawerSlide 0.26s ease;
}

@keyframes drawerSlide {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.evidence-drawer > header p {
  margin: 3px 0 0;
  color: var(--muted);
}

.evidence-table-wrap {
  max-height: calc(72vh - 75px);
}

.evidence-table {
  min-width: 1220px;
}

.evidence-table .sticky-cell {
  position: sticky;
  left: 0;
  z-index: 1;
  background: var(--surface);
}

.atomic-terms,
.source-links {
  min-width: 330px;
  display: grid;
  gap: 3px;
  padding: 8px 0;
}

.row-detail summary {
  color: var(--cyan);
  cursor: pointer;
}

/* 买方表格里的画像入口 */
.profile-link {
  border: 1px solid var(--line-strong) !important;
  border-radius: var(--radius-sm);
  padding: 2px 9px !important;
  color: var(--cyan) !important;
  font-size: 11px;
  cursor: pointer;
}

.profile-link:hover {
  background: var(--cyan-soft);
}

/* 买方画像抽屉：右侧滑入 */
.buyer-profile-drawer {
  position: fixed;
  z-index: 130;
  top: calc(var(--topbar) + 12px);
  right: 16px;
  bottom: 16px;
  width: min(460px, calc(100vw - var(--sidebar) - 48px));
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: var(--shadow);
  animation: profileSlide 0.26s ease;
}

@keyframes profileSlide {
  from { opacity: 0; transform: translateX(24px); }
  to { opacity: 1; transform: translateX(0); }
}

.buyer-profile-drawer > header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--line);
}

.buyer-profile-drawer > header h2 {
  margin: 4px 0 2px;
  color: var(--text-strong);
  font-size: 19px;
}

.buyer-profile-drawer > header p {
  margin: 0;
  color: var(--muted);
  font-size: 11.5px;
}

.profile-body {
  flex: 1;
  overflow: auto;
  padding: 14px 16px 18px;
  display: grid;
  gap: 16px;
  scrollbar-color: var(--line-strong) transparent;
}

.profile-body h3 {
  margin: 0 0 8px;
  color: var(--text-strong);
  font-size: 12.5px;
}

.profile-metrics {
  display: grid;
  gap: 10px;
}

.profile-metrics > div {
  display: grid;
  gap: 4px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
}

.profile-metrics dt {
  color: var(--muted);
  font-size: 11px;
}

.profile-metrics dd {
  margin: 0;
  color: var(--text-strong);
  font-size: 15px;
  font-variant-numeric: tabular-nums;
}

.profile-metrics dd.chips {
  font-size: inherit;
}

.profile-metrics small {
  color: var(--muted-2);
  font-size: 10.5px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.pref-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--surface-2);
  color: var(--text);
  font-size: 11px;
}

.pref-chip em {
  color: var(--cyan);
  font-style: normal;
  font-variant-numeric: tabular-nums;
}

.pref-chip.is-empty {
  color: var(--muted-2);
}

.corridor-list {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 5px;
}

.corridor-list li {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  font-size: 11.5px;
}

.corridor-list li em {
  color: var(--cyan);
  font-style: normal;
  font-variant-numeric: tabular-nums;
}

.corridor-list li.is-empty {
  color: var(--muted-2);
  justify-content: flex-start;
}

.profile-blocked-note {
  margin: 0 0 8px;
  color: var(--muted);
  font-size: 11px;
}

.blocked-dimension-grid {
  display: grid;
  gap: 8px;
}

.blocked-dimension {
  padding: 10px 12px;
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--amber) 6%, var(--surface));
}

.blocked-dimension header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.blocked-dimension header span {
  color: var(--text-strong);
  font-weight: 600;
  font-size: 12px;
}

.blocked-dimension p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
}

.thesis-query-bar {
  margin-top: 16px;
  display: grid;
  gap: 12px;
  padding: 16px 18px;
}
.thesis-query-lead { display: grid; gap: 4px; }
.thesis-query-lead .query-eyebrow {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
  color: var(--violet);
}
.thesis-query-lead p { margin: 0; font-size: 12px; line-height: 1.6; color: var(--muted); }
.thesis-query-controls {
  display: grid;
  grid-template-columns: minmax(260px, 1fr) auto auto;
  gap: 10px;
  align-items: end;
}
.query-presets-label { align-self: center; font-size: 11px; color: var(--muted-2); margin-right: 2px; }

.thesis-query-bar label {
  display: grid;
  gap: 4px;
}

.thesis-query-bar label span {
  color: var(--muted);
  font-size: 11px;
}

.thesis-query-bar input {
  height: 40px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--bg-raised);
  color: var(--text);
  padding: 8px 10px;
}

.query-presets {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}

.thesis-hero {
  margin-top: 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 18px;
  padding: 17px;
  border-left: 3px solid var(--amber);
}

.thesis-hero.is-blocked {
  border-left-color: var(--red);
}

.thesis-hero h2 {
  font-size: 21px;
}

.thesis-hero p {
  max-width: 860px;
  margin: 7px 0 0;
  color: var(--text);
  font-size: 14px;
}

.conviction-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  border: 1px solid var(--line);
  border-top: 0;
}

.conviction-grid article {
  padding: 11px 13px;
  border-right: 1px solid var(--line);
  background: var(--surface-2);
}

.conviction-grid article:last-child {
  border-right: 0;
}

.conviction-grid span,
.conviction-grid p {
  color: var(--muted);
  font-size: 11px;
}

.conviction-grid strong {
  display: block;
  margin-top: 3px;
  color: var(--amber);
  font-size: 16px;
}

.conviction-grid p {
  margin: 4px 0 0;
}

.reasoning-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 8px;
  margin-top: 10px;
}

.reasoning-card {
  min-height: 165px;
  padding: 12px;
  border-top: 2px solid var(--cyan);
}

.reasoning-card.inference { border-top-color: var(--amber); }
.reasoning-card.counter { border-top-color: var(--red); }
.reasoning-card.unknown { border-top-color: var(--muted); }
.reasoning-card.action { border-top-color: var(--green); }

.reasoning-card > span {
  color: var(--muted);
  font-weight: 700;
}

.reasoning-card p,
.reasoning-card li {
  color: var(--text);
  font-size: 12px;
  line-height: 1.58;
}

.reasoning-card ul,
.reasoning-card ol {
  margin: 8px 0 0;
  padding-left: 17px;
}

.scenario-section,
.private-context-lock,
.thesis-comparables,
.verification-queue {
  margin-top: 10px;
  padding: 14px;
}

.scenario-section header {
  margin-bottom: 10px;
}

.scenario-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.scenario-grid article {
  min-height: 144px;
  padding: 12px;
  border: 1px solid var(--line);
  background: var(--surface-2);
}

.scenario-grid strong {
  color: var(--amber);
  font-size: 15px;
}

.scenario-grid p {
  color: var(--text);
}

.scenario-grid span,
.scenario-grid small {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 11px;
}

.private-context-lock {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  border-color: color-mix(in srgb, var(--violet) 42%, var(--line));
}

.private-context-lock h2 {
  display: inline;
  margin: 0 0 0 8px;
  color: var(--violet);
  font-size: 15px;
}

.private-context-lock p {
  margin: 7px 0 0;
  color: var(--muted);
}

.private-context-lock > span {
  color: var(--violet);
  font-size: 11px;
  letter-spacing: 0.08em;
}

.thesis-comparables,
.scenario-section {
  padding: 0;
}

.thesis-comparables .compact-table-wrap {
  max-height: 420px;
}

.verification-queue ol {
  margin: 8px 0 0;
}

.foundation-hero,
.methods-summary,
.library-hero {
  margin-top: 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  padding: 17px;
  border-left: 3px solid var(--cyan);
}

.foundation-hero p,
.methods-summary p,
.library-hero p {
  margin: 6px 0 0;
  color: var(--muted);
}

.ontology-relations {
  margin-top: 8px;
}

.ontology-relations summary {
  padding: 8px 12px;
  color: var(--cyan);
  cursor: pointer;
  font-size: 12px;
}

/* AI + 人工核对责任链 */
.review-chain-section {
  margin-top: 10px;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: var(--radius);
}

.review-chain-section > header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
}

.review-chain-section header h2 {
  margin: 2px 0 0;
  color: var(--text-strong);
  font-size: 16px;
}

.review-chain-section header p {
  margin: 5px 0 0;
  color: var(--muted);
  font-size: 12px;
  max-width: 640px;
}

.review-stage-flow {
  display: flex;
  align-items: stretch;
  gap: 8px;
  padding: 14px;
  flex-wrap: wrap;
}

.review-stage {
  flex: 1;
  min-width: 150px;
  display: grid;
  gap: 4px;
  align-content: start;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

.review-stage.tone-ai { border-left: 3px solid var(--blue); }
.review-stage.tone-dual { border-left: 3px solid var(--cyan); }
.review-stage.tone-human { border-left: 3px solid var(--amber); }

.review-stage-en {
  color: var(--muted-2);
  font-size: 11px;
  letter-spacing: 0.04em;
}

.review-stage strong {
  color: var(--text-strong);
  font-size: 13px;
}

.review-stage b {
  color: var(--cyan);
  font-size: 22px;
  font-variant-numeric: tabular-nums;
}

.review-stage.tone-ai b { color: var(--blue); }
.review-stage.tone-human b { color: var(--amber); }

.review-stage small {
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
}

.review-arrow {
  align-self: center;
  color: var(--muted-2);
  font-size: 18px;
}

.review-agreement {
  padding: 0 14px 14px;
}

.agreement-bar {
  display: flex;
  height: 12px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--line);
}

.agreement-bar span { height: 100%; }
.agreement-bar .ag-agree, .agreement-legend i.ag-agree { background: var(--green); }
.agreement-bar .ag-resolved, .agreement-legend i.ag-resolved { background: var(--amber); }
.agreement-bar .ag-pending, .agreement-legend i.ag-pending { background: var(--muted-2); }

.agreement-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 16px;
  margin-top: 8px;
  color: var(--muted);
  font-size: 11px;
}

.agreement-legend span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.agreement-legend i {
  width: 11px;
  height: 11px;
  border-radius: 3px;
  display: inline-block;
}

.policy-attributed {
  border-color: color-mix(in srgb, var(--cyan) 40%, var(--line)) !important;
  background: color-mix(in srgb, var(--cyan) 6%, var(--surface)) !important;
}

/* 来源资料库 */
.library-tier-band {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.tier-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  cursor: pointer;
}

.tier-chip b {
  font-size: 16px;
  font-variant-numeric: tabular-nums;
}

.tier-chip.tier-t0 { border-left: 3px solid var(--cyan); }
.tier-chip.tier-t1 { border-left: 3px solid var(--blue); }
.tier-chip.tier-t1_attributed { border-left: 3px solid var(--amber); }
.tier-chip.is-active {
  background: var(--surface-3);
  border-color: var(--cyan);
}

.tier-chip.tier-reset {
  border-style: dashed;
  color: var(--muted);
}

.library-layout {
  display: grid;
  grid-template-columns: 248px minmax(0, 1fr);
  gap: 12px;
  margin-top: 12px;
  align-items: start;
}

.library-publishers {
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: var(--radius);
  padding: 12px;
  position: sticky;
  top: calc(var(--topbar) + 12px);
  max-height: calc(100vh - var(--topbar) - 40px);
  overflow: auto;
}

.library-publishers h3 {
  margin: 0 0 8px;
  color: var(--text-strong);
  font-size: 12.5px;
}

.library-publishers ul {
  margin: 0;
  padding: 0;
  list-style: none;
  display: grid;
  gap: 2px;
}

.pub-groups {
  display: grid;
  gap: 12px;
}

.pub-group {
  border-left: 2px solid var(--line-strong);
  padding-left: 8px;
}

.pub-group-issuer { border-left-color: var(--cyan); }
.pub-group-exchange { border-left-color: var(--blue); }
.pub-group-regulatory { border-left-color: var(--violet); }
.pub-group-database { border-left-color: var(--amber); }
.pub-group-media { border-left-color: var(--muted); }
.pub-group-research { border-left-color: var(--green); }

.pub-group-head {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 5px;
}

.pub-group-name {
  color: var(--text-strong);
  font-weight: 700;
  font-size: 12px;
}

.pub-group-en {
  color: var(--muted-2);
  font-size: 11px;
  flex: 1;
}

.pub-group-head b {
  color: var(--text-strong);
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}

.pub-row {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 42px 22px;
  align-items: center;
  gap: 6px;
  padding: 5px 6px;
  border: 0;
  border-radius: var(--radius-sm);
  background: transparent;
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font-size: 11.5px;
}

.pub-row:hover { background: var(--surface-2); }
.pub-row.is-active { background: var(--surface-3); }

.pub-name {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.pub-bar {
  height: 5px;
  border-radius: 3px;
  background: var(--line);
  overflow: hidden;
}

.pub-bar span {
  display: block;
  height: 100%;
  background: color-mix(in srgb, var(--cyan) 60%, transparent);
}

.pub-count {
  text-align: right;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

.library-toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.library-search,
.library-select {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 11px;
}

.library-search input,
.library-select select {
  min-height: 32px;
  padding: 4px 9px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
}

.library-search input { min-width: 240px; }

.library-count {
  margin-left: auto;
  color: var(--muted);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.library-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 10px;
}

.library-card {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
}

.library-card.tier-t0 { border-left: 3px solid var(--cyan); }
.library-card.tier-t1 { border-left: 3px solid var(--blue); }
.library-card.tier-t1_attributed { border-left: 3px solid var(--amber); }
.library-card.tier-discovery { border-left: 3px dashed var(--muted-2); }

.library-card header {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
}

.library-card header .lib-date {
  margin-left: auto;
}

.lib-tier {
  padding: 2px 7px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  background: var(--surface-3);
  color: var(--muted);
}

.lib-tier-t0 { color: var(--cyan); background: var(--cyan-soft); }
.lib-tier-t1_attributed { color: var(--amber); background: var(--amber-soft); }
.lib-tier-discovery { color: var(--muted); background: color-mix(in srgb, var(--muted) 14%, transparent); }

.lib-role {
  padding: 2px 7px;
  border-radius: 999px;
  font-size: 11px;
}

.lib-role-ingested { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
.lib-role-discovery { color: var(--muted); background: color-mix(in srgb, var(--muted) 12%, transparent); }
.lib-role-context { color: var(--muted-2); background: color-mix(in srgb, var(--muted-2) 12%, transparent); }

.lib-nodeal {
  color: var(--muted-2);
  font-size: 11px;
}

.lib-date {
  color: var(--muted-2);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}

.library-card h3 {
  margin: 0;
  font-size: 13px;
  line-height: 1.4;
}

.library-card h3 a {
  color: var(--text-strong);
}

.lib-meta {
  margin: 0;
  color: var(--muted);
  font-size: 11.5px;
}

.lib-meta strong { color: var(--text); }

.lib-foot {
  margin-top: auto;
  padding-top: 8px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.lib-deal-link {
  border: 0;
  background: transparent;
  color: var(--muted);
  padding: 0;
  text-align: left;
  cursor: pointer;
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.lib-deal-link:hover { color: var(--cyan); }

.lib-open {
  color: var(--cyan);
  font-size: 11.5px;
  white-space: nowrap;
}

.disc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.disc-tags span {
  font-size: 11px;
  color: var(--muted-2);
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  background: var(--surface-3);
}

/* 数据工作流 */
.pipeline-hero {
  margin-top: 16px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
  padding: 17px;
  border: 1px solid var(--line);
  border-left: 3px solid var(--cyan);
  background: var(--surface);
  border-radius: var(--radius);
}

.pipeline-hero h2 {
  margin: 2px 0 0;
  color: var(--text-strong);
  font-size: 17px;
}

.pipeline-hero p {
  margin: 6px 0 0;
  color: var(--muted);
  max-width: 720px;
}

.pipeline-flow {
  margin-top: 12px;
  display: grid;
  gap: 0;
}

.pipeline-stage {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  overflow: hidden;
}

.stage-collect { border-left: 3px solid var(--blue); }
.stage-govern { border-left: 3px solid var(--amber); }
.stage-model { border-left: 3px solid var(--violet); }
.stage-serve { border-left: 3px solid var(--cyan); }

.pipeline-stage > header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}

.stage-no {
  font-size: 18px;
  font-weight: 700;
  color: var(--cyan);
  font-variant-numeric: tabular-nums;
}

.pipeline-stage header h3 {
  margin: 0;
  color: var(--text-strong);
  font-size: 14px;
}

.pipeline-stage header span:not(.stage-no) {
  color: var(--muted);
  font-size: 11.5px;
}

.stage-body {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  padding: 14px;
}

.pipe-block {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

.pipe-block strong {
  display: block;
  color: var(--text-strong);
  font-size: 12.5px;
}

.pipe-block b {
  display: block;
  margin: 4px 0 2px;
  color: var(--cyan);
  font-size: 22px;
  font-variant-numeric: tabular-nums;
}

.pipe-block p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
}

.pipe-block-wide {
  grid-column: 1 / -1;
}

.access-radar {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin: 10px 0;
}

.access-col {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.access-head {
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--text);
  font-size: 11.5px;
  font-weight: 600;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--line);
}

.access-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}

.access-connected { background: var(--green); }
.access-available { background: var(--cyan); }
.access-pending { background: var(--amber); }

.ext-name {
  color: var(--muted);
  font-size: 11px;
  padding: 2px 0;
}

.ext-name.is-pending {
  color: var(--muted-2);
}

.stage-note {
  grid-column: 1 / -1;
  margin: 6px 0 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.5;
}

.pipe-arrow {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 6px 0;
  color: var(--muted-2);
  font-size: 15px;
}

.pipe-arrow span {
  font-size: 10.5px;
  letter-spacing: 0.05em;
}

.governance-rules {
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
}

.rule-card {
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

.rule-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.rule-head strong {
  color: var(--text-strong);
  font-size: 12.5px;
}

.rule-en {
  display: block;
  color: var(--muted-2);
  font-size: 11px;
  margin-top: 1px;
}

.rule-metric {
  display: block;
  margin: 6px 0 4px;
  color: var(--cyan);
  font-size: 15px;
  font-variant-numeric: tabular-nums;
}

.rule-card p {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
  line-height: 1.45;
}

.conf-tag {
  padding: 1px 7px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.conf-high { background: color-mix(in srgb, var(--green) 18%, var(--surface)); color: var(--green); }
.conf-medium { background: var(--amber-soft); color: var(--amber); }
.conf-low { background: var(--red-soft); color: var(--red); }

.human-gate {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin: 0 14px 14px;
  padding: 12px 14px;
  border: 1px dashed color-mix(in srgb, var(--amber) 50%, var(--line-strong));
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--amber) 7%, var(--surface));
}

.gate-icon {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--amber);
  color: var(--bg);
  font-weight: 700;
}

.human-gate strong {
  color: var(--text-strong);
  font-size: 12.5px;
}

.human-gate p {
  margin: 3px 0 0;
  color: var(--muted);
  font-size: 11.5px;
  line-height: 1.5;
}

/* 可信度打分规则引擎 */
.confidence-engine,
.validation-rules {
  margin: 0 14px 14px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
}

.confidence-engine {
  border-left: 3px solid var(--cyan);
}

.confidence-engine header h4,
.validation-rules header h4 {
  margin: 4px 0 6px;
  color: var(--text-strong);
  font-size: 13px;
}

.confidence-engine header p,
.validation-rules header p {
  margin: 0 0 12px;
  color: var(--muted);
  font-size: 11.5px;
  line-height: 1.55;
}

.conf-table-wrap,
.vr-table-wrap {
  overflow-x: auto;
}

.conf-table,
.vr-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11.5px;
}

.conf-table th,
.vr-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--muted);
  font-weight: 600;
  border-bottom: 1px solid var(--line-strong);
  white-space: nowrap;
}

.conf-table td,
.vr-table td {
  padding: 8px;
  border-bottom: 1px solid var(--line);
  vertical-align: top;
}

.conf-label strong,
.vr-dim strong {
  display: block;
  color: var(--text-strong);
  font-size: 12px;
}

.conf-label span,
.vr-dim span {
  color: var(--muted-2);
  font-size: 11px;
}

.conf-kind {
  white-space: nowrap;
  color: var(--muted);
}

.conf-rule.is-base .conf-kind {
  color: var(--cyan);
  font-weight: 600;
}

.conf-rule.is-bonus .conf-kind {
  color: var(--amber);
  font-weight: 600;
}

.conf-score {
  white-space: nowrap;
}

.conf-bar {
  display: inline-block;
  width: 54px;
  height: 6px;
  border-radius: 3px;
  background: var(--line);
  overflow: hidden;
  vertical-align: middle;
  margin-right: 6px;
}

.conf-bar span {
  display: block;
  height: 100%;
  background: var(--cyan);
}

.conf-rule.is-bonus .conf-bar span {
  background: var(--amber);
}

.conf-score b {
  color: var(--text-strong);
  font-variant-numeric: tabular-nums;
}

.conf-trigger {
  color: var(--muted);
  min-width: 180px;
}

.conf-hits b {
  color: var(--text-strong);
  font-variant-numeric: tabular-nums;
}

.promo-paths {
  margin-top: 12px;
}

.promo-title {
  display: block;
  color: var(--muted);
  font-size: 11px;
  margin-bottom: 6px;
}

.promo-paths ul {
  margin: 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.promo-path {
  display: grid;
  grid-template-columns: minmax(140px, 1.3fr) minmax(0, 2fr) auto;
  gap: 10px;
  align-items: center;
  padding: 8px 10px;
  border-radius: var(--radius-sm);
  font-size: 11.5px;
  border: 1px solid var(--line);
}

.promo-path.reaches {
  border-color: color-mix(in srgb, var(--green) 45%, var(--line));
  background: color-mix(in srgb, var(--green) 7%, transparent);
}

.promo-path.blocked {
  border-color: color-mix(in srgb, var(--muted) 30%, var(--line));
  background: var(--surface);
}

.promo-name {
  color: var(--text-strong);
  font-weight: 600;
}

.promo-combo {
  color: var(--muted-2);
  font-size: 11px;
}

.promo-total {
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}

.promo-path.reaches .promo-total {
  color: var(--green);
}

.promo-path.blocked .promo-total {
  color: var(--muted);
}

.validation-rules {
  border-left: 3px solid var(--violet);
}

.vr-count b {
  color: var(--text-strong);
  font-variant-numeric: tabular-nums;
}

.vr-rule {
  color: var(--muted);
  line-height: 1.5;
}

.vr-gate-tag {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--violet) 14%, transparent);
  color: var(--violet);
  font-size: 11px;
  white-space: nowrap;
}

/* 建模层数据资产预览 */
.modeling-assets {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  padding: 0 14px 14px;
}

.asset-dim {
  display: flex;
  flex-direction: column;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  overflow: hidden;
}

.asset-dim.dim-deal { border-left: 3px solid var(--cyan); }
.asset-dim.dim-org { border-left: 3px solid var(--blue); }
.asset-dim.dim-asset { border-left: 3px solid var(--violet); }
.asset-dim.dim-target { border-left: 3px solid var(--amber); }

.asset-dim > header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
}

.asset-dim > header strong {
  display: block;
  color: var(--text-strong);
  font-size: 12.5px;
}

.asset-dim > header span {
  color: var(--muted);
  font-size: 11px;
}

.asset-dim > header b {
  color: var(--text-strong);
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.asset-samples {
  margin: 0;
  padding: 6px 12px;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0;
  flex: 1;
}

.asset-samples li {
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--line);
  font-size: 11.5px;
}

.asset-samples li:last-child {
  border-bottom: none;
}

.as-id {
  color: var(--muted-2);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

.as-name {
  color: var(--text-strong);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.as-sub {
  grid-column: 2;
  grid-row: 2;
  color: var(--muted);
  font-size: 11px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.asset-status {
  grid-row: 1 / span 2;
  padding: 1px 6px;
  border-radius: 999px;
  font-size: 11px;
  white-space: nowrap;
  background: var(--surface-3);
  color: var(--muted);
}

.asset-status.status-normalized { color: var(--green); background: color-mix(in srgb, var(--green) 14%, transparent); }
.asset-status.status-source_named { color: var(--muted); background: color-mix(in srgb, var(--muted) 12%, transparent); }
.asset-status.status-portfolio_record { color: var(--amber); background: color-mix(in srgb, var(--amber) 14%, transparent); }

.modality-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 4px 12px 0;
}

.modality-chips span {
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--amber) 12%, transparent);
  color: var(--amber);
}

.asset-dim > footer {
  padding: 8px 12px;
  border-top: 1px solid var(--line);
  margin-top: auto;
}

.asset-more {
  border: none;
  background: none;
  color: var(--cyan);
  font-size: 11.5px;
  cursor: pointer;
  padding: 0;
}

.asset-more:hover {
  text-decoration: underline;
}

.asset-note {
  color: var(--muted-2);
  font-size: 11px;
}

@media (max-width: 760px) {
  .modeling-assets {
    grid-template-columns: 1fr;
  }
}

.serve-block {
  cursor: pointer;
  transition: border-color 0.14s ease, background 0.14s ease;
}

.serve-block:hover {
  border-color: var(--cyan);
  background: color-mix(in srgb, var(--cyan) 8%, var(--surface-2));
}

/* 数据血缘图 */
.lineage-section {
  margin-top: 14px;
  border: 1px solid var(--line);
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
}

.lineage-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 20px;
}

.lineage-head h2 {
  margin: 4px 0 0;
  font-size: 15px;
  color: var(--text-strong);
}

.lineage-head p {
  margin: 0;
  max-width: 420px;
  color: var(--muted);
  font-size: 11.5px;
  line-height: 1.5;
}

.lineage-cols-label {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 26px;
  margin: 14px 0 4px;
  color: var(--muted-2);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.02em;
}

.lineage-scroll {
  overflow-x: auto;
}

.lineage-svg {
  display: block;
  width: 100%;
  min-width: 660px;
  max-width: 820px;
  margin: 0 auto;
  height: auto;
}

.lin-node {
  fill: var(--surface-2);
  stroke: var(--line-strong);
  stroke-width: 1;
}

.lin-base { fill: color-mix(in srgb, var(--cyan) 7%, var(--surface-2)); stroke: color-mix(in srgb, var(--cyan) 40%, var(--line)); }
.lin-metric { fill: color-mix(in srgb, var(--violet) 8%, var(--surface-2)); stroke: color-mix(in srgb, var(--violet) 42%, var(--line)); }
.lin-conc { fill: color-mix(in srgb, var(--amber) 9%, var(--surface-2)); stroke: color-mix(in srgb, var(--amber) 48%, var(--line)); }

.lin-title {
  fill: var(--text-strong);
  font-size: 12px;
  font-weight: 700;
}

.lin-sub {
  fill: var(--muted);
  font-size: 11px;
}

.lin-fn {
  fill: var(--violet);
  font-size: 11px;
  font-family: var(--mono, monospace);
}

.lin-rule {
  fill: var(--muted-2);
  font-size: 11px;
}

.lineage-edge {
  fill: none;
  stroke-width: 1.4;
}

.lineage-edge.e-base { stroke: color-mix(in srgb, var(--cyan) 45%, transparent); }
.lineage-edge.e-metric { stroke: color-mix(in srgb, var(--amber) 55%, transparent); }

.lin-conc-g {
  cursor: pointer;
}

.lin-conc-g:hover .lin-conc {
  stroke: var(--amber);
  stroke-width: 1.6;
}


.ontology-section,
.reconciliation-section,
.coverage-section,
.source-registry-section,
.release-gate-section,
.open-reconciliation-section,
.catalog-section {
  margin-top: 10px;
}

.ontology-section header p,
.reconciliation-section header p,
.source-registry-section header p {
  margin: 3px 0 0;
  color: var(--muted);
}

.ontology-layers {
  display: grid;
  grid-template-columns: repeat(5, minmax(190px, 1fr));
  gap: 7px;
  padding: 10px;
  overflow: auto;
}

.ontology-layer {
  border: 1px solid var(--line);
  background: var(--surface-2);
}

.ontology-layer > div,
.ontology-layer section {
  padding: 8px;
  border-bottom: 1px solid var(--line);
}

.ontology-layer > div {
  display: flex;
  justify-content: space-between;
  color: var(--cyan);
}

.ontology-layer section {
  display: grid;
  gap: 2px;
}

.ontology-layer section > span,
.ontology-layer section small,
.ontology-layer section em {
  color: var(--muted);
  font-size: 11px;
  font-style: normal;
}

.scope-boundary-grid,
.methods-policy-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 10px;
}

.scope-boundary-grid article,
.methods-policy-grid article {
  padding: 14px;
}

.scope-boundary-grid h3,
.methods-policy-grid h3 {
  margin: 8px 0 0;
  color: var(--text-strong);
  font-size: 15px;
}

.scope-boundary-grid p,
.methods-policy-grid p {
  margin: 5px 0 0;
  color: var(--muted);
}

.methods-summary {
  display: grid;
  grid-template-columns: minmax(260px, 1fr) minmax(420px, 1fr);
  align-items: center;
}

.methods-policy-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.methods-policy-grid article > span {
  color: var(--cyan);
  font-size: 11px;
  letter-spacing: 0.07em;
}

.registry-table-wrap {
  max-height: 560px;
}

.release-gate-grid {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 7px;
  padding: 10px;
}

.release-gate-grid article {
  min-height: 150px;
  padding: 10px;
  border: 1px solid var(--line);
  background: var(--surface-2);
}

.release-gate-grid article.is-blocked {
  border-color: color-mix(in srgb, var(--red) 45%, var(--line));
}

.release-gate-grid strong,
.release-gate-grid span,
.release-gate-grid b {
  display: block;
}

.release-gate-grid strong {
  color: var(--cyan);
  font-size: 18px;
}

.release-gate-grid span {
  color: var(--text-strong);
}

.release-gate-grid b,
.release-gate-grid p {
  margin-top: 5px;
  color: var(--muted);
  font-size: 11px;
}

.blocked-use-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 10px 12px;
}

.blocked-use-list strong,
.blocked-use-list span {
  border: 1px solid var(--line);
  padding: 5px 8px;
  color: var(--muted);
  font-size: 11px;
}

.blocked-use-list strong {
  color: var(--red);
}

.open-reconciliation-section,
.catalog-section {
  padding: 13px;
}

.open-reconciliation-section article {
  display: grid;
  grid-template-columns: 190px 180px 1fr;
  gap: 10px;
  padding: 8px 0;
  border-top: 1px solid var(--line);
}

.open-reconciliation-section span,
.open-reconciliation-section p {
  margin: 0;
  color: var(--muted);
}

.catalog-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 6px;
  margin-top: 10px;
}

.catalog-grid a {
  min-width: 0;
  display: grid;
  padding: 8px;
  border: 1px solid var(--line);
  background: var(--surface-2);
}

.catalog-grid strong {
  overflow: hidden;
  color: var(--text);
  text-overflow: ellipsis;
  white-space: nowrap;
}

.catalog-grid span {
  color: var(--muted);
  font-size: 11px;
}

.empty-state {
  color: var(--muted);
}

@media (min-width: 1281px) {
  .modality-matrix th:not(:first-child),
  .modality-matrix td {
    padding-right: 4px;
    padding-left: 4px;
  }

  .modality-matrix th button {
    display: block;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .matrix-cell {
    padding: 0;
  }
}

@media (max-width: 1280px) {
  .intelligence-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .intelligence-grid-duo {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .intel-panel {
    height: 440px;
  }

  .intelligence-grid-duo .intel-panel {
    height: 430px;
  }

  .intel-panel-hero,
  .intel-panel-wide {
    height: auto;
  }

  .intel-panel-hero .hero-split {
    grid-template-columns: minmax(0, 1.5fr) minmax(210px, 1fr);
  }

  .intel-panel-wide .modality-split {
    grid-template-columns: minmax(0, 1.7fr) minmax(220px, 1fr);
  }

  .reasoning-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .catalog-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}

@media (max-width: 1080px) {
  :root {
    --sidebar: 184px;
  }

  .landscape-layout {
    grid-template-columns: 1fr;
  }

  .intelligence-grid-duo {
    grid-template-columns: 1fr;
  }

  .intelligence-grid-duo .intel-panel {
    height: auto;
    min-height: 300px;
  }

  .intel-panel-hero .hero-split,
  .intel-panel-wide .modality-split {
    grid-template-columns: 1fr;
  }

  .intel-panel-wide .modality-target-col {
    margin-top: 12px;
    padding-top: 10px;
    padding-left: 0;
    border-top: 1px solid var(--line);
    border-left: 0;
  }

  .intel-panel-hero .hero-table .buyer-table-wrap {
    max-height: 220px;
  }

  .library-layout {
    grid-template-columns: 1fr;
  }

  .library-publishers {
    position: static;
    max-height: none;
  }

  .signal-inbox {
    position: static;
    max-height: none;
  }

  .signal-list {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .market-regime-band,
  .methods-summary {
    grid-template-columns: 1fr;
  }

  .decision-spine {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .decision-spine article:nth-child(2) {
    border-right: 0;
  }

  .decision-spine article:nth-child(-n + 2) {
    border-bottom: 1px solid var(--line);
  }
}

@media (max-width: 760px) {
  :root {
    --topbar: 58px;
  }

  body {
    font-size: 13px;
  }

  .topbar {
    grid-template-columns: minmax(0, 1fr) auto;
  }

  .brand-block {
    border-right: 0;
    padding: 0 14px;
  }

  .brand-sub,
  .snapshot-state {
    display: none;
  }

  .top-actions {
    padding-right: 10px;
  }

  .quiet-button,
  .primary-button,
  .filter-trigger,
  .nav-button,
  .mobile-dimension-switch button,
  .decision-dock-trigger {
    min-height: 44px;
  }

  .app-shell {
    display: block;
  }

  .sidebar {
    position: fixed;
    z-index: 150;
    top: auto;
    right: 0;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 64px;
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line);
    border-right: 0;
    background: var(--bg-raised);
  }

  .nav-section-label,
  .sidebar-contract {
    display: none;
  }

  .nav-list {
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 3px;
  }

  .nav-button {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    padding: 3px;
    text-align: center;
    font-size: 11px;
  }

  .nav-button span {
    display: none;
  }

  .main {
    padding: 12px 10px 150px;
  }

  .view-head {
    min-height: 60px;
    gap: 10px;
    padding-bottom: 10px;
  }

  .view-head h1 {
    font-size: 19px;
  }

  .view-head p,
  .view-status .freshness {
    display: none;
  }

  .view-status {
    max-width: 110px;
  }

  .market-regime-band {
    margin-top: 10px;
    display: block;
    padding: 13px;
  }

  .market-regime-band h2 {
    font-size: 16px;
  }

  .regime-metrics {
    margin-top: 12px;
    grid-template-columns: repeat(4, minmax(0, 1fr));
  }

  .regime-metrics div {
    padding: 2px 7px;
  }

  .regime-metrics dd {
    font-size: 18px;
  }

  .global-filter-bar {
    align-items: center;
    padding: 8px 0;
  }

  .filter-intro {
    flex: 1;
  }

  .filter-trigger {
    display: inline-flex;
    align-items: center;
  }

  .filter-controls {
    position: fixed;
    z-index: 210;
    right: 0;
    bottom: 0;
    left: 0;
    display: none;
    grid-template-columns: 1fr;
    gap: 10px;
    max-height: 76vh;
    overflow: auto;
    padding: 18px 14px calc(82px + env(safe-area-inset-bottom));
    border-top: 1px solid var(--line-strong);
    background: var(--surface);
    box-shadow: var(--shadow);
  }

  .global-filter-bar.is-open .filter-controls {
    display: grid;
  }

  .filter-control select {
    height: 44px;
  }

  .active-filter-chips {
    min-height: 32px;
    overflow: auto;
    flex-wrap: nowrap;
  }

  .mobile-dimension-switch {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 4px;
    margin: 2px 0 8px;
    padding: 4px;
    border: 1px solid var(--line);
    background: var(--surface);
  }

  .mobile-dimension-switch button {
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--muted);
  }

  .mobile-dimension-switch button.is-active {
    border-color: var(--cyan);
    background: var(--cyan-soft);
    color: var(--cyan);
  }

  .intelligence-grid {
    display: block;
  }

  .landscape-layout .intel-panel {
    display: none;
  }

  .landscape-layout .intel-panel.is-mobile-active {
    display: block;
  }

  .intel-panel-hero .hero-split {
    grid-template-columns: 1fr;
  }

  .intel-panel {
    height: auto;
    min-height: 470px;
    overflow: visible;
    padding: 11px;
  }

  .panel-scope {
    display: none;
  }

  .buyer-scatter {
    min-height: 230px;
  }

  .compact-table th:nth-child(n + 4),
  .compact-table td:nth-child(n + 4) {
    display: none;
  }

  .structure-year {
    grid-template-columns: 40px minmax(90px, 1fr) 48px;
  }

  .modality-matrix th:first-child {
    min-width: 128px;
  }

  .origin-flow-row {
    grid-template-columns: minmax(150px, 1fr) 70px 40px;
  }

  .signal-inbox {
    margin-top: 8px;
  }

  .signal-list {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
  }

  .signal-card {
    min-width: calc(100vw - 36px);
    display: grid;
    min-height: 126px;
    scroll-snap-align: start;
  }

  .decision-dock-trigger {
    position: fixed;
    z-index: 140;
    right: 10px;
    bottom: 72px;
    left: 10px;
    width: auto;
    margin: 0;
    box-shadow: var(--shadow);
  }

  .decision-dock {
    position: fixed;
    z-index: 200;
    right: 0;
    bottom: 64px;
    left: 0;
    max-height: 76vh;
    overflow: auto;
    margin: 0;
    box-shadow: var(--shadow);
  }

  .decision-spine {
    grid-template-columns: 1fr;
  }

  .decision-spine article {
    min-height: 130px;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .evidence-drawer {
    right: 0;
    bottom: 64px;
    left: 0;
    max-height: 80vh;
  }

  .evidence-table-wrap {
    max-height: calc(80vh - 75px);
  }

  .evidence-table {
    min-width: 0;
  }

  .evidence-table th:nth-child(n + 5):not(:last-child),
  .evidence-table td:nth-child(n + 5):not(:last-child) {
    display: none;
  }

  .buyer-profile-drawer {
    top: auto;
    right: 0;
    bottom: 64px;
    left: 0;
    width: auto;
    max-height: 82vh;
  }

  .thesis-query-controls {
    grid-template-columns: 1fr;
  }

  .thesis-query-bar input,
  .thesis-query-bar .primary-button {
    min-height: 44px;
  }

  .thesis-hero,
  .private-context-lock,
  .foundation-hero {
    display: block;
  }

  .thesis-scope,
  .private-context-lock > span {
    margin-top: 10px;
  }

  .conviction-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .conviction-grid article:nth-child(2) {
    border-right: 0;
  }

  .conviction-grid article:nth-child(-n + 2) {
    border-bottom: 1px solid var(--line);
  }

  .reasoning-grid,
  .scenario-grid,
  .scope-boundary-grid,
  .methods-policy-grid {
    grid-template-columns: 1fr;
  }

  .reasoning-card {
    min-height: auto;
  }

  .release-gate-grid {
    grid-template-columns: 1fr;
  }

  .release-gate-grid article {
    min-height: auto;
    border-right: 0;
    border-bottom: 1px solid var(--line);
  }

  .methods-summary {
    display: block;
  }

  .methods-summary dl {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    margin-top: 12px;
  }

  .ontology-layers {
    grid-template-columns: repeat(5, 210px);
  }

  .open-reconciliation-section article {
    grid-template-columns: 1fr;
  }

  .catalog-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    scroll-behavior: auto !important;
    transition-duration: 0.01ms !important;
  }
}

/* ===== 卡片式本体 DAG（底层数据如何变成投资结论） ===== */
.ontology-dag {
  margin-top: 18px;
  padding: 20px;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.odag-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 14px;
}
.odag-head .eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--green);
  text-transform: uppercase;
  font-weight: 700;
}
.odag-head h3 {
  margin: 4px 0 4px;
  font-size: 17px;
  color: var(--text-strong);
}
.odag-head p {
  margin: 0;
  font-size: 12px;
  color: var(--muted);
  max-width: 640px;
  line-height: 1.5;
}
.odag-stat {
  flex-shrink: 0;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  white-space: nowrap;
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
}
.odag-stat b { color: var(--text-strong); font-size: 12px; }

.odag-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--line);
}
.odl {
  position: relative;
  padding-left: 16px;
  font-size: 11px;
  color: var(--muted);
}
.odl::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 9px; height: 9px;
  border-radius: 3px;
}
.odl.st-built::before { background: var(--green); }
.odl.st-partial::before { background: var(--amber); }
.odl.st-derived::before { background: var(--blue); }
.odl.st-string::before { background: var(--violet); }
.odl.st-blocked::before { background: var(--red); }

.odag-scroll { overflow-x: auto; padding-bottom: 6px; }
.odag-grid {
  display: flex;
  align-items: stretch;
  gap: 0;
  min-width: max-content;
}
.odag-col {
  display: flex;
  flex-direction: column;
  width: 176px;
  flex-shrink: 0;
}
.odag-col-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 0 4px 10px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--line);
}
.odag-col-no {
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.06em;
}
.odag-col-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-strong);
  letter-spacing: 0.04em;
}
.odag-col-body { display: flex; flex-direction: column; gap: 12px; padding-top: 8px; }
.odag-flow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  flex-shrink: 0;
  color: var(--line-strong);
  font-size: 15px;
  padding-top: 40px;
}

.odag-card {
  position: relative;
  padding: 11px 12px 11px 15px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.odag-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.odag-card.type-drug::before { background: var(--cyan); }
.odag-card.type-org::before { background: var(--blue); }
.odag-card.type-evidence::before { background: var(--green); }
.odag-card.type-core::before { background: var(--muted-2); }
.odag-card:hover { border-color: var(--line-strong); transform: translateY(-1px); }
.odag-card.st-blocked { opacity: 0.82; border-style: dashed; }

.odag-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.odag-eid {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.odag-status {
  font-size: 11px;
  font-weight: 600;
