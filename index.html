        <div class="compact-table-wrap"><table class="compact-table"><thead><tr><th>Deal / Field</th><th>Canonical</th><th>Result</th><th>Decision</th><th>Status</th></tr></thead><tbody>${reconciliationRows}</tbody></table></div>
      </section>
      <section class="scope-boundary-grid"><article><span class="scope-badge scope-public">Public</span><h3>公开市场证据</h3><p>支持具名事实（Named Fact）、披露样本、观察到的意愿与交易机制解释。</p></article><article><span class="scope-badge scope-private">Private</span><h3>基金私有上下文</h3><p>Pipeline、CRM、Mandate、Portfolio Fit 与 Buyer Whitespace 保持权限隔离。</p></article></section>
      <p class="sr-only" id="app-live-region" aria-live="polite">已进入数据模型。</p>`;
  }

  // 可信度打分规则引擎：每条规则的加分、触发条件、当前命中量 + 入库达标路径。
  // 核心理念：可信度靠"多源印证"累加到入库线；单一来源(即使权威公众号)不足以直接满分入库。
  function renderConfidenceEngine(gov) {
    const maxScore = Math.max(...gov.confidenceRules.map(r => r.score));
    const rows = gov.confidenceRules.map(r => {
      const w = Math.round((r.score / maxScore) * 100);
      return `<tr class="conf-rule ${r.base ? 'is-base' : 'is-bonus'}">
        <td class="conf-label"><strong>${C.escapeHtml(r.label)}</strong><span>${C.escapeHtml(r.en)}</span></td>
        <td class="conf-kind">${r.base ? '基础分' : '叠加分'}</td>
        <td class="conf-score"><span class="conf-bar" aria-hidden="true"><span style="width:${w}%"></span></span><b>${r.base ? '' : '+'}${r.score}</b></td>
        <td class="conf-trigger">${C.escapeHtml(r.trigger)}</td>
        <td class="conf-hits"><b>${r.hits}</b> ${C.escapeHtml(r.unit)}</td>
      </tr>`;
    }).join('');
    const paths = gov.promotionPaths.map(p => `<li class="promo-path ${p.reaches ? 'reaches' : 'blocked'}">
      <span class="promo-name">${C.escapeHtml(p.name)}</span>
      <span class="promo-combo">${p.combo.join(' + ')}</span>
      <span class="promo-total">${p.total} 分 ${p.reaches ? `≥ ${gov.promotionThreshold} · 可入库` : `< ${gov.promotionThreshold} · 仅候选`}</span>
    </li>`).join('');
    return `<div class="confidence-engine" aria-label="可信度打分规则引擎">
      <header><span class="eyebrow">可信度打分引擎 · CONFIDENCE SCORING ENGINE</span><h4>可信度打分规则：多源印证累加至 ${gov.promotionThreshold}% 方可入库</h4>
        <p>每条来源/校验规则贡献可信度分。<strong>权威公众号是高基础分，但单源不入库</strong>——需叠加交叉比对 / 一手印证 / 人工终审累加到 ${gov.promotionThreshold} 分（≈100% 可信度）才写入正式交易库；否则保留为候选发现层。</p>
      </header>
      <div class="conf-table-wrap"><table class="conf-table">
        <thead><tr><th>规则</th><th>类型</th><th>可信度分</th><th>触发条件</th><th>当前命中</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
      <div class="promo-paths"><span class="promo-title">典型入库达标路径</span><ul>${paths}</ul></div>
    </div>`;
  }

  // 数据校验规则清单：把后台 34 条真实校验按维度显式列在界面上，可理解可追溯。
  function renderValidationRules(gov) {
    const rows = gov.validationRules.map(r => `<tr>
      <td class="vr-dim"><strong>${C.escapeHtml(r.dim)}</strong><span>${C.escapeHtml(r.en)}</span></td>
      <td class="vr-count"><b>${r.count}</b> 条</td>
      <td class="vr-rule">${C.escapeHtml(r.rule)}</td>
      <td class="vr-gate"><span class="vr-gate-tag">${C.escapeHtml(r.gate)}</span></td>
    </tr>`).join('');
    return `<div class="validation-rules" aria-label="数据校验规则清单">
      <header><span class="eyebrow">数据校验规则集 · VALIDATION RULEBOOK</span><h4>数据校验规则：${gov.totalValidationChecks} 条硬校验，构建时全量运行</h4>
        <p>这些规则每次构建自动执行；任一 FAIL 阻断发布。它们是"数据不造假"的机制保证——例如公众号来源的候选在技术上无法被自动晋升为正式事实。</p>
      </header>
      <div class="vr-table-wrap"><table class="vr-table">
        <thead><tr><th>校验维度</th><th>规则数</th><th>规则内容</th><th>闸门</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
  }

  // 建模层数据资产：把清洗归一后的四维实体以"计数 + 真实样本"直观展示，
  // 让用户看到"洗出来的数据资产"具体长什么样，而不只是数字。
  function renderModelingAssets(a) {
    const statusTag = s => s ? `<span class="asset-status status-${String(s).toLowerCase()}">${C.escapeHtml(assetStatusLabel(s))}</span>` : '';
    const sampleList = items => `<ul class="asset-samples">${items.map(it => `<li>
      <span class="as-id">${C.escapeHtml(it.id)}</span>
      <span class="as-name">${C.escapeHtml(it.name)}</span>
      <span class="as-sub">${C.escapeHtml(it.sub || '')}</span>
      ${it.status ? statusTag(it.status) : ''}
    </li>`).join('')}</ul>`;

    return `<div class="modeling-assets">
      <article class="asset-dim dim-deal">
        <header><div><strong>交易维度</strong><span>Deal · Term · Party · Asset</span></div><b>${a.deal.total}</b></header>
        ${sampleList(a.deal.sample)}
        <footer><button type="button" class="asset-more" data-goto-view="landscape">在自建管线分析四维视图中查看全部 →</button></footer>
      </article>
      <article class="asset-dim dim-org">
        <header><div><strong>公司维度</strong><span>买方 / 卖方 / 授权方主数据</span></div><b>${a.org.total}</b></header>
        ${sampleList(a.org.sample)}
        <footer><span class="asset-note">已归一主体，NER 消歧后的规范名</span></footer>
      </article>
      <article class="asset-dim dim-asset">
        <header><div><strong>资产维度</strong><span>Asset · Target · Modality</span></div><b>${a.asset.total}</b></header>
        ${sampleList(a.asset.sample)}
        <footer><span class="asset-note">资产→靶点→模态已结构化关联</span></footer>
      </article>
      <article class="asset-dim dim-target">
        <header><div><strong>靶点 / 模态维度</strong><span>${glossary('本体')}登记 ${T.ontology_entities.length} 实体 · ${T.ontology_relationships.length} 关系</span></div><b>${a.target.total} / ${a.target.modalityTotal}</b></header>
        ${sampleList(a.target.sample.slice(0, 5))}
        <div class="modality-chips">${a.target.modalities.map(m => `<span title="${C.escapeHtml(m.sub)}">${C.escapeHtml(m.name)}</span>`).join('')}</div>
        <footer><button type="button" class="asset-more" data-goto-view="foundation">在数据模型页查看图谱 →</button></footer>
      </article>
    </div>`;
  }

  function assetStatusLabel(s) {
    const map = {
      NORMALIZED: '已归一', SOURCE_NAMED: '源命名', PORTFOLIO_RECORD: '组合记录',
      RESOLVED: '已解析', PENDING: '待处理',
    };
    return map[s] || s;
  }

  // 详细卡片式本体 DAG：把 ontology_entities 按 layer 分成左→右五列，
  // 每个实体渲染成含 编号/状态/名称/语义类型/落地表/行数 的完整卡片，
  // 左→右为依赖方向。相较迷你图谱，这版直观展示"底层数据如何变成投资结论"。
  function renderOntologyDagMatrix() {
    const entities = T.ontology_entities.slice().sort((a, b) => Number(a.layer_order) - Number(b.layer_order));
    const layers = [...new Set(entities.map(e => Number(e.layer_order)))].sort((a, b) => a - b);
    const layerName = {};
    entities.forEach(e => { layerName[e.layer_order] = e.layer_name; });
    const relCount = (T.ontology_relationships || []).length;
    const blockedCount = entities.filter(e => /BLOCKED/i.test(e.status || '')).length;

    const statusMeta = st => {
      const key = String(st || '').toUpperCase();
      if (key === 'BLOCKED') return 'blocked';
      if (key === 'STRING_LEVEL') return 'string';
      if (key === 'DERIVED_DEMO') return 'derived';
      if (key.includes('PARTIAL') || key.includes('WITH_LIMIT')) return 'partial';
      return 'built';
    };
    // 状态卡展示文案：把内部枚举（SEED_BUILT / STRING_LEVEL / SEED_BUILT_WITH_LIMITS…）映射为
    // 与图例一致的中文短标，面向合伙人不露内部黑话，也避免长枚举被截断。
    const statusText = { built: '已构建', partial: '部分构建', derived: '派生示例', string: '字符串级', blocked: '受阻' };

    const col = layers.map((layer, ci) => {
      const inLayer = entities.filter(e => Number(e.layer_order) === layer);
      const cards = inLayer.map(e => {
        const type = ontologyGraphType(e.entity_id);
        const stCls = statusMeta(e.status);
        const table = (e.current_table && !/^No |Strings |Derived /i.test(e.current_table))
          ? C.escapeHtml(e.current_table)
          : C.escapeHtml(e.current_table || '—');
        const cnt = Number(e.current_count) || 0;
        const zeroCls = cnt === 0 ? ' is-zero' : '';
        return `<article class="odag-card type-${type} st-${stCls}${zeroCls}">
          <div class="odag-card-top">
            <span class="odag-eid">${C.escapeHtml(e.entity_id)}</span>
            <span class="odag-status st-${stCls}" title="${C.escapeHtml(e.status)}">${statusText[stCls] || '已构建'}</span>
          </div>
          <strong class="odag-name">${C.escapeHtml(e.entity_name)}</strong>
          <p class="odag-type">${C.escapeHtml(e.semantic_type)} · ${C.escapeHtml(e.grain)}</p>
          <div class="odag-card-foot">
            <code class="odag-table">${table}</code>
            <span class="odag-count">${cnt === 0 ? '—' : cnt}</span>
          </div>
        </article>`;
      }).join('');
      const no = String(ci + 1).padStart(2, '0');
      return `<div class="odag-col">
        <div class="odag-col-head"><span class="odag-col-no">${no}</span><span class="odag-col-name">${C.escapeHtml(layerName[layer] || ('Layer ' + layer))}</span></div>
        <div class="odag-col-body">${cards}</div>
      </div>`;
    }).join('<div class="odag-flow" aria-hidden="true">→</div>');

    return `
      <section class="ontology-dag" aria-label="底层数据如何变成投资结论：本体 DAG">
        <header class="odag-head">
          <div>
            <span class="eyebrow">${glossary('本体')}模型 · ONTOLOGY MODEL</span>
            <h3>底层数据如何变成投资结论</h3>
            <p>主图采用稳定的左到右 DAG，不使用力导向网络，避免每次打开位置漂移和关系交叉。绿色=已构建，黄色=部分构建，红色=被数据依赖阻塞。</p>
          </div>
          <div class="odag-stat"><b>${entities.length}</b> ENTITIES · <b>${relCount}</b> EDGES</div>
        </header>
        <div class="odag-legend" aria-hidden="true">
          <span class="odl st-built">已构建</span>
          <span class="odl st-partial">部分构建</span>
          <span class="odl st-derived">派生示例</span>
          <span class="odl st-string">字符串级</span>
          <span class="odl st-blocked">Blocked（待数据源）· ${blockedCount}</span>
        </div>
        <div class="odag-scroll">
          <div class="odag-grid">${col}</div>
        </div>
        <p class="chart-note">左→右为依赖方向：证据来源 → 归一实体 → 事件事实 → 分析层 → 决策产出。卡片左侧色条区分药物研发 / 机构关系 / 证据溯源三个子图谱；底部为该实体的落地表与真实行数。</p>
      </section>`;
  }

  function renderPipeline() {
    const ext = T.external_data_sources || [];
    // 全球分母解锁状态：区分"能真正提供去重全球普查分母的商业库"与"只能扩样本/交叉印证的免费源"。
    const denomKeywords = /denominator|census|league|market siz|forecast|deal_universe/i;
    const generalPrivateRe = /pitchbook|crunchbase|capital iq/i;
    // 通用私募库(PitchBook/Crunchbase/Capital IQ): 强在 VC/融资/跨行业 M&A, 不逐笔拆 BD 许可条款、无靶点模态、中国 out 弱——非对口, 单列。
    const generalPrivate = ext.filter(e => generalPrivateRe.test(e.source_name || ''));
    // 对口 BD 分母库: PENDING + 命中分母口径关键词, 且排除通用私募库(其 note 里的 NOT ... denominator 不应被误算)。
    const denomCommercial = ext.filter(e => e.access_status === 'PENDING_ACCESS' && !generalPrivateRe.test(e.source_name || '') && (denomKeywords.test(e.data_role || '') || denomKeywords.test(e.planned_fields || '') || denomKeywords.test(e.rate_or_rights_note || '')));
    const denomFreeCandidates = ext.filter(e => e.access_status === 'AVAILABLE_FREE' && /alliance|deal|licens/i.test(e.data_role || ''));
    const connected = ext.filter(e => e.access_status === 'CONNECTED');
    const availFree = ext.filter(e => e.access_status === 'AVAILABLE_FREE');
    const pending = ext.filter(e => e.access_status === 'PENDING_ACCESS');
    const t0Docs = T.source_documents.filter(d => String(d.source_tier).startsWith('T0')).length;
    const attributedDocs = T.source_documents.filter(d => tierGroup(d.source_tier) === 'T1_ATTRIBUTED').length;
    const rc = summary.review_chain || {};
    const transforms = T.transformation_runs || [];
    const totalIn = transforms.reduce((s, t) => s + (Number(t.input_count) || 0), 0);
    const totalAccepted = transforms.reduce((s, t) => s + (Number(t.accepted_count) || 0), 0);
    const totalRejected = transforms.reduce((s, t) => s + (Number(t.rejected_count) || 0), 0);
    const gov = M.governanceModel(T);
    const assets = M.modelingAssets(T);

    const accessTag = status => {
      const map = {
        CONNECTED: ['已接入', 'connected'],
        AVAILABLE_FREE: ['可免费接入', 'available'],
        PENDING_ACCESS: ['待连接授权', 'pending'],
      };
      const [label, cls] = map[status] || [status, 'other'];
      return `<span class="access-dot access-${cls}"></span>${label}`;
    };

    // 治理规则（用真实 transformation_runs + reconciliation + 核对链驱动）
    const governanceRules = [
      { name: '跨源交叉比对', en: 'Cross-source reconciliation', metric: `${T.reconciliation_results.length} 项`, desc: `announcement vs closing、${glossary('CVR')}、净现金等差异分开保存，不静默覆盖`, conf: 'HIGH' },
      { name: 'NER 主体消歧与对齐', en: 'Entity resolution', metric: `${summary.organizations} 组织 / ${summary.assets} 资产`, desc: '组织、资产、靶点别名归一到主数据，Identity before count', conf: 'HIGH' },
      { name: 'LLM 抽取与初判', en: 'LLM extraction', metric: `${rc.total || 0} 字段`, desc: 'AI 从来源文档抽取字段与证据定位，给出初判可信度', conf: 'MEDIUM' },
      { name: '规范化与口径校验', en: 'Normalization', metric: `${transforms.length} 个 transform`, desc: `${totalIn} 输入 → ${totalAccepted} 接受 / ${totalRejected} 拒绝，每步留 rule 版本`, conf: 'HIGH' },
    ];
    const confTag = c => `<span class="conf-tag conf-${c.toLowerCase()}">${c === 'HIGH' ? '高可信' : c === 'MEDIUM' ? '中可信' : '低可信'}</span>`;

    return `
      <section class="pipeline-hero">
        <div><span class="eyebrow">数据流水线 · DATA PIPELINE</span><h2>数据基建：采集 → 治理 → 建模 → 业务逻辑库</h2><p>这条端到端流水线本身就是能力证明：多源采集后经多规则清洗（交叉比对 / 实体消歧 / LLM 判断），每条规则产出可信度，人工做最后确认，再沉淀为维度模型与 ${glossary('ontology')}，最终服务四维分析。</p></div>
        <dl class="library-metrics">
          <div><dt>登记来源</dt><dd>${T.source_registry.length}</dd></div>
          <div><dt>三方库</dt><dd>${ext.length}</dd></div>
          <div><dt>清洗步骤</dt><dd>${transforms.length}</dd></div>
          <div><dt>字段核对</dt><dd>${rc.total || 0}</dd></div>
        </dl>
      </section>

      <div class="pipeline-flow">
        <!-- ① 采集层 -->
        <section class="pipeline-stage stage-collect">
          <header><span class="stage-no">01</span><div><h3>采集层 · Raw Data Base</h3><span>多源汇入，尚未清洗的原始材料</span></div></header>
          <div class="stage-body">
            <article class="pipe-block">
              <strong>一手来源</strong><b>${t0Docs}</b>
              <p>Issuer 公告 / 交易所文件 / 财报（${glossary('T0')}）</p>
            </article>
            <article class="pipe-block">
              <strong>带出处转述</strong><b>${attributedDocs}</b>
              <p>标注可核验出处的公众号（T1_ATTRIBUTED）</p>
            </article>
            <article class="pipe-block pipe-block-wide">
              <strong>三方专业垂直库 · 接入雷达</strong>
              <div class="access-radar">
                <div class="access-col"><span class="access-head">${accessTag('CONNECTED')} · ${connected.length}</span>${connected.map(e => `<span class="ext-name">${C.escapeHtml(e.source_name)}</span>`).join('')}</div>
                <div class="access-col"><span class="access-head">${accessTag('AVAILABLE_FREE')} · ${availFree.length}</span>${availFree.map(e => `<span class="ext-name">${C.escapeHtml(e.source_name)}</span>`).join('')}</div>
                <div class="access-col"><span class="access-head">${accessTag('PENDING_ACCESS')} · ${pending.length}</span>${pending.map(e => `<span class="ext-name is-pending">${C.escapeHtml(e.source_name)}</span>`).join('')}</div>
              </div>
              <p class="stage-note">免费接口（ClinicalTrials.gov / SEC / HKEX）已接入或可接入；商业库（Cortellis / 医药魔方 / GlobalData 等）长期要纳入但暂无 access，显式标「待连接授权」，不伪装成已有数据。</p>
            </article>
            <article class="pipe-block pipe-block-wide denominator-status">
              <strong>全球分母解锁状态 · 为什么份额/同比仍 Blocked</strong>
              <p class="denom-lead">「全球市场份额 / 同比」需要一个<b>去重、口径统一的全球交易总量（分母）</b>。免费源能扩充样本与交叉印证，但<b>给不出权威分母</b>——各家商业库口径本身也不一致。</p>
              <div class="denom-grid denom-grid-3">
                <div class="denom-col denom-can">
                  <span class="denom-head">免费源能做到（已/可接入）</span>
                  <p>核实单笔交易事实、扩充披露样本、交叉印证条款。</p>
                  <div class="denom-tags">${denomFreeCandidates.map(e => `<span class="ext-name">${C.escapeHtml(e.source_name)}</span>`).join('') || '<span class="ext-name">ClinicalTrials.gov / SEC / HKEX</span>'}</div>
                </div>
                <div class="denom-col denom-cannot">
                  <span class="denom-head">对口 BD 库·能解锁全球分母（待接入授权）</span>
                  <p>逐笔许可条款 + 靶点/模态 + 去重普查口径——解锁份额/同比的前置条件。</p>
                  <div class="denom-tags">${denomCommercial.map(e => `<span class="ext-name is-pending">${C.escapeHtml(e.source_name)}</span>`).join('')}</div>
                </div>
                <div class="denom-col denom-general">
                  <span class="denom-head">通用私募库·不对口本课题</span>
                  <p>强在 VC/融资/跨行业 M&A；不逐笔拆 BD 许可条款、无靶点模态、中国 out 弱。仅供买方融资背景参考，非条款/分母源。</p>
                  <div class="denom-tags">${generalPrivate.map(e => `<span class="ext-name is-general">${C.escapeHtml(e.source_name)}</span>`).join('') || '<span class="ext-name is-general">PitchBook / Crunchbase</span>'}</div>
                </div>
              </div>
              <p class="stage-note">结论：在接入上述任一商业普查库并核对口径前，全球份额/同比维持 Blocked；当前可诚实发布的是「披露样本内结构占比」（见 AI Thesis 分析边界）。</p>
            </article>
          </div>
        </section>
        <div class="pipe-arrow" aria-hidden="true"><span>清洗</span>↓</div>

        <!-- ② 治理层 -->
        <section class="pipeline-stage stage-govern">
          <header><span class="stage-no">02</span><div><h3>数据治理层 · 多规则清洗 + 可信度 + 人工确认</h3><span>每条规则产出可信度，分歧不静默抹平</span></div></header>
          <div class="stage-body governance-rules">
            ${governanceRules.map(r => `<article class="rule-card">
              <div class="rule-head"><strong>${C.escapeHtml(r.name)}</strong>${confTag(r.conf)}</div>
              <span class="rule-en">${C.escapeHtml(r.en)}</span>
              <b class="rule-metric">${C.escapeHtml(r.metric)}</b>
              <p>${C.escapeHtml(r.desc)}</p>
            </article>`).join('')}
          </div>
          <div class="human-gate">
            <span class="gate-icon" aria-hidden="true">✓</span>
            <div><strong>人工终审确认闸门</strong><p>AI 抽取 + 人工核对：${rc.agree || 0} 字段 AI 与人工一致，${rc.resolved_diff || 0} 项分歧经人工终审解决，${rc.pending || 0} 项待终审。只有通过确认的字段才进入下一层。</p></div>
          </div>
          ${renderConfidenceEngine(gov)}
          ${renderValidationRules(gov)}
        </section>
        <div class="pipe-arrow" aria-hidden="true"><span>solid data</span>↓</div>

        <!-- ③ 建模层 -->
        <section class="pipeline-stage stage-model">
          <header><span class="stage-no">03</span><div><h3>建模层 · 四维维度模型</h3><span>清洗归一后沉淀的数据资产（展示真实样本；本体图谱见数据模型页）</span></div></header>
          ${renderModelingAssets(assets)}
        </section>
        <div class="pipe-arrow" aria-hidden="true"><span>serve</span>↓</div>

        <!-- ④ 业务逻辑DB -->
        <section class="pipeline-stage stage-serve">
          <header><span class="stage-no">04</span><div><h3>业务逻辑数据库 · 服务最终分析</h3><span>沉淀为可复用的决策数据资产</span></div></header>
          <div class="stage-body">
            <article class="pipe-block serve-block" data-goto-view="landscape"><strong>自建管线分析（四维视图）</strong><p>买方活跃度 · 交易结构 · 模态靶点 · 资产地域</p></article>
            <article class="pipe-block serve-block" data-goto-view="thesis"><strong>AI Thesis 工作区</strong><p>信号 → 结构化 Thesis → 条件情景</p></article>
            <article class="pipe-block serve-block" data-goto-view="foundation"><strong>数据模型与审计</strong><p>${glossary('ontology')} / ${glossary('reconciliation')} / 核对责任链</p></article>
          </div>
        </section>

        ${renderDataLineage()}
      </div>
      <p class="sr-only" id="app-live-region" aria-live="polite">已进入数据工作流，展示采集到入库的端到端基建。</p>`;
  }

  // 数据血缘图：底表 → 派生指标 → 四维结论，说明分析结论如何从底表推导。
  function renderDataLineage() {
    const L = M.dataLineage(T);
    const colW = 210, gap = 26;
    const baseH = 46, metricH = 62, concH = 52, vGap = 10;
    const x0 = 8, x1 = x0 + colW + gap, x2 = x1 + colW + gap;
    // 纵向布局：三列各自居中
    const totalH = Math.max(
      L.baseTables.length * (baseH + vGap),
      L.metrics.length * (metricH + vGap) + 40,
      L.conclusions.length * (concH + vGap) + 40
    ) + 46;
    const layout = (arr, h, x) => {
      const blockH = arr.length * (h + vGap) - vGap;
      const top = 40 + (totalH - 46 - blockH) / 2;
      const m = {};
      arr.forEach((it, i) => { m[it.id] = { x, y: top + i * (h + vGap), h, cy: top + i * (h + vGap) + h / 2 }; });
      return m;
    };
    const baseP = layout(L.baseTables, baseH, x0);
    const metricP = layout(L.metrics, metricH, x1);
    const concP = layout(L.conclusions, concH, x2);
    const W = x2 + colW + 8;

    // 连线：底表→指标、指标→结论
    const edges = [];
    L.metrics.forEach(m => (m.from || []).forEach(b => { if (baseP[b]) edges.push([baseP[b], metricP[m.id], 'e-base']); }));
    L.conclusions.forEach(cc => (cc.from || []).forEach(mm => { if (metricP[mm]) edges.push([metricP[mm], concP[cc.id], 'e-metric']); }));
    const edgeSvg = edges.map(([a, b, cls]) => {
      const x1e = a.x + colW, y1e = a.cy, x2e = b.x, y2e = b.cy;
      const mx = (x1e + x2e) / 2;
      return `<path class="lineage-edge ${cls}" d="M${x1e} ${y1e} C${mx} ${y1e} ${mx} ${y2e} ${x2e} ${y2e}"></path>`;
    }).join('');

    const baseNodes = L.baseTables.map(t => {
      const p = baseP[t.id];
      return `<g transform="translate(${p.x} ${p.y})">
        <rect class="lin-node lin-base" width="${colW}" height="${baseH}" rx="6"></rect>
        <text class="lin-title" x="10" y="18">${C.escapeHtml(t.name)}</text>
        <text class="lin-sub" x="10" y="33">${C.escapeHtml(t.desc)} · ${t.rows} 行</text>
      </g>`;
    }).join('');
    const metricNodes = L.metrics.map(m => {
      const p = metricP[m.id];
      return `<g transform="translate(${p.x} ${p.y})">
        <rect class="lin-node lin-metric" width="${colW}" height="${metricH}" rx="6"></rect>
        <text class="lin-title" x="10" y="18">${C.escapeHtml(m.name)}</text>
        <text class="lin-fn" x="10" y="32">${C.escapeHtml(m.fn)}</text>
        <text class="lin-rule" x="10" y="49">${C.escapeHtml(m.rule.length > 30 ? m.rule.slice(0, 29) + '…' : m.rule)}</text>
      </g>`;
    }).join('');
    const concNodes = L.conclusions.map(cc => {
      const p = concP[cc.id];
      return `<g class="lin-conc-g" transform="translate(${p.x} ${p.y})" data-goto-view="${cc.view}" role="button" tabindex="0">
        <rect class="lin-node lin-conc" width="${colW}" height="${concH}" rx="6"></rect>
        <text class="lin-title" x="10" y="20">${C.escapeHtml(cc.name.split(' · ')[0])}</text>
        <text class="lin-sub" x="10" y="37">${C.escapeHtml(cc.name.split(' · ')[1] || '')}</text>
      </g>`;
    }).join('');

    return `
      <section class="lineage-section" aria-label="数据血缘：底表到分析结论">
        <header class="lineage-head">
          <div><span class="eyebrow">数据血缘 · DATA LINEAGE · 业务逻辑数据库</span><h2>从底表到分析结论的推导链路</h2></div>
          <p>每个四维结论都可追溯到它依赖的<strong>派生指标</strong>与<strong>底层数据表</strong>：底表经 join / 聚合算出指标，指标支撑结论。点结论卡可直接进入对应分析视图。</p>
        </header>
        <div class="lineage-cols-label"><span>① 业务底表</span><span>② 派生指标（model 纯函数）</span><span>③ 四维分析结论</span></div>
        <div class="lineage-scroll">
          <svg class="lineage-svg" viewBox="0 0 ${W} ${totalH}" role="img" aria-label="数据血缘图">
            ${edgeSvg}
            ${baseNodes}
            ${metricNodes}
            ${concNodes}
          </svg>
        </div>
        <p class="chart-note">底表行数为真实数据；派生指标对应 model 层同名纯函数；结论层即首页四维分析视图。</p>
      </section>`;
  }

  function tierGroup(tier) {
    if (String(tier).startsWith('T1_ATTRIBUTED')) return 'T1_ATTRIBUTED';
    if (String(tier).startsWith('T0')) return 'T0';
    if (String(tier).startsWith('T1')) return 'T1';
    return 'OTHER';
  }

  function tierLabel(group) {
    return { T0: '一手来源 T0', T1: '字段适配 T1', T1_ATTRIBUTED: '带出处转述 T1_ATTRIBUTED', OTHER: '其他' }[group] || group;
  }

  function renderLibrary() {
    const dealById = new Map(T.deals.map(d => [d.deal_id, d]));

    // 统一材料模型：入库证据(source_documents) + 发现层(discovery_results) 归一到同一列表。
    // 用分级标签(tier)与证据角色标签区分等级；"能否入库"的判断在数据工作流规则层生效，此处只集中展示。
    const items = [];
    T.source_documents.forEach(d => {
      const g = tierGroup(d.source_tier);
      items.push({
        tier: d.source_tier, tierGroup: g,
        role: g === 'T0' || g === 'T1_ATTRIBUTED' || g === 'T1' ? 'INGESTED' : 'INGESTED',
        title: d.title, publisher: d.publisher, date: d.published_date,
        url: d.url, meta: d.document_type, dealId: d.deal_id,
        deal: dealById.get(d.deal_id),
        haystack: `${d.title} ${d.publisher} ${d.deal_id} ${d.document_type} ${d.source_tier}`,
      });
    });
    (T.discovery_results || []).forEach(d => {
      const roleCtx = String(d.evidence_role || '').includes('DISCOVERY') ? 'DISCOVERY' : 'CONTEXT';
      items.push({
        tier: d.source_tier_candidate || 'T2', tierGroup: 'DISCOVERY',
        role: roleCtx,
        title: d.title, publisher: d.publisher, date: d.published_date || d.discovered_at,
        url: d.canonical_article_url || d.query_url || '', meta: String(d.matched_entities || '').split('|').slice(0, 3).join('、'),
        dealId: '', deal: null, topics: String(d.topic_tags || '').split('|').filter(Boolean).slice(0, 3),
        haystack: `${d.title} ${d.publisher} ${d.topic_tags} ${d.matched_entities} ${d.source_tier_candidate}`,
      });
    });

    // 分级标签定义（统一在库内打标签，而非割裂两个区块）
    const tierLabels = {
      T0: '一手来源', T1_ATTRIBUTED: '带出处转述', T1: 'T1 来源', DISCOVERY: '发现层线索',
    };
    const byTier = {};
    items.forEach(it => { byTier[it.tierGroup] = (byTier[it.tierGroup] || 0) + 1; });
    const ingestedCount = items.filter(it => it.tierGroup !== 'DISCOVERY').length;
    const discoveryCount = items.filter(it => it.tierGroup === 'DISCOVERY').length;
    const coveredDeals = new Set(items.filter(it => it.dealId).map(it => it.dealId)).size;

    const publishers = [...new Set(items.map(it => it.publisher))].sort((a, b) => a.localeCompare(b));
    const pubCounts = {};
    items.forEach(it => { pubCounts[it.publisher] = (pubCounts[it.publisher] || 0) + 1; });
    const topPublishers = Object.entries(pubCounts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
    const maxPub = Math.max(1, ...topPublishers.map(p => p[1]));

    // 发布方一级分类：按来源性质归类（用于侧栏一二级分组）
    const pubTiers = {};
    items.forEach(it => { (pubTiers[it.publisher] = pubTiers[it.publisher] || new Set()).add(it.tierGroup); });
    const pubCategory = (p) => {
      if (/HKEX|港交所|交易所/.test(p)) return 'EXCHANGE';
      if (/\bSEC\b|EDGAR|EMA|NMPA|FDA|证监会|监管/.test(p)) return 'REGULATORY';
      if (/魔方|PharmaCube|Pharmcube|Insight数据库|Insight数据|bydrug|药智数据|Cortellis|GlobalData|DealForma|PatentsView|ClinicalTrials|Citeline|Evaluate/.test(p)) return 'DATABASE';
      if (/证券|投研|资本|投行|律师|律所|大成|浩悦|植德|研究院|Advisory|Bank|Capital/.test(p)) return 'RESEARCH';
      const gs = pubTiers[p] || new Set();
      if (gs.has('T0') && !gs.has('DISCOVERY')) return 'ISSUER';
      if (gs.has('DISCOVERY') || gs.has('T1_ATTRIBUTED')) return 'MEDIA';
      if (gs.has('T0')) return 'ISSUER';
      return 'MEDIA';
    };
    const categoryMeta = {
      ISSUER: { label: '交易主体一手', en: 'Issuer / Counterparty' },
      EXCHANGE: { label: '交易所披露', en: 'Exchange filing' },
      REGULATORY: { label: '监管备案', en: 'Regulatory filing' },
      DATABASE: { label: '权威数据库', en: 'Professional database' },
      MEDIA: { label: '行业媒体 / 公众号', en: 'Industry media / WeChat' },
      RESEARCH: { label: '投研 / 专业机构', en: 'Research / Advisory' },
    };
    const categoryOrder = ['ISSUER', 'EXCHANGE', 'REGULATORY', 'DATABASE', 'MEDIA', 'RESEARCH'];
    const pubGroups = {};
    topPublishers.forEach(([p, n]) => { const cat = pubCategory(p); (pubGroups[cat] = pubGroups[cat] || []).push([p, n]); });
    const groupTotal = cat => (pubGroups[cat] || []).reduce((s, x) => s + x[1], 0);

    // 统一筛选（分级 / 发布方 / 搜索）
    const q = String(state.librarySearch || '').trim().toLowerCase();
    const filtered = items.filter(it => {
      if (state.libraryPublisher !== 'all' && it.publisher !== state.libraryPublisher) return false;
      if (state.libraryTier !== 'all' && it.tierGroup !== state.libraryTier) return false;
      if (q && !it.haystack.toLowerCase().includes(q)) return false;
      return true;
    }).sort((a, b) => String(b.date).localeCompare(String(a.date)));

    const tierOrder = ['T0', 'T1', 'T1_ATTRIBUTED', 'DISCOVERY'].filter(g => byTier[g]);
    const roleTag = it => {
      if (it.tierGroup === 'DISCOVERY') return `<span class="lib-role lib-role-${it.role.toLowerCase()}">${it.role === 'CONTEXT' ? '背景' : '发现层'}</span>`;
      return '<span class="lib-role lib-role-ingested">已入库</span>';
    };
    const cards = filtered.map(it => {
      const dealLabel = it.deal ? `${it.deal.buyer_or_partner} × ${it.deal.seller_or_partner}` : it.dealId;
      const tg = it.tierGroup.toLowerCase();
      return `<article class="library-card tier-${tg}">
        <header>
          <span class="lib-tier lib-tier-${tg}">${C.escapeHtml(it.tier)}</span>
          ${roleTag(it)}
          <span class="lib-date">${C.escapeHtml(it.date || '')}</span>
        </header>
        <h3>${it.url ? `<a href="${C.escapeHtml(it.url)}" target="_blank" rel="noreferrer">${C.escapeHtml(it.title)}</a>` : C.escapeHtml(it.title)}</h3>
        <p class="lib-meta"><strong>${C.escapeHtml(it.publisher)}</strong>${it.meta ? ` · ${C.escapeHtml(it.meta)}` : ''}</p>
        ${it.topics && it.topics.length ? `<div class="disc-tags">${it.topics.map(t => `<span>${C.escapeHtml(t)}</span>`).join('')}</div>` : ''}
        <div class="lib-foot">
          ${it.dealId ? `<button type="button" class="lib-deal-link" data-open-evidence="${C.escapeHtml(it.dealId)}">${C.escapeHtml(it.dealId)} · ${C.escapeHtml(dealLabel)}</button>` : '<span class="lib-nodeal">未回链具体交易</span>'}
          ${it.url ? `<a class="lib-open" href="${C.escapeHtml(it.url)}" target="_blank" rel="noreferrer">原文 ↗</a>` : ''}
        </div>
      </article>`;
    }).join('') || '<p class="empty-state">当前筛选下没有匹配的来源材料。</p>';

    const publisherOptions = publishers.map(p => `<option value="${C.escapeHtml(p)}"${p === state.libraryPublisher ? ' selected' : ''}>${C.escapeHtml(p)}（${pubCounts[p]}）</option>`).join('');

    return `
      <section class="library-hero">
        <div><span class="eyebrow">原始来源资料库 · PRIMARY SOURCE LIBRARY</span><h2>来源资料库：${items.length} 篇原始材料</h2><p>集中展示所有原始材料——从 ${glossary('T0')} 一手来源到发现层公众号盘点，用<strong>分级标签</strong>区分证据等级。"哪些材料能支撑交易入库"的判断在<strong>数据工作流的规则层</strong>生效；此处只做集中登记与浏览。文档 ≠ 独立证据。</p></div>
        <dl class="library-metrics">
          <div><dt>原始材料</dt><dd>${items.length}</dd></div>
          <div><dt>已入库证据</dt><dd>${ingestedCount}</dd></div>
          <div><dt>发现层线索</dt><dd>${discoveryCount}</dd></div>
          <div><dt>覆盖交易</dt><dd>${coveredDeals}</dd></div>
        </dl>
      </section>

      <section class="library-tier-band" aria-label="按证据分级汇总">
        ${tierOrder.map(g => `<button type="button" class="tier-chip tier-${g.toLowerCase()}${state.libraryTier === g ? ' is-active' : ''}" data-library-tier="${g}">
          <span>${C.escapeHtml(tierLabels[g] || g)}</span><b>${byTier[g]}</b>
        </button>`).join('')}
        ${state.libraryTier !== 'all' ? '<button type="button" class="tier-chip tier-reset" data-library-tier="all">清除分级筛选 ×</button>' : ''}
      </section>

      <div class="library-layout">
        <aside class="library-publishers" aria-label="按来源分类汇总">
          <h3>按来源分类汇总</h3>
          <div class="pub-groups">${categoryOrder.filter(cat => pubGroups[cat] && pubGroups[cat].length).map(cat => `
            <section class="pub-group pub-group-${cat.toLowerCase()}">
              <div class="pub-group-head"><span class="pub-group-name">${C.escapeHtml(categoryMeta[cat].label)}</span><span class="pub-group-en">${C.escapeHtml(categoryMeta[cat].en)}</span><b>${groupTotal(cat)}</b></div>
              <ul>${pubGroups[cat].map(([p, n]) => `<li><button type="button" class="pub-row${state.libraryPublisher === p ? ' is-active' : ''}" data-library-publisher="${C.escapeHtml(p)}">
                <span class="pub-name">${C.escapeHtml(p)}</span>
                <span class="pub-bar" aria-hidden="true"><span style="width:${((n / maxPub) * 100).toFixed(1)}%"></span></span>
                <span class="pub-count">${n}</span>
              </button></li>`).join('')}</ul>
            </section>`).join('')}</div>
        </aside>

        <div class="library-main">
          <div class="library-toolbar">
            <label class="library-search"><span>搜索</span><input id="librarySearch" value="${C.escapeHtml(state.librarySearch)}" placeholder="标题、发布方、交易 ID、主题、分级"></label>
            <label class="library-select"><span>发布方</span><select data-library-publisher-select><option value="all"${state.libraryPublisher === 'all' ? ' selected' : ''}>全部（${items.length}）</option>${publisherOptions}</select></label>
            <button type="button" class="quiet-button" id="libraryReset">重置</button>
            <span class="library-count">${filtered.length} / ${items.length} 篇</span>
          </div>
          <div class="library-grid">${cards}</div>
        </div>
      </div>
      ${renderEvidenceDrawer()}
      <p class="sr-only" id="app-live-region" aria-live="polite">已进入来源资料库，共 ${items.length} 篇原始材料。</p>`;
  }

  // 数据渠道施工进度：把技术味的 Coverage Matrix 翻译成合伙人能看懂的"我们铺了哪些数据渠道、
  // 每个渠道进度到哪一步、为什么还不能报全球市场份额"。按施工状态分四组卡片展示。
  function renderCoverageProgress() {
    const familyName = {
      TRANSACTION_PRIMARY: '交易一手来源（公告 / 交易所 / 财报）',
      CLINICAL_REGULATORY: '临床与监管数据（试验登记 / 药监）',
      SCIENCE_TARGET: '科研与靶点数据（靶点库 / 文献）',
      PATENT_ENTITY: '专利与法人实体数据',
      PROFESSIONAL_INTELLIGENCE: '专业情报与行业媒体',
      CHINA_INTELLIGENCE: '中国专业公众号情报',
      COMMERCIAL_CENSUS: '商业普查库（全球交易分母来源）',
    };
    // 状态 → 分组 + 中文标签 + 说明
    const statusMeta = {
      CURATED_SEED_COMPLETE: { group: 'done', label: '已完成核实' },
      SELECTED_JOIN_COMPLETE: { group: 'done', label: '已接入' },
      BOUNDED_DISCOVERY_SAMPLE: { group: 'progress', label: '发现层采集中' },
      PARTIAL_WATCHLIST: { group: 'progress', label: '部分接入' },
      NEXT_CONNECTORS: { group: 'planned', label: '已规划待接入' },
      NEXT_OR_GATED: { group: 'planned', label: '已规划 / 需授权' },
      LICENSE_REQUIRED: { group: 'license', label: '待商业授权' },
      LICENSE_OR_SUBSCRIPTION_REQUIRED: { group: 'license', label: '待授权 / 订阅' },
    };
    const groups = [
      { key: 'done', title: '已完成', en: 'CONNECTED & VERIFIED', desc: '已采集并完成一手核实，可直接支撑分析' },
      { key: 'progress', title: '进行中', en: 'IN PROGRESS', desc: '已在采集，但仍属发现层 / 部分接入' },
      { key: 'planned', title: '已规划待接入', en: 'MAPPED · NOT YET RUN', desc: '来源已登记，连接器尚未系统运行' },
      { key: 'license', title: '待商业授权', en: 'LICENSE REQUIRED', desc: '需付费授权——这正是全球市场份额仍被阻断的原因' },
    ];
    const rows = T.coverage_matrix.map(r => {
      const meta = statusMeta[r.coverage_status] || { group: 'planned', label: r.coverage_status };
      return { ...r, group: meta.group, statusLabel: meta.label };
    });
    const cards = groups.map(g => {
      const items = rows.filter(r => r.group === g.key);
      if (!items.length) return '';
      const list = items.map(it => {
        const done = it.deduped_events && Number(it.t0_verified_events) > 0
          ? `${it.t0_verified_events} 条已核实`
          : (it.deduped_events && Number(it.deduped_events) > 0 ? `${it.deduped_events} 条候选` : '尚未采集');
        return `<div class="cov-item">
          <div class="cov-item-top"><strong>${C.escapeHtml(familyName[it.source_family] || it.source_family)}</strong><span class="cov-status cov-${g.key}">${C.escapeHtml(it.statusLabel)}</span></div>
          <p class="cov-scope">${C.escapeHtml(it.geography_scope)} · ${C.escapeHtml(it.topic_scope)}</p>
          <div class="cov-item-foot"><span>${C.escapeHtml(done)}</span><span class="cov-claims">市场份额结论：${it.market_claims_allowed === 'true' ? '可用' : '暂不可用'}</span></div>
        </div>`;
      }).join('');
      return `<div class="cov-group cov-group-${g.key}">
        <div class="cov-group-head"><span class="cov-group-dot"></span><div><strong>${g.title}</strong><span class="cov-group-en">${g.en}</span></div><b>${items.length}</b></div>
        <p class="cov-group-desc">${g.desc}</p>
        <div class="cov-group-body">${list}</div>
      </div>`;
    }).join('');
    return `
      <section class="coverage-section">
        <header><div><span class="eyebrow">数据渠道施工进度 · COVERAGE</span><h2>我们铺了哪些数据渠道，进度到哪一步</h2><p>这张图回答三件事：数据覆盖了哪些渠道、每个渠道进度到哪、为什么还不能发布全球市场份额。绿=已完成，蓝=进行中，灰=已规划待接入，琥珀=待商业授权。</p></div><span class="status-label status-blocked">市场份额结论：待商业普查库授权</span></header>
        <div class="coverage-progress-grid">${cards}</div>
        <p class="chart-note">"市场份额 / 同比"需要一个去重的全球交易总量（分母），目前只在待授权的商业普查库里；在它接入前，全站不发布未经授权的权威市场份额（当前改用第三方公开口径做定位，见 AI Thesis）。</p>
      </section>`;
  }

  function renderMethods() {
    const openReconciliations = T.reconciliation_results.filter(row => row.review_status === 'OPEN');
    const blockedUses = data.manifest.blocked_uses || [];
    return `
      <section class="methods-summary">
        <div><span class="eyebrow">SOURCE PORTFOLIO</span><h2>来源与方法：${T.source_registry.length} 个来源，${summary.active_sources} 个在用</h2><p>映射登记 ≠ 已入库（Mapped ≠ Ingested）；来源权威、访问路径、授权状态和证据角色独立记录。</p></div>
        <dl><div><dt>CSV tables</dt><dd>${data.manifest.counts.csv_tables}</dd></div><div><dt>Structured rows</dt><dd>${data.manifest.counts.csv_rows_total}</dd></div><div><dt>Source documents</dt><dd>${summary.source_documents}</dd></div><div><dt>Open reconciliation</dt><dd>${summary.open_reconciliations}</dd></div></dl>
      </section>
      <section class="methods-policy-grid">
        <article><span>证据分级 · EVIDENCE TIERS（T0–T3）</span><h3>证据角色不由链接数量决定</h3><p>${glossary('T0')} / ${glossary('T1')} 承担字段适配的硬事实；T1_ATTRIBUTED（带可核验出处的转述）；T2 / T3 用于背景（Context）或发现（Discovery），不能自行升级结论。</p></article>
        <article class="policy-attributed"><span>带出处转述 · T1_ATTRIBUTED</span><h3>标注了一手出处的公众号可作溯源指针</h3><p>当公众号（如医药魔方）转述并标注了可核验的一手出处（issuer 公告 / 交易所文件），它可作为溯源指针；但字段事实只有在<strong>其标注的出处被追溯确认后</strong>，才随该出处一起达到可用等级——升级的是被指向的一手来源，不是公众号本身。</p></article>
        <article><span>仅发现层 · DISCOVERY ONLY</span><h3>无出处公众号只承担 Discovery</h3><p>未标注可核验出处的公众号与行业媒体只触发研究任务；交易经济条款必须回到 issuer、exchange 或字段适配的权威来源。</p></article>
        <article><span>AI + HUMAN</span><h3>AI 抽取 + 人工核对，分歧进 ${glossary('reconciliation')}</h3><p>数据清洗由 AI 与人工共同完成：AI 抽取初判，人工复核终审；AI 与人工的分歧不被静默抹平，进入 ${glossary('reconciliation')} 显式解决。AI 不能跨越 ${glossary('release gate')}。</p></article>
      </section>
      ${renderCoverageProgress()}
      <section class="source-registry-pointer" aria-label="完整来源清单指引">
        <div><span class="eyebrow">受治理来源登记 · GOVERNED SOURCE REGISTRY</span><h2>完整来源清单</h2><p>本页专注<strong>治理规则与边界</strong>；${T.source_registry.length} 个来源的逐条明细（发布方、证据分级、覆盖范围、可用角色、原文入口）统一在<strong>来源资料库</strong>集中浏览，避免两页重复登记。</p></div>
        <button type="button" class="quiet-button" data-goto-view="library">前往来源资料库查看全部来源 →</button>
      </section>
      <section class="release-gate-section"><header><div><span class="eyebrow">分级门槛 · L0–L4</span><h2>发布门槛与阻断用途 · RELEASE GATES</h2></div></header><div class="release-gate-grid">${T.release_gates.map(gate => `<article class="${gate.current_state === 'BLOCKED' ? 'is-blocked' : ''}"><strong>${C.escapeHtml(gate.release_level)}</strong><span>${C.escapeHtml(gate.output_type)}</span><b>${C.escapeHtml(gate.current_state)}</b><p>${C.escapeHtml(gate.hard_requirements)}</p></article>`).join('')}</div><div class="blocked-use-list"><strong>受阻用途 · Blocked uses</strong>${blockedUses.map(item => `<span>${C.escapeHtml(item)}</span>`).join('')}</div></section>
      <section class="open-reconciliation-section"><header><span class="eyebrow">未决重大问题 · OPEN MATERIAL QUESTIONS</span><h2>不可静默覆盖的 ${glossary('reconciliation')}</h2></header>${openReconciliations.map(row => `<article><strong>${C.escapeHtml(row.reconciliation_id)} · ${C.escapeHtml(row.deal_id)}</strong><span>${C.escapeHtml(row.field_name)}</span><p>${C.escapeHtml(row.decision)}</p></article>`).join('')}</section>
      <section class="catalog-section"><header><span class="eyebrow">底层数据文件 · UNDERLYING ARTIFACTS</span><h2>底层数据目录</h2></header><div class="catalog-grid">${data.catalog.map(file => `<a href="data/real_seed_v5/${C.escapeHtml(file)}" target="_blank" rel="noreferrer"><strong>${C.escapeHtml(file)}</strong><span>打开文件 · Open artifact</span></a>`).join('')}</div></section>
      <p class="sr-only" id="app-live-region" aria-live="polite">已进入来源与方法。</p>`;
  }

  function renderBody() {
    if (state.view === 'overview') return renderOverview();
    if (state.view === 'marketwide') return renderMarketWide();
    if (state.view === 'thesis') return renderThesis();
    if (state.view === 'pipeline') return renderPipeline();
    if (state.view === 'foundation') return renderFoundation();
    if (state.view === 'library') return renderLibrary();
    if (state.view === 'methods') return renderMethods();
    return renderLandscape();
  }

  function renderCurrent() {
    const meta = viewMeta[state.view];
    element('viewEyebrow').textContent = meta.eyebrow;
    element('viewTitle').textContent = meta.title;
    element('viewDescription').textContent = meta.description;
    element('viewStatus').innerHTML = `${scopeBadge()}<span class="freshness">更新至 ${data.manifest.snapshot_date}</span>`;
    element('snapshotState').innerHTML = `<span class="live-dot"></span>${scopeBadge()}`;
    element('viewBody').innerHTML = renderBody();
    document.querySelectorAll('.nav-button').forEach(button => {
      const selected = button.dataset.view === state.view;
      button.classList.toggle('active', selected);
      button.setAttribute('aria-current', selected ? 'page' : 'false');
    });
    element('themeToggle').textContent = state.theme === 'dark' ? '浅色模式' : '深色模式';
    attachEvents();
  }

  const META_KEYS = new Set(['scrollToId']);

  function signalThesisQuery(signal) {
    // 把信号维度映射到 AI Thesis 支持的查询主题；边界/买方信号无对应结构化 Thesis，返回 null（不改当前查询）
    if (!signal) return null;
    const map = { STRUCTURE: 'BNT327', ORIGIN: 'China-originated', MODALITY: 'ADC' };
    return map[signal.dimension] || null;
  }

  function scrollToElement(id) {
    if (!id || typeof document === 'undefined') return;
    const node = document.getElementById(id);
    if (node && typeof node.scrollIntoView === 'function') {
      node.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function setState(patch) {
    const previousView = state.view;
    const scrollToId = patch.scrollToId;
    if (patch.filters) state.filters = { ...state.filters, ...patch.filters };
    Object.entries(patch).forEach(([key, value]) => {
      if (key !== 'filters' && !META_KEYS.has(key)) state[key] = value;
    });
    writeUrlState();
    renderCurrent();
    if (scrollToId) {
      // 让用户看到刚触发的结果（决策坞 / 证据抽屉），而不是回到顶部
      scrollToElement(scrollToId);
    } else if (state.view !== previousView && typeof window.scrollTo === 'function') {
      window.scrollTo(0, 0);
    }
  }

  function attachShellEvents() {
    document.querySelectorAll('.nav-button').forEach(button => {
      button.addEventListener('click', () => setState({ view: button.dataset.view }));
    });
    const themeToggle = element('themeToggle');
    if (themeToggle) themeToggle.addEventListener('click', () => {
      state.theme = state.theme === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = state.theme;
      writeUrlState();
      renderCurrent();
    });
    // 回到顶部：超长页（数据工作流 / 资料库等）滚动 480px 后浮现，点击平滑回顶。
    const backTop = element('backToTop');
    if (backTop && typeof window.addEventListener === 'function') {
      const toggleBackTop = () => {
        if ((window.scrollY || 0) > 480) backTop.classList.add('is-visible');
        else backTop.classList.remove('is-visible');
      };
      window.addEventListener('scroll', toggleBackTop, { passive: true });
      backTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
      toggleBackTop();
    }
  }

  function attachEvents() {
    // 术语即时展开：点击/触摸切换 tooltip（桌面端 hover 已由 CSS 处理）。用一次性委托监听，避免重复绑定。
    if (!window.__glossaryBound && typeof document.addEventListener === 'function') {
      window.__glossaryBound = true;
      document.addEventListener('click', (e) => {
        const term = e.target.closest && e.target.closest('.glossary-term');
        document.querySelectorAll('.glossary-term.is-open').forEach(el => { if (el !== term) el.classList.remove('is-open'); });
        if (term) { e.preventDefault(); term.classList.toggle('is-open'); }
      });
    }
    document.querySelectorAll('[data-filter]').forEach(control => {
      control.addEventListener('change', () => setState({ filters: { [control.dataset.filter]: control.value } }));
    });
    document.querySelectorAll('[data-clear-filter]').forEach(button => {
      button.addEventListener('click', () => setState({ filters: { [button.dataset.clearFilter]: 'all' } }));
    });
    document.querySelectorAll('[data-select-buyer]').forEach(button => {
      button.addEventListener('click', () => setState({
        selectedBuyer: button.dataset.selectBuyer,
        activeDimension: 'buyer',
        filters: { buyer: button.dataset.selectBuyer },
      }));
    });
    document.querySelectorAll('[data-profile-buyer]').forEach(button => {
      button.addEventListener('click', () => setState({ profileBuyer: button.dataset.profileBuyer, scrollToId: 'buyer-profile-drawer' }));
    });
    document.querySelectorAll('[data-select-modality]').forEach(button => {
      button.addEventListener('click', () => setState({
        selectedModality: button.dataset.selectModality,
        activeDimension: 'modality',
        filters: { modality: button.dataset.selectModality },
      }));
    });
    document.querySelectorAll('[data-select-origin]').forEach(button => {
      button.addEventListener('click', () => setState({
        selectedOrigin: button.dataset.selectOrigin,
        activeDimension: 'origin',
        filters: { origin: button.dataset.selectOrigin },
      }));
    });
    document.querySelectorAll('[data-open-evidence]').forEach(button => {
      button.addEventListener('click', () => {
        const ids = String(button.dataset.openEvidence || '').split('|').filter(Boolean);
        if (ids.length) setState({ evidenceDealIds: ids });
      });
    });
    document.querySelectorAll('[data-select-signal]').forEach(button => {
      button.addEventListener('click', () => {
        const signal = signals.find(item => item.id === button.dataset.selectSignal);
        // 信号现在位于 AI Thesis 页：选中信号 = 打开决策坞 + 联动该信号对应的结构化 Thesis 查询
        const patch = {
          view: 'thesis',
          selectedSignal: button.dataset.selectSignal,
          decisionDockOpen: true,
          scrollToId: 'decision-dock',
        };
        const query = signalThesisQuery(signal);
        if (query) patch.thesisQuery = query;
        setState(patch);
      });
    });
    document.querySelectorAll('[data-goto-thesis-signal]').forEach(button => {
      button.addEventListener('click', () => {
        const signal = signals.find(item => item.id === button.dataset.gotoThesisSignal);
        setState({ view: 'thesis', selectedSignal: button.dataset.gotoThesisSignal, decisionDockOpen: true });
      });
    });
    const reset = element('resetFilters');
    if (reset) reset.addEventListener('click', () => setState({
      filters: { ...DEFAULT_STATE.filters },
      selectedBuyer: null,
      selectedModality: null,
      selectedOrigin: null,
      evidenceDealIds: [],
      profileBuyer: null,
    }));
    const closeEvidence = element('closeEvidenceDrawer');
    if (closeEvidence) closeEvidence.addEventListener('click', () => setState({ evidenceDealIds: [] }));
    const closeProfile = element('closeBuyerProfile');
    if (closeProfile) closeProfile.addEventListener('click', () => setState({ profileBuyer: null }));
    const decisionDockTrigger = element('decisionDockTrigger');
    if (decisionDockTrigger) decisionDockTrigger.addEventListener('click', () => {
      if (state.selectedSignal) setState({ decisionDockOpen: true, scrollToId: 'decision-dock' });
    });
    const closeDecisionDock = element('closeDecisionDock');
    if (closeDecisionDock) closeDecisionDock.addEventListener('click', () => setState({ decisionDockOpen: false }));
    const openSignalEvidence = element('openSignalEvidence');
    if (openSignalEvidence) openSignalEvidence.addEventListener('click', () => {
      const signal = signals.find(item => item.id === state.selectedSignal);
      if (signal && signal.evidence_deal_ids.length) setState({ evidenceDealIds: signal.evidence_deal_ids });
    });
    const openFullThesis = element('openFullThesis');
    if (openFullThesis) openFullThesis.addEventListener('click', () => {
      const signal = signals.find(item => item.id === state.selectedSignal);
      const query = signalThesisQuery(signal);
      // 已在 Thesis 页：收起决策坞、联动查询并聚焦完整结构化 Thesis
      setState({ view: 'thesis', decisionDockOpen: false, thesisQuery: query || state.thesisQuery, scrollToId: 'thesis-workspace' });
    });
    const runThesis = element('runThesisQuery');
    if (runThesis) runThesis.addEventListener('click', () => {
      const input = element('thesisQuery');
      setState({ thesisQuery: input && input.value ? input.value.trim() : '' });
    });
    document.querySelectorAll('[data-thesis-preset]').forEach(button => {
      button.addEventListener('click', () => setState({ thesisQuery: button.dataset.thesisPreset, view: 'thesis' }));
    });
    document.querySelectorAll('[data-dimension]').forEach(button => {
      button.addEventListener('click', () => setState({ activeDimension: button.dataset.dimension }));
    });
    const filterTrigger = element('filterTrigger');
    if (filterTrigger) filterTrigger.addEventListener('click', () => setState({ filtersOpen: !state.filtersOpen }));
    // 数据工作流：业务逻辑库卡片跳转到对应分析页
    document.querySelectorAll('[data-goto-view]').forEach(button => {
      button.addEventListener('click', () => setState({ view: button.dataset.gotoView }));
    });
    // 来源资料库交互
    document.querySelectorAll('[data-library-tier]').forEach(button => {
      button.addEventListener('click', () => setState({ libraryTier: button.dataset.libraryTier }));
    });
    document.querySelectorAll('[data-library-publisher]').forEach(button => {
      button.addEventListener('click', () => setState({
        libraryPublisher: state.libraryPublisher === button.dataset.libraryPublisher ? 'all' : button.dataset.libraryPublisher,
      }));
    });
    const pubSelect = document.querySelector('[data-library-publisher-select]');
    if (pubSelect) pubSelect.addEventListener('change', () => setState({ libraryPublisher: pubSelect.value }));
    const librarySearch = element('librarySearch');
    if (librarySearch) librarySearch.addEventListener('input', () => {
      state.librarySearch = librarySearch.value;
      // 就地更新列表，避免每次输入都重渲染整页导致输入框失焦
      renderCurrent();
      const box = element('librarySearch');
      if (box) { box.focus(); box.setSelectionRange(box.value.length, box.value.length); }
    });
    const libraryReset = element('libraryReset');
    if (libraryReset) libraryReset.addEventListener('click', () => setState({ libraryPublisher: 'all', libraryTier: 'all', librarySearch: '' }));
  }

  readUrlState();
  attachShellEvents();
  renderCurrent();

  window.__CONVERGENCE_V5_TEST__ = {
    getState: () => state,
    setState,
    render: renderCurrent,
  };
})();

// DEDUP_ONTOLOGY_DONE

  </script>
</body>
</html>
