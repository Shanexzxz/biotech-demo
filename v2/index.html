/* ===== 卡片式本体 DAG（底层数据如何变成投资结论） ===== */
.ontology-dag {
  margin-top: 18px;
  padding: 20px;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius);
}
.odag-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 20px;
  margin-bottom: 14px;
}
.odag-head .eyebrow {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--green);
  text-transform: uppercase;
  font-weight: 700;
}
.odag-head h3 {
  margin: 4px 0 4px;
  font-size: 17px;
  color: var(--text-strong);
}
.odag-head p {
  margin: 0;
  font-size: 12px;
  color: var(--muted);
  max-width: 640px;
  line-height: 1.5;
}
.odag-stat {
  flex-shrink: 0;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--muted);
  white-space: nowrap;
  padding: 5px 10px;
  border: 1px solid var(--line);
  border-radius: 999px;
}
.odag-stat b { color: var(--text-strong); font-size: 12px; }

.odag-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 16px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--line);
}
.odl {
  position: relative;
  padding-left: 16px;
  font-size: 11px;
  color: var(--muted);
}
.odl::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 9px; height: 9px;
  border-radius: 3px;
}
.odl.st-built::before { background: var(--green); }
.odl.st-partial::before { background: var(--amber); }
.odl.st-derived::before { background: var(--blue); }
.odl.st-string::before { background: var(--violet); }
.odl.st-blocked::before { background: var(--red); }

.odag-scroll { overflow-x: auto; padding-bottom: 6px; }
.odag-grid {
  display: flex;
  align-items: stretch;
  gap: 0;
  min-width: max-content;
}
.odag-col {
  display: flex;
  flex-direction: column;
  width: 176px;
  flex-shrink: 0;
}
.odag-col-head {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 0 4px 10px;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--line);
}
.odag-col-no {
  font-size: 11px;
  font-weight: 700;
  color: var(--green);
  letter-spacing: 0.06em;
}
.odag-col-name {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-strong);
  letter-spacing: 0.04em;
}
.odag-col-body { display: flex; flex-direction: column; gap: 12px; padding-top: 8px; }
.odag-flow {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  flex-shrink: 0;
  color: var(--line-strong);
  font-size: 15px;
  padding-top: 40px;
}

.odag-card {
  position: relative;
  padding: 11px 12px 11px 15px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  transition: border-color 0.15s ease, transform 0.15s ease;
}
.odag-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
}
.odag-card.type-drug::before { background: var(--cyan); }
.odag-card.type-org::before { background: var(--blue); }
.odag-card.type-evidence::before { background: var(--green); }
.odag-card.type-core::before { background: var(--muted-2); }
.odag-card:hover { border-color: var(--line-strong); transform: translateY(-1px); }
.odag-card.st-blocked { opacity: 0.82; border-style: dashed; }

.odag-card-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.odag-eid {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.odag-status {
  font-size: 11px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 999px;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.odag-status.st-built { color: var(--green); background: color-mix(in srgb, var(--green) 16%, transparent); }
.odag-status.st-partial { color: var(--amber); background: var(--amber-soft); }
.odag-status.st-derived { color: var(--blue); background: color-mix(in srgb, var(--blue) 16%, transparent); }
.odag-status.st-string { color: var(--violet); background: var(--violet-soft); }
.odag-status.st-blocked { color: var(--red); background: var(--red-soft); }

.odag-name {
  display: block;
  font-size: 13px;
  color: var(--text-strong);
  line-height: 1.3;
  margin-bottom: 3px;
}
.odag-type {
  margin: 0 0 10px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}
.odag-card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--line);
}
.odag-table {
  font-size: 11px;
  color: var(--muted-2);
  font-family: var(--mono, ui-monospace, monospace);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.odag-count {
  flex-shrink: 0;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-strong);
  line-height: 1;
}

/* ===== 边界叙事内：样本内可发布占比对照块 ===== */
.disclosed-share-block {
  display: grid;
  gap: 10px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--cyan);
  border-radius: var(--radius-sm);
}
.disclosed-share-block > span {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--cyan);
  font-weight: 600;
}
.disclosed-share-block > strong {
  font-size: 12px;
  color: var(--text-strong);
  line-height: 1.5;
}
.dshare-list { display: grid; gap: 8px; }
.dshare-row {
  display: grid;
  grid-template-columns: 148px 1fr 96px;
  align-items: center;
  gap: 10px;
}
.dshare-key { font-size: 12px; color: var(--text); }
.dshare-track {
  height: 8px;
  background: var(--surface-3);
  border-radius: 999px;
  overflow: hidden;
}
.dshare-fill {
  display: block;
  height: 100%;
  background: var(--cyan);
  border-radius: 999px;
}
.dshare-val {
  font-size: 12px;
  color: var(--muted);
  text-align: right;
  font-variant-numeric: tabular-nums;
}
.dshare-split {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.dshare-can, .dshare-cannot {
  display: grid;
  gap: 3px;
  padding: 9px 11px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
}
.dshare-can { background: color-mix(in srgb, var(--green) 12%, transparent); border-color: color-mix(in srgb, var(--green) 40%, transparent); }
.dshare-cannot { background: var(--red-soft); border-color: color-mix(in srgb, var(--red) 40%, transparent); }
.dshare-can b { font-size: 12px; color: var(--green); }
.dshare-cannot b { font-size: 12px; color: var(--red); }
.dshare-can small, .dshare-cannot small { font-size: 11px; color: var(--muted); line-height: 1.4; }
.dshare-note { font-size: 11px; color: var(--muted); line-height: 1.5; }

/* ===== 采集层：全球分母解锁状态面板 ===== */
.denominator-status { display: grid; gap: 10px; }
.denominator-status > strong { font-size: 13px; color: var(--text-strong); }
.denom-lead { font-size: 12px; color: var(--text); line-height: 1.5; margin: 0; }
.denom-lead b { color: var(--text-strong); }
.denom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.denom-col {
  display: grid;
  gap: 6px;
  padding: 11px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line);
}
.denom-can { background: color-mix(in srgb, var(--green) 10%, transparent); border-color: color-mix(in srgb, var(--green) 38%, transparent); }
.denom-cannot { background: var(--amber-soft); border-color: color-mix(in srgb, var(--amber) 42%, transparent); }
.denom-head { font-size: 11px; font-weight: 600; letter-spacing: 0.04em; }
.denom-can .denom-head { color: var(--green); }
.denom-cannot .denom-head { color: var(--amber); }
.denom-col p { margin: 0; font-size: 11px; color: var(--muted); line-height: 1.45; }
.denom-tags { display: flex; flex-wrap: wrap; gap: 6px; }

/* ===== 边界叙事：第三方引用口径的市场定位 ===== */
.referenced-market-block {
  display: grid;
  gap: 9px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 3px solid var(--blue);
  border-radius: var(--radius-sm);
}
.referenced-market-block > span {
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--blue);
  font-weight: 600;
}
.referenced-market-block > strong { font-size: 12px; color: var(--text-strong); line-height: 1.5; }
.refmkt-list { display: grid; gap: 10px; }
.refmkt-row {
  display: grid;
  gap: 8px;
  padding: 10px 11px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
}
.refmkt-scope { display: grid; gap: 2px; }
.refmkt-scope strong { font-size: 12px; color: var(--text-strong); }

        cells.push({
          year,
          modality,
          deal_count: cohort.length,
          disclosed_noncontingent: disclosed.length
            ? disclosed.reduce((sum, row) => sum + row.noncontingent, 0)
            : null,
          disclosure_count: disclosed.length,
          deal_ids: cohort.map(deal => deal.deal_id),
        });
      });
    });
    return { years, modalities, cells };
  }

  function buyerRegion(country) {
    const normalized = String(country || '').toLowerCase();
    if (normalized.includes('united states')) return 'United States';
    if (normalized === 'china' || normalized.includes('china /')) return 'China';
    if (['united kingdom', 'switzerland', 'germany', 'france', 'belgium', 'denmark', 'netherlands', 'sweden', 'ireland', 'italy', 'spain'].some(name => normalized.includes(name))) return 'Europe';
    return 'Other / Mixed';
  }

  // 买方分组：基于 organizations 表的真实字段（country_or_region + entity_type），不编造。
  // 国别 → US / CHINA / EU / OTHER；类型 → PHARMA（大药企）/ BIOTECH（Biopharma）。
  // 组合成 6 类语义分组，供主图气泡上色。找不到组织记录时回落到名称启发式。
  function buyerSegmentByProfile(buyerName, organizations) {
    const org = (organizations || []).find(row =>
      row.canonical_name === buyerName
      || (row.canonical_name && buyerName && row.canonical_name.split(' / ').includes(buyerName))
    );
    const region = buyerRegion(org && org.country_or_region);
    const regionKey = region === 'United States' ? 'US'
      : region === 'China' ? 'CHINA'
      : region === 'Europe' ? 'EU'
      : 'OTHER';
    const entity = String((org && org.entity_type) || '').toLowerCase();
    const typeKey = entity.includes('biotech') ? 'BIOTECH'
      : entity.includes('pharmaceutical') ? 'PHARMA'
      : 'PHARMA';
    return `${regionKey}_${typeKey}`;
  }

  function originBuyerFlows(deals, dealParties, organizations) {
    const organizationById = new Map(organizations.map(row => [row.organization_id, row]));
    const buyerRoles = new Set(['ACQUIRER', 'LICENSEE', 'LICENSEE_PARTNER']);
    const byCorridor = new Map();
    deals.forEach(deal => {
      const buyerParty = dealParties.find(row =>
        row.deal_id === deal.deal_id
        && row.is_primary === 'true'
        && buyerRoles.has(row.party_role)
      );
      const buyer = buyerParty ? organizationById.get(buyerParty.organization_id) : null;
      const origin = deal.asset_origin_country || 'Undisclosed';
      const region = buyerRegion(buyer && buyer.country_or_region);
      const key = `${origin}::${region}`;
      if (!byCorridor.has(key)) byCorridor.set(key, {
        origin,
        buyer_region: region,
        deal_count: 0,
        licensing: 0,
        acquisitions: 0,
        deal_ids: [],
      });
      const row = byCorridor.get(key);
      row.deal_count += 1;
      if (deal.deal_type === 'LICENSE_COLLABORATION') row.licensing += 1;
      if (deal.deal_type === 'M_AND_A') row.acquisitions += 1;
      row.deal_ids.push(deal.deal_id);
    });
    return [...byCorridor.values()].sort((a, b) =>
      b.deal_count - a.deal_count
      || a.origin.localeCompare(b.origin)
      || a.buyer_region.localeCompare(b.buyer_region)
    );
  }

  // 披露样本内结构占比：分母 = 我们自己的披露交易样本（非全球普查）。
  // 每一项占比都可逐笔追溯到 deals，因此可诚实发布；但严禁被解读为"全球市场份额"。
  function disclosedShareBreakdown(deals) {
    const total = deals.length || 0;
    const pct = n => total ? Math.round((n / total) * 1000) / 10 : 0;
    const licensing = deals.filter(d => d.deal_type === 'LICENSE_COLLABORATION').length;
    const mna = deals.filter(d => d.deal_type === 'M_AND_A').length;
    const china = deals.filter(d => d.asset_origin_country === 'China').length;
    return {
      denominator: total,
      denominator_label: total + ' 笔披露交易样本',
      is_sample_not_census: true,
      rows: [
        { key: 'Licensing / Collaboration', count: licensing, pct: pct(licensing) },
        { key: 'M&A', count: mna, pct: pct(mna) },
        { key: '中国来源资产', count: china, pct: pct(china) },
      ],
      note: '以上均为「样本内结构占比」——分母是本平台可追溯的披露交易，不是全球全部交易。因此可回答"我这批交易里 X 占多少"，不能回答"全球市场里 X 占多少"。',
    };
  }

  // 基于第三方引用口径的市场定位：我们没有商业库授权，但公众号/机构文章公开披露了
  // 医药魔方 NextPharma 等的口径数字（如 2025 中国 out-licensing 157 笔）。据此可回答
  // "样本在该口径下的覆盖率/定位"——但必须标清来源、口径边界与误差，不当作自有普查。
  function referencedMarketContext(tables) {
    const deals = tables.deals || [];
    const discovery = tables.discovery_results || [];
    const hasDisc = id => discovery.some(d => d.discovery_id === id);
    const chinaDeals = deals.filter(d => d.asset_origin_country === 'China');
    const china2025 = chinaDeals.filter(d => String(d.announced_date || '').slice(0, 4) === '2025').length;
    // 公开引用口径（来源均在 discovery_results 已登记，带 source_discovery_id 外键）
    const benchmarks = [
      {
        scope: '2025 中国创新药 out-licensing（全年）',
        denominator: 157,
        denominator_label: '157 笔 / $135.7B',
        source_discovery_id: 'DISC-017',
        source_name: '医药魔方 NextPharma',
        via: '经 pharmcube.com 公开披露',
        our_sample: china2025,
        caveat: '第三方口径，未经我方逐笔核验；仅含公开披露的创新药，剔除中药/疫苗/仿制药',
      },
      {
        scope: '2024 中国创新药 out-licensing（全年·对比）',
        denominator: 94,
        denominator_label: '94 笔 / $51.9B',
        source_discovery_id: 'DISC-017',
        source_name: '医药魔方 NextPharma',
        via: '经 pharmcube.com 公开披露',
        our_sample: chinaDeals.filter(d => String(d.announced_date || '').slice(0, 4) === '2024').length,
        caveat: '同上口径；用于年度对比参照',
      },
    ].filter(b => hasDisc(b.source_discovery_id));
    benchmarks.forEach(b => {
      b.coverage_pct = b.denominator ? Math.round((b.our_sample / b.denominator) * 1000) / 10 : null;
    });
    return {
      available: benchmarks.length > 0,
      benchmarks,
      method: '覆盖率 = 我方披露样本命中数 ÷ 第三方引用口径分母。分母来自公开可引用的行业口径（非我方自建普查），仅用于"样本处于市场何种位置"的定位，不用于发布权威市场份额。',
      error_note: '误差来源：①第三方口径未经我方逐笔核验；②各家口径不一致（如医药魔方 157 笔 vs 部分全球统计口径不同）；③我方样本为高关注交易，存在选择性偏差。因此覆盖率为定位性估算，非精确份额。',
    };
  }

  function buildSignalInbox(tables) {
    const deals = tables.deals || [];
    const economics = buildEconomics(deals, tables.deal_terms || []);
    const latestDate = deals.map(deal => deal.announced_date).filter(Boolean).sort().at(-1) || 'Unknown';
    const val = v => (v && v.trim && v.trim() && !/^unknown$/i.test(v)) ? v : null;
    const fmtB = m => (m >= 1000 ? `${(m / 1000).toFixed(m % 1000 === 0 ? 0 : 1)}B` : `${Math.round(m)}M`);
    // 模态显示映射：面向合伙人的信号文案用中文，行业通用缩写(ADC/siRNA/mRNA/CAR-T)保留。
    const modLabel = (m) => {
      const map = {
        'Small molecule': '小分子', 'Small molecule portfolio': '小分子组合',
        'Antibody-drug conjugate': 'ADC', 'Bispecific ADC': '双抗 ADC',
        'Bispecific antibody-drug conjugate': '双抗 ADC', 'Site-specific antibody-drug conjugate': '定点偶联 ADC',
        'Monoclonal antibody': '单抗', 'Bispecific antibody': '双抗',
        'Tri-specific antibody': '三抗', 'Multispecific antibody': '多抗',
        'Peptide': '多肽', 'Fusion protein': '融合蛋白', 'Radioligand therapy': '放射配体',
        'CAR-T cell therapy': 'CAR-T', 'Circular RNA platform': '环状 RNA 平台',
        'mRNA therapeutics and vaccines': 'mRNA', 'Platform': '技术平台',
      };
      return map[m] || m;
    };

    // 信号 1 · 买方连续扫货某模态：找出「同一买方 × 同一模态」出现最多的组合。
    const comboMap = new Map();
    deals.forEach(deal => {
      const buyer = val(deal.buyer_or_partner);
      const modality = val(deal.modality);
      if (!buyer || !modality) return;
      const key = `${buyer}||${modality}`;
      if (!comboMap.has(key)) comboMap.set(key, { buyer, modality, count: 0, ids: [] });
      const row = comboMap.get(key);

    const topCombo = [...comboMap.values()].sort((a, b) => b.count - a.count)[0] || null;

    // 信号 2 · 首付/非或有占比异常：在有 upfront 披露的交易里，找非或有占比最高的一笔。
    const ratioRows = deals
      .map(deal => ({ deal, e: economics.get(deal.deal_id) }))
      .filter(x => x.e && x.e.has_upfront_disclosure && x.e.total > 0 && x.e.noncontingent_ratio != null);
    const topRatio = ratioRows.slice().sort((a, b) => b.e.noncontingent_ratio - a.e.noncontingent_ratio)[0] || null;

    // 信号 3 · 中国资产估值跳升：China-originated 交易里，按 headline 总额最高的一笔。
    const chinaRows = deals
      .filter(deal => deal.asset_origin_country === 'China')
      .map(deal => ({ deal, e: economics.get(deal.deal_id) }))
      .filter(x => x.e && x.e.total > 0);
    const topChina = chinaRows.slice().sort((a, b) => b.e.total - a.e.total)[0] || null;

    // 信号 4 · 某模态突然走热：比较最新年份 vs 之前，交易笔数增幅最大的模态。
    const years = deals.map(d => String(d.announced_date || '').slice(0, 4)).filter(Boolean).sort();
    const latestYear = years.at(-1) || null;
    const modHeat = new Map();
    deals.forEach(deal => {
      const modality = val(deal.modality);
      const y = String(deal.announced_date || '').slice(0, 4);
      if (!modality || !y) return;
      if (!modHeat.has(modality)) modHeat.set(modality, { modality, latest: 0, prior: 0, ids: [] });
      const row = modHeat.get(modality);
      if (y === latestYear) { row.latest += 1; row.ids.push(deal.deal_id); } else { row.prior += 1; }
    });
    const hotModality = [...modHeat.values()].filter(r => r.latest > 0).sort((a, b) => (b.latest - b.prior) - (a.latest - a.prior) || b.latest - a.latest)[0] || null;

    const signals = [];

        inference: '同一买方在单一模态上连续扫货，通常指向明确的管线补强意图或竞争卡位，可作为预判其下一步出手方向的研究入口。',
        counter_thesis: '样本围绕高关注交易构建，连续出手也可能是历史存量而非当下加码；不能据此推断其全部 BD 预算配置。',
        unknowns: ['该买方内部管线缺口', '同模态未公开的在谈交易', '预算与竞品卡位约束'],
        action: `拉出 ${topCombo.buyer} 在 ${modLabel(topCombo.modality)} 的逐笔条款与标的，比对其估值锚点与 Rights Scope 变化。`,

        release_level: 'L2',
        release_state: 'READY',
        coverage: `${topCombo.count} deals · ${topCombo.buyer} × ${modLabel(topCombo.modality)}`,
        freshness: latestDate,
        forecast: null,
      });
    }

    if (topRatio) {
      const e = topRatio.e;
      const name = val(topRatio.deal.asset_name) || val(topRatio.deal.seller_or_partner) || topRatio.deal.deal_id;
      signals.push({
        id: 'SIG-UPFRONT-001',

        inference: '非或有占比高，代表买方愿意前置更多确定性对价，往往对应强信念或激烈竞价——这是判断买方出手力度比 headline 总额更可靠的结构信号。',

    if (topChina) {
      const e = topChina.e;
      const name = val(topChina.deal.asset_name) || val(topChina.deal.seller_or_partner) || topChina.deal.deal_id;
      const buyer = val(topChina.deal.buyer_or_partner) || '跨境买方';
      signals.push({
        id: 'SIG-CHINA-001',
        priority: 84,
        dimension: 'ORIGIN',
        title: `中国来源资产估值高点：${name}`,

        inference: '中国创新资产在跨境交易中屡创总额新高，反映买方对中国来源管线的支付意愿抬升，是 China-out 这条主线的关键锚点。',
        counter_thesis: 'headline 总额含或有里程碑，样本偏向高关注交易；不能据此推断全部 China-originated 交易的估值水平。',

        coverage: `${chinaRows.length} China-originated deals`,
        freshness: val(topChina.deal.announced_date) || latestDate,

    }

    if (hotModality && hotModality.latest >= 2) {
      signals.push({
        id: 'SIG-HEAT-001',
        priority: 80,
        dimension: 'MODALITY',
        title: `${modLabel(hotModality.modality)} 在 ${latestYear} 年交易骤增`,
        fact: `${modLabel(hotModality.modality)} 在 ${latestYear} 年披露 ${hotModality.latest} 笔交易，明显高于此前年份合计的 ${hotModality.prior} 笔。`,
        inference: '单一模态在近一年交易骤增，通常是资金正涌向该前沿技术的先行信号，值得作为赛道级研究入口。',
        counter_thesis: '年份计数受发现覆盖率与样本选取影响；短期骤增也可能是个别大额交易带动，未必是持续趋势。',
        unknowns: ['该模态的全球分母', '未公开在谈交易', '按年度一致的发现覆盖率'],
        action: `拆解 ${modLabel(hotModality.modality)} 在 ${latestYear} 年的买方构成与靶点分布，判断是集中卡位还是普遍加注。`,
        evidence_deal_ids: hotModality.ids,
        release_level: 'L2',
        release_state: 'READY',
        coverage: `${modLabel(hotModality.modality)} · ${latestYear} 年 ${hotModality.latest} 笔`,
        freshness: latestDate,
        forecast: null,
      });
    }

    return signals.sort((a, b) => b.priority - a.priority);
  }

        { dimension: 'Exit Path', rating: 'MEDIUM', evidence: '披露交易支持至少一种可观察退出结构。' },
      ],
      fact,
      inference: '资产稀缺性只有与阶段、买方缺口、确定性现金和 Rights Scope 联合解释时，才可能转化为投资价值。',
      counter_thesis: '当前 cohort 可能受高关注、大额和公开披露偏差影响；技术热度也可能先于临床价值兑现。',
      unknowns: ['全球 denominator', '未披露 Royalty', '买方内部 Pipeline Gap', '可校准的成交概率'],
      observed_appetite: buyerCounts.slice(0, 5),
      scenarios: [
        { name: 'Bull', kind: 'CONDITIONAL_FRAME', condition: '更多独立买方进入且非或有付款保持强势', indicator: '新增 Direct Comps / buyer diversity', invalidation: '关键临床 readout 失败' },
        { name: 'Base', kind: 'CONDITIONAL_FRAME', condition: '活跃度延续但条款保持 milestone-heavy', indicator: 'Upfront 与其他非或有付款披露', invalidation: '连续两个窗口没有可比交易' },
        { name: 'Bear', kind: 'CONDITIONAL_FRAME', condition: '买方集中度升高且风险继续后置', indicator: '买方数量 / contingent ratio', invalidation: '新买方以高确定性现金进入' },
      ],
      actions: ['完善 Direct Comparable Set', '验证关键临床与专利节点', '建立买方管线缺口清单', '写入 IC Watchlist'],
      comparable_ids: comparableIds,
      direct_comparable_ids: directIds,
      adjacent_comparable_ids: adjacentIds,
      comparable_summary: comp,
      potential_strategic_buyers: null,
      buyer_shortlist: explainableBuyerShortlist(comparableIds, directIds, deals, economics),
      next_verification: ['补齐独立来源', '复核相同阶段与 Rights Scope', '接入私有 Pipeline / CRM 后重算 Buyer Whitespace'],
    };
  }

  function explainableBuyerShortlist(comparableIds, directIds, deals, economics) {
    // 可解释买方候选：完全基于公开披露的历史出手行为推断"谁可能是下一手买方"，
    // 每条附可回溯证据交易（deal_id 可下钻），明确不给黑箱成交概率、不做无私有数据的战略匹配。
    const cohort = deals.filter(deal => comparableIds.includes(deal.deal_id));
    if (!cohort.length) return [];
    const byBuyer = new Map();
    cohort.forEach(deal => {
      const buyer = deal.buyer_or_partner || 'Undisclosed';
      if (!byBuyer.has(buyer)) byBuyer.set(buyer, {
        buyer,
        cohort_deals: 0,
        direct_deals: 0,
        deal_ids: [],
        stages: {},
        modalities: {},
        latest_year: '',
        disclosed_upfront: null,
      });
      const row = byBuyer.get(buyer);
      row.cohort_deals += 1;
      if (directIds.includes(deal.deal_id)) row.direct_deals += 1;
      row.deal_ids.push(deal.deal_id);
      const stage = deal.stage_at_announcement || 'Undisclosed';
      row.stages[stage] = (row.stages[stage] || 0) + 1;
      const modality = deal.modality || 'Undisclosed';
      row.modalities[modality] = (row.modalities[modality] || 0) + 1;
      const year = String(deal.announced_date || '').slice(0, 4);
      if (year && year > row.latest_year) row.latest_year = year;
      const econ = economics.get(deal.deal_id);
      if (econ && econ.has_upfront_disclosure) {
        row.disclosed_upfront = (row.disclosed_upfront || 0) + econ.upfront;
      }
    });
    // 全库总活跃度（跨主题），用来区分"高频扫货型"与"本主题偶发出手"
    const globalCounts = new Map();
    deals.forEach(deal => {
      const b = deal.buyer_or_partner || 'Undisclosed';
      globalCounts.set(b, (globalCounts.get(b) || 0) + 1);
    });
    const topStage = obj => Object.entries(obj).sort((a, b) => b[1] - a[1])[0];
    return [...byBuyer.values()]
      .filter(row => row.buyer && row.buyer !== 'Undisclosed')
      .map(row => {
        const stageTop = topStage(row.stages);
        const modTop = topStage(row.modalities);
        const globalDeals = globalCounts.get(row.buyer) || row.cohort_deals;
        // 可解释理由：只陈述可回溯的历史事实，不做概率外推
        const reasons = [];
        if (row.direct_deals) reasons.push(`本主题 Direct Comp 出手 ${row.direct_deals} 次`);
        else reasons.push(`本主题相邻可比出手 ${row.cohort_deals} 次`);
        if (stageTop) reasons.push(`偏好阶段：${stageTop[0]}`);
        if (globalDeals >= 3) reasons.push(`全库累计 ${globalDeals} 笔（高频活跃买方）`);
        if (row.latest_year) reasons.push(`最近一次 ${row.latest_year}`);
        return {
          buyer: row.buyer,
          cohort_deals: row.cohort_deals,
          direct_deals: row.direct_deals,
          global_deals: globalDeals,
          latest_year: row.latest_year,
          top_stage: stageTop ? stageTop[0] : 'Undisclosed',
          top_modality: modTop ? modTop[0] : 'Undisclosed',
          disclosed_upfront: row.disclosed_upfront,
          evidence_ids: row.deal_ids,
          reasons,
        };
      })
      .sort((a, b) =>
        b.direct_deals - a.direct_deals ||
        b.cohort_deals - a.cohort_deals ||
        b.global_deals - a.global_deals ||
        String(b.latest_year).localeCompare(String(a.latest_year)))
      .slice(0, 5);
  }

  function structureRows(deals, economics) {
    return deals
      .filter(deal => deal.deal_type === 'LICENSE_COLLABORATION')
      .map(deal => ({ ...deal, ...(economics.get(deal.deal_id) || {}) }))
      .filter(row => row.total > 0)
      .sort((a, b) => b.total - a.total || String(b.announced_date).localeCompare(String(a.announced_date)));
  }

  function comparatorSummary(dealIds, economics) {
    const rows = dealIds.map(id => economics.get(id)).filter(Boolean);
    return {
      count: rows.length,
      median_upfront: median(rows.map(row => row.upfront)),
      median_total: median(rows.map(row => row.total)),
      median_upfront_ratio: median(rows.map(row => row.upfront_ratio)),
      median_noncontingent_ratio: median(rows.map(row => row.noncontingent_ratio)),
    };
  }

  function datasetSummary(tables) {
    const deals = tables.deals || [];
    const terms = tables.deal_terms || [];
    const sources = tables.source_registry || [];
    const issues = tables.review_issues || [];
    const provenance = tables.field_provenance || [];
    const documents = tables.source_documents || [];
    const observations = tables.source_observations || [];
    const reconciliations = tables.reconciliation_results || [];
    const economics = buildEconomics(deals, terms);
    const licensing = deals.filter(d => d.deal_type === 'LICENSE_COLLABORATION');
    const acquisitions = deals.filter(d => d.deal_type === 'M_AND_A');
    const china = deals.filter(d => d.asset_origin_country === 'China');
    const chinaLicensing = china.filter(d => d.deal_type === 'LICENSE_COLLABORATION');
    const documentCounts = new Map();
    documents.forEach(document => documentCounts.set(document.deal_id, (documentCounts.get(document.deal_id) || 0) + 1));
    const crosscheckedDeals = deals.filter(deal => (documentCounts.get(deal.deal_id) || 0) > 1);
    const comparableLicensing = structureRows(licensing, economics);
    return {
      deals: deals.length,
      licensing: licensing.length,
      acquisitions: acquisitions.length,
      china_origin: china.length,
      china_origin_licensing: chinaLicensing.length,
      t0_coverage: deals.length ? deals.filter(d => d.primary_source_id).length / deals.length : 0,
      source_documents: documents.length,
      crosschecked_deals: crosscheckedDeals.length,
      crosschecked_deal_rate: deals.length ? crosscheckedDeals.length / deals.length : 0,
      mapped_sources: sources.length,
      active_sources: sources.filter(s => String(s.current_status).startsWith('ACTIVE_')).length,
      open_issues: issues.filter(i => i.status === 'OPEN').length,
      critical_issues: issues.filter(i => i.status === 'OPEN' && i.severity === 'CRITICAL').length,
      verified_evidence: provenance.filter(p => p.evidence_status === 'VERIFIED').length,
      partial_evidence: provenance.filter(p => p.evidence_status === 'PARTIAL').length,
      review_chain: {
        total: provenance.length,
        ai_extracted_pending: provenance.filter(p => p.review_stage === 'AI_EXTRACTED_PENDING_REVIEW').length,
        ai_human_dual: provenance.filter(p => p.review_stage === 'AI_HUMAN_DUAL').length,
        human_final: provenance.filter(p => p.review_stage === 'HUMAN_FINAL').length,
        agree: provenance.filter(p => p.ai_human_agreement === 'AGREE').length,
        resolved_diff: provenance.filter(p => p.ai_human_agreement === 'RESOLVED_DIFF').length,
        pending: provenance.filter(p => p.ai_human_agreement === 'PENDING').length,
      },
      source_observations: observations.length,
      source_independence_groups: new Set(observations.map(o => o.independence_group).filter(Boolean)).size,
      reconciliations: reconciliations.length,
      open_reconciliations: reconciliations.filter(r => r.review_status === 'OPEN').length,
      purchase_price_adjustments: reconciliations.filter(r => r.result_type === 'PURCHASE_PRICE_ADJUSTMENT').length,
      organizations: (tables.organizations || []).length,
      assets: (tables.assets || []).length,
      targets: (tables.targets || []).length,
      modalities: (tables.modalities || []).length,
      deal_party_edges: (tables.deal_parties || []).length,
      deal_asset_edges: (tables.deal_assets || []).length,
      payment_comparable_licensing: comparableLicensing.length,
      licensing_upfront_median: median(comparableLicensing.map(row => row.upfront)),
      economics,
    };
  }

  // 数据治理：可信度打分模型 + 校验规则清单（界面可视化用）
  // 设计原则：可信度靠"多源印证"累加；单一来源(即使权威公众号)不足以直接 100% 入库。
  function governanceModel(tables) {
    const T = tables;

    const docs = T.source_documents || [];

    const crosschecked = deals.filter(d => (docCountByDeal.get(d.deal_id) || 0) > 1).length;
    const t0Deals = deals.filter(d => d.primary_source_id).length;
    const humanFinal = provenance.filter(p => p.review_stage === 'HUMAN_FINAL').length;
    const aiHumanDual = provenance.filter(p => p.review_stage === 'AI_HUMAN_DUAL').length;
    const reconciledDeals = new Set(reconciliations.map(r => r.deal_id)).size;

    // 可信度打分规则（每条规则给出加分与当前命中数据量，全部来自真实数据）
    const confidenceRules = [
      {
        id: 'CR-PRIMARY', label: '一手来源直采', en: 'T0 issuer / exchange / filing',
        score: 60, base: true,
        trigger: 'issuer 官方公告 / 交易所文件 / 财报直接披露该字段',
        hits: t0Deals, unit: '笔交易有一手主来源',
        note: '交易经济事实的黄金标准来源。',
      },
      {
        id: 'CR-ATTRIBUTED', label: '权威公众号（带一手出处）', en: 'Authoritative WeChat w/ attribution',
        score: 45, base: true,
        trigger: '医药魔方/动脉网等有编辑审核的权威公众号，且标注可核验的一手出处',
        hits: docs.filter(d => d.source_tier === 'T1_ATTRIBUTED').length, unit: '篇带出处转述',
        note: '权威公众号可信度显著高于无名公众号，但单源仍需与一手/交叉比对叠加才达入库线。',

        trigger: '≥2 个独立来源对同一字段相互印证，口径一致',
        hits: crosschecked, unit: '笔交易已交叉比对',
        note: '多源独立印证是最强的可信度信号，可将中等来源推向入库线。',
      },
      {
        id: 'CR-RECONCILED', label: '+ 差异 reconciliation', en: '+ Discrepancy reconciled',
        score: 10, base: false,
        trigger: '来源间口径差异（announcement vs closing / 含或有）已被显式拆解调节',
        hits: reconciledDeals, unit: '笔交易有 reconciliation 记录',

      },

        score: 15, base: false,
        trigger: 'AI 抽取后经分析师人工复核/终审，AI-人工分歧已解决',
        hits: humanFinal + aiHumanDual, unit: '字段经 AI+人工核对',
        note: '人工把关是最后一道闸门；AI 与人工的分歧进入 reconciliation 而非被抹平。',
      },
    ];

    // 入库阈值与典型达标路径
    const promotionThreshold = 100;
    const promotionPaths = [
      { name: '一手 + 交叉比对', combo: ['CR-PRIMARY', 'CR-CROSSCHECK', 'CR-HUMAN'], total: 60 + 25 + 15, reaches: true },
      { name: '权威公众号 + 交叉比对 + 人工终审', combo: ['CR-ATTRIBUTED', 'CR-CROSSCHECK', 'CR-RECONCILED', 'CR-HUMAN'], total: 45 + 25 + 10 + 15, reaches: true },
      { name: '一般公众号单源', combo: ['CR-WECHAT-PLAIN'], total: 20, reaches: false },
    ];

    // 校验规则清单（结构化，对应 profile-data-quality.js 的真实校验维度）
    const validationRules = [
      { dim: '唯一性', en: 'Uniqueness', count: 11, rule: '每张核心表主键唯一，无重复', gate: 'FAIL 阻断' },
      { dim: '引用完整性', en: 'Referential integrity', count: 12, rule: '所有外键(交易↔条款/来源/参与方/资产/观察)可解析', gate: 'FAIL 阻断' },
      { dim: '完整性', en: 'Completeness', count: 3, rule: '每笔交易≥2主参与方、≥1资产边；≥50%交易多源', gate: '不足 50% 多源→WARN' },
      { dim: '有效性', en: 'Validity', count: 1, rule: '未披露金额保持空值，Unknown≠0', gate: 'FAIL 阻断' },
      { dim: '一致性', en: 'Consistency', count: 3, rule: 'ontology 计数=物理表；不可分配合并付款不进确定性比率；开放 reconciliation 清零后才 L3 发布', gate: 'FAIL/WARN' },
      { dim: '展示有效性', en: 'Presentation validity', count: 1, rule: '无披露 upfront 的买方保留 null 而非 0', gate: 'FAIL 阻断' },
      { dim: '发布完整性', en: 'Release integrity', count: 1, rule: 'BLOCKED 信号不得携带预测', gate: 'FAIL 阻断' },
      { dim: '权限边界', en: 'Permission boundary', count: 1, rule: '公开模式绝不输出潜在战略买方', gate: 'FAIL 阻断' },
    ];

    return {
      confidenceRules,
      promotionThreshold,
      promotionPaths,
      validationRules,
      totalValidationChecks: validationRules.reduce((s, r) => s + r.count, 0),
      stats: { crosschecked, t0Deals, reconciledDeals, humanFinal, aiHumanDual, totalDeals: deals.length },
    };
  }

  // 建模层数据资产：把清洗归一后的四个维度(交易/公司/资产/靶点模态)输出为可展示的样本实体，
  // 让"洗出来的数据资产"直观可见，而不只是计数。
  function modelingAssets(tables) {
    const T = tables;
    const orgs = T.organizations || [];
    const assets = T.assets || [];
    const targets = T.targets || [];
    const modalities = T.modalities || [];
    const deals = T.deals || [];
    const targetById = new Map(targets.map(t => [t.target_id, t.canonical_name]));
    const modalityById = new Map(modalities.map(m => [m.modality_id, m.canonical_name]));

    // 归一状态统计（体现清洗成果）
    const statusCount = (rows, field) => {
      const c = {};
      rows.forEach(r => { const s = r[field] || 'UNKNOWN'; c[s] = (c[s] || 0) + 1; });
      return c;
    };

    return {
      deal: {
        total: deals.length,
        sample: deals.slice().sort((a, b) => String(b.announced_date).localeCompare(String(a.announced_date))).slice(0, 6)
          .map(d => ({ id: d.deal_id, name: `${d.buyer_or_partner} × ${d.seller_or_partner}`, sub: `${d.announced_date} · ${d.asset_name}` })),
      },
      org: {
        total: orgs.length,
        byType: statusCount(orgs, 'entity_type'),
        sample: orgs.slice(0, 8).map(o => ({ id: o.organization_id, name: o.canonical_name, sub: `${o.entity_type} · ${o.country_or_region}`, status: o.identity_status })),
      },
      asset: {
        total: assets.length,
        sample: assets.slice(0, 8).map(a => ({
          id: a.asset_id, name: a.canonical_name,
          sub: `${targetById.get(a.target_id) || a.target_id} · ${modalityById.get(a.modality_id) || a.modality_id} · ${a.stage_at_announcement}`,
          status: a.identity_status,
        })),
      },
      target: {
        total: targets.length,
        modalityTotal: modalities.length,
        sample: targets.slice(0, 8).map(t => ({ id: t.target_id, name: t.canonical_name, sub: t.target_type, status: t.normalization_status })),
        modalities: modalities.slice(0, 8).map(m => ({ id: m.modality_id, name: m.canonical_name, sub: m.modality_family })),
      },
    };
  }

  // 数据血缘：底表 -> 派生指标 -> 四维分析结论。用真实表行数与 model 函数派生，说明结论如何从底表推导而来。
  function dataLineage(tables) {
    const T = tables;
    const rows = name => (T[name] || []).length;
    // 底表层（真实物理表 + 关键字段 + 行数）
    const baseTables = [
      { id: 'deals', name: 'deals', desc: '交易主表', fields: ['deal_id', 'deal_type', 'buyer_or_partner', 'asset_origin_country', 'announced_date'], rows: rows('deals') },
      { id: 'deal_terms', name: 'deal_terms', desc: '原子条款', fields: ['deal_id', 'term_type', 'amount_usd_m', 'included_in_analytical_sum'], rows: rows('deal_terms') },
      { id: 'deal_parties', name: 'deal_parties', desc: '交易主体', fields: ['deal_id', 'organization_id', 'party_role'], rows: rows('deal_parties') },
      { id: 'deal_assets', name: 'deal_assets', desc: '交易资产', fields: ['deal_id', 'asset_id'], rows: rows('deal_assets') },
      { id: 'organizations', name: 'organizations', desc: '机构主数据', fields: ['organization_id', 'canonical_name', 'entity_type'], rows: rows('organizations') },
      { id: 'assets', name: 'assets', desc: '资产主数据', fields: ['asset_id', 'target_id', 'modality_id', 'stage'], rows: rows('assets') },
    ];
    // 派生指标层（对应 model 纯函数）
    const metrics = [
      { id: 'buyerActivity', name: '买方活跃度', fn: 'buyerActivity()', from: ['deals', 'deal_terms', 'deal_parties'], rule: 'group by 买方 → 交易频次 + 已披露非或有现金（Unknown≠0）' },
      { id: 'structurePulse', name: '交易结构脉冲', fn: 'annualStructurePulse()', from: ['deals', 'deal_terms'], rule: '仅 Licensing → 按年 median(upfront/headline)，原子条款分离' },
      { id: 'modalityMatrix', name: '模态×年份矩阵', fn: 'modalityYearMatrix()', from: ['deals', 'deal_assets', 'assets'], rule: 'count by (模态族 × 年)，不换算全市场份额' },
      { id: 'originFlows', name: '来源→买方流向', fn: 'originBuyerFlows()', from: ['deals', 'deal_parties', 'organizations'], rule: '资产来源地 → 买方区域走廊计数' },
    ];
    // 结论层（四维分析视图）
    const conclusions = [
      { id: 'buyer', name: '维度一 · 买方画像与出手活跃度', from: ['buyerActivity'], view: 'landscape' },
      { id: 'structure', name: '维度二 · 交易结构演变', from: ['structurePulse'], view: 'landscape' },
      { id: 'modality', name: '维度三 · 技术模态与靶点流向', from: ['modalityMatrix'], view: 'landscape' },
      { id: 'origin', name: '维度四 · 资产地域流向', from: ['originFlows'], view: 'landscape' },
    ];
    return { baseTables, metrics, conclusions };
  }

  return {
    number,
    bool,
    median,
    groupCount,
    buildEconomics,
    filterDeals,
    buyerActivity,
    buyerRegion,
    buyerSegmentByProfile,
    buyerProfile,
    annualStructurePulse,
    modalityYearMatrix,
    originBuyerFlows,
    disclosedShareBreakdown,
    referencedMarketContext,
    buildSignalInbox,
    buildThesisWorkspace,
    explainableBuyerShortlist,
    structureRows,
    comparatorSummary,
    datasetSummary,
    governanceModel,
    modelingAssets,
    dataLineage,
  };
});

  function escapeHtml(value) {
    return String(value === null || value === undefined ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function formatMoney(value) {
    if (value === null || value === undefined || !Number.isFinite(Number(value))) return '未披露';
    const amount = Number(value);
    if (Math.abs(amount) >= 1000) {
      const billions = amount / 1000;
      return `$${Number.isInteger(billions) ? billions.toFixed(0) : billions.toFixed(1)}B`;
    }
    return `$${Math.round(amount).toLocaleString('en-US')}M`;
  }

  function classToken(value) {
    // 归一化为连字符 class（含下划线也转成 -），与 CSS 里的 .segment-eu-pharma 等对齐。
    // 曾因保留下划线（eu_pharma）导致与连字符 CSS 选择器不匹配、气泡全部 fallback 成默认蓝。
    return String(value || 'other').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function niceLogTicks(maxValue) {
    // 现金跨度可达两个数量级（数百 M 到近 20B），线性轴会把中小买方压在底部。
    // 采用 log10 分档刻度，让"少量大额"与"多笔中额"都可读。
    const top = Math.max(1000, maxValue);
    const ticks = [];
    for (let exp = 2; Math.pow(10, exp) <= top * 1.4; exp += 1) {
      ticks.push(Math.pow(10, exp)); // 100M, 1B, 10B ...
    }
    if (!ticks.length) ticks.push(1000);
    return ticks;
  }

  function bubbleRadius(cash, maxCash, disclosed) {
    if (!disclosed) return 5;
    const ratio = Math.sqrt(Math.max(0, cash) / (maxCash || 1));
    return Math.max(6, Math.min(24, 6 + ratio * 18));
  }

  function renderBuyerScatter(rows, selectedBuyer) {
    const visible = rows.slice(0, 14);
    const disclosed = visible.filter(row => Number.isFinite(row.disclosed_noncontingent) && row.disclosed_noncontingent > 0);
    const maxDeals = Math.max(2, ...visible.map(row => row.deals || 0));
    const maxCash = Math.max(1000, ...disclosed.map(row => row.disclosed_noncontingent));

    const PLOT = { left: 58, right: 600, top: 34, bottom: 250 };
    const logMin = 2;
    const logMax = Math.log10(maxCash) + 0.2;
    const x = value => PLOT.left + ((Number(value) || 0) / maxDeals) * (PLOT.right - PLOT.left);
    const y = value => {
      const v = Math.max(Math.pow(10, logMin), Number(value) || 0);
      const ratio = (Math.log10(v) - logMin) / (logMax - logMin);
      return PLOT.bottom - Math.max(0, Math.min(1, ratio)) * (PLOT.bottom - PLOT.top);
    };

    const yTicks = niceLogTicks(maxCash).map(value => `
      <g class="grid-tick">
        <line class="grid-line" x1="${PLOT.left}" y1="${y(value).toFixed(1)}" x2="${PLOT.right}" y2="${y(value).toFixed(1)}"></line>
        <text class="axis-tick" x="${PLOT.left - 8}" y="${(y(value) + 3).toFixed(1)}" text-anchor="end">${formatMoney(value)}</text>
      </g>`).join('');

    const xTicks = [];
    for (let d = 1; d <= maxDeals; d += 1) {

    }

      .map((row, index) => ({ row, index }))
      .sort((a, b) => (b.row.disclosed_noncontingent || 0) - (a.row.disclosed_noncontingent || 0));

    // 直接标注最多 6 个：优先标注已披露现金最高者（气泡最大、最值得看名字），选中者始终标注。
    const labelRank = new Map();
    ordered.filter(({ row }) => Number.isFinite(row.disclosed_noncontingent) && row.disclosed_noncontingent > 0)
      .forEach(({ index }, rank) => labelRank.set(index, rank));

    // 防重叠：先按数据算理想坐标，再做碰撞散开（主要沿 X、少量沿 Y），

      const r = bubbleRadius(row.disclosed_noncontingent, maxCash, disclosedCash);
      return {
        index,
        disclosedCash,
        r,
        x0: x(row.deals),
        y0: disclosedCash ? y(row.disclosed_noncontingent) : PLOT.bottom - 8,
        cx: x(row.deals),
        cy: disclosedCash ? y(row.disclosed_noncontingent) : PLOT.bottom - 8,
      };
    });
    const movable = nodes;
    const PAD = 3;
    const clamp = node => {
      node.cx = Math.max(PLOT.left + node.r, Math.min(PLOT.right - node.r, node.cx));
      node.cy = Math.max(PLOT.top + node.r, Math.min(PLOT.bottom - node.r, node.cy));
    };
    for (let iter = 0; iter < 320; iter += 1) {
      for (let a = 0; a < movable.length; a += 1) {
        for (let b = a + 1; b < movable.length; b += 1) {
          const n1 = movable[a];
          const n2 = movable[b];
          let dx = n2.cx - n1.cx;
          let dy = n2.cy - n1.cy;
          let dist = Math.hypot(dx, dy);
          const minDist = n1.r + n2.r + PAD;
          if (dist < minDist) {
            if (dist < 0.01) { dx = ((a + b) % 2 ? 1 : -1); dy = ((a * 7 + b) % 2 ? 1 : -1) * 0.6; dist = Math.hypot(dx, dy); }
            const overlap = (minDist - dist) / 2;
            const ux = dx / dist;
            const uy = dy / dist;
            n1.cx -= ux * overlap; n1.cy -= uy * overlap;
            n2.cx += ux * overlap; n2.cy += uy * overlap;
          }
        }
      }
      // 弱回拉到理想坐标，保住"越右越高频、越高越大额"的语义，但不抵消散开
      movable.forEach(node => {
        node.cx += (node.x0 - node.cx) * 0.012;
        node.cy += (node.y0 - node.cy) * 0.02;

    const marks = ordered.map(({ row, index }) => {
      const disclosedCash = Number.isFinite(row.disclosed_noncontingent) && row.disclosed_noncontingent > 0;
      const node = posByIndex.get(index);
      const cx = node.cx;
      const cy = node.cy;
      const selected = row.buyer === selectedBuyer;
      const r = bubbleRadius(row.disclosed_noncontingent, maxCash, disclosedCash);
      const showDirectLabel = selected || (labelRank.has(index) && labelRank.get(index) < 6);
      const labelDy = -(r + 5);
      const description = disclosedCash
        ? `${row.buyer}：${row.deals} 笔，已披露非或有现金 ${formatMoney(row.disclosed_noncontingent)}`
        : `${row.buyer}：未披露`;

        <g class="buyer-mark segment-${classToken(row.segment)}${selected ? ' is-selected' : ''}${disclosedCash ? '' : ' is-undisclosed'}"
          role="button" tabindex="0" aria-label="${escapeHtml(description)}"
          data-select-buyer="${escapeHtml(row.buyer)}" transform="translate(${cx.toFixed(1)} ${cy.toFixed(1)})">
          <circle class="buyer-bubble" r="${(disclosedCash ? r : 5).toFixed(1)}"></circle>
          <circle class="buyer-core" r="${disclosedCash ? 2.6 : 3.4}"></circle>
          ${showDirectLabel ? `<text class="buyer-name" x="0" y="${labelDy.toFixed(1)}" text-anchor="middle">${escapeHtml(row.buyer)}</text>` : ''}
          ${disclosedCash ? '' : '<text class="unknown-label" x="0" y="16" text-anchor="middle">未披露</text>'}

          <title id="buyer-chart-title">买方活跃度气泡图：交易频次、已披露现金与买方类型</title>
          <desc id="buyer-chart-desc">横轴为披露样本交易数（越右越高频），纵轴为已披露非或有现金对数刻度（越高越大额），气泡越大代表现金越多，颜色代表买方国别与类型。右上大气泡为真金白银大买手，右下小气泡为高频扫货型买家。</desc>

          <text class="axis-label" x="${PLOT.left - 46}" y="${PLOT.top - 14}">现金 ↑</text>
          ${marks}
        </svg>
        <div class="bubble-legend" aria-hidden="true">
          <span class="bl-item"><i class="bl-dot seg-us"></i>美国大药企</span>
          <span class="bl-item"><i class="bl-dot seg-eu"></i>欧洲药企</span>
          <span class="bl-item"><i class="bl-dot seg-biotech"></i>中型 Biopharma</span>
          <span class="bl-item"><i class="bl-dot seg-china"></i>中国药企</span>
          <span class="bl-item bl-size"><i class="bl-sz bl-sz-lg"></i><i class="bl-sz bl-sz-sm"></i>气泡大小 = 已披露现金</span>

  function renderStructurePulse(rows) {

      trend = {

        dir: delta <= -1 ? 'down' : delta >= 1 ? 'up' : 'flat',
        first: first.year,
        last: last.year,
        firstPct: (first.median_upfront_ratio * 100).toFixed(0),

      };
    }
    const trendBanner = trend ? `
      <div class="structure-trend trend-${trend.dir}">
        <span class="trend-arrow" aria-hidden="true">${trend.dir === 'down' ? '↓' : trend.dir === 'up' ? '↑' : '→'}</span>
        <p>Upfront 中位占比 ${trend.first}→${trend.last}：<b>${trend.firstPct}% → ${trend.lastPct}%</b>。${trend.dir === 'down' ? '首付占比走低 = 买方更倾向里程碑分期、风险共担。' : trend.dir === 'up' ? '首付占比走高 = 买方更愿前置付现、竞争加剧。' : '首付占比大体持平。'}</p>
      </div>` : '';

    const items = rows.map(row => {
      const hasRatio = Number.isFinite(row.median_upfront_ratio);
      const evidenceIds = (row.included_ids || []).join('|');
      const coverage = row.count ? row.comparable_count / row.count : 0;
      // 四段结构拆解：Upfront / 非或有周年付款 / 或有里程碑；三段归一化到 100%，Royalty 单独做存在性标记
      const up = Math.max(0, row.median_upfront_seg || 0);
      const nc = Math.max(0, row.median_noncontingent_seg || 0);
      const ct = Math.max(0, row.median_contingent_seg || 0);
      const sum = up + nc + ct;
      const hasSeg = sum > 0;
      const seg = hasSeg
        ? { up: up / sum * 100, nc: nc / sum * 100, ct: ct / sum * 100 }
        : { up: 0, nc: 0, ct: 0 };
      const royaltyN = row.royalty_deal_count || 0;
      const royaltyBadge = royaltyN
        ? `<span class="structure-royalty" title="${escapeHtml(`${royaltyN} 笔含销售分成 Royalty（多数仅披露存在、未披露费率）`)}">+Royalty ×${royaltyN}</span>`
        : '';
      const segTitle = escapeHtml(`${row.year} 结构中位：首付 ${seg.up.toFixed(0)}% · 非或有周年 ${seg.nc.toFixed(0)}% · 或有里程碑 ${seg.ct.toFixed(0)}%`);

          <span class="structure-year-label">${escapeHtml(row.year)}</span>
          <span class="structure-bar structure-bar-4${hasSeg ? '' : ' is-empty'}" aria-hidden="true" title="${segTitle}">
            <span class="seg-upfront" style="width:${seg.up.toFixed(1)}%"></span>
            <span class="seg-noncontingent" style="width:${seg.nc.toFixed(1)}%"></span>
            <span class="seg-contingent" style="width:${seg.ct.toFixed(1)}%"></span>

      <div class="structure-pulse" role="group" aria-label="年度披露可比交易结构四段拆解">
        ${trendBanner}
        <div class="structure-legend structure-legend-4">
          <span><i class="lg-seg lg-upfront"></i>首付</span>
          <span><i class="lg-seg lg-noncontingent"></i>非或有周年</span>
          <span><i class="lg-seg lg-contingent"></i>或有里程碑</span>
          <span><i class="lg-royalty"></i>Royalty（仅标记）</span>
        </div>
        ${items || '<p class="empty-state">当前筛选下没有可比较的 Licensing 条款。</p>'}
        <details class="structure-note">
          <summary>读图说明：三段归一化占比 + Royalty 为何只标记不入段</summary>
          <p>headline 金额只拆到披露粒度：首付 / 非或有周年付款 / 或有里程碑三段归一化占比。<b>销售分成（Royalty）是按销售额浮动的百分比，不构成一次性 headline 金额</b>，公告普遍只披露"有 tiered royalty"而不披露费率，故仅在命中时以角标标记存在，不编造金额段 —— 刻意的诚实留白，避免把未披露项虚构成可比数字。</p>
        </details>
      </div>`;
  }

  function renderModalityMatrix(matrix, selectedModality) {
    const maxCount = Math.max(1, ...matrix.cells.map(cell => cell.deal_count || 0));
    const rowTotals = new Map();
    const colTotals = new Map();
    matrix.cells.forEach(cell => {
      rowTotals.set(cell.modality, (rowTotals.get(cell.modality) || 0) + (cell.deal_count || 0));
      colTotals.set(cell.year, (colTotals.get(cell.year) || 0) + (cell.deal_count || 0));
    });

          data-select-modality="${escapeHtml(modality)}" data-open-evidence="${escapeHtml((cell.deal_ids || []).join('|'))}"
          aria-label="${escapeHtml(`${modality}，${year} 年，${cell.deal_count} 笔披露交易`)}">${cell.deal_count || ''}</button></td>`;
      }).join('');
      const rowTotal = rowTotals.get(modality) || 0;
      const rowBar = Math.max(6, (rowTotal / maxRowTotal) * 100);
      return `<tr class="${modality === selectedModality ? 'is-selected' : ''}">
        <th scope="row"><button type="button" data-select-modality="${escapeHtml(modality)}">${escapeHtml(modality)}</button></th>${cells}
        <td class="matrix-total"><span class="matrix-total-bar" aria-hidden="true"><span style="width:${rowBar.toFixed(1)}%"></span></span><b>${rowTotal}</b></td></tr>`;
    }).join('');
    const footer = `<tr class="matrix-foot"><th scope="row">合计</th>${matrix.years.map(year => `<td>${colTotals.get(year) || 0}</td>`).join('')}<td class="matrix-total"><b>${matrix.cells.reduce((s, c) => s + (c.deal_count || 0), 0)}</b></td></tr>`;
    return `
      <div class="matrix-legend" aria-hidden="true"><span>低</span><i data-intensity="1"></i><i data-intensity="2"></i><i data-intensity="3"></i><i data-intensity="4"></i><span>高 · 披露交易数</span></div>
      <div class="matrix-scroll">
        <table class="modality-matrix" aria-label="模态与年份披露交易矩阵">
          <thead><tr><th scope="col">模态</th>${matrix.years.map(year => `<th scope="col">${escapeHtml(year)}</th>`).join('')}<th scope="col">合计</th></tr></thead>
          <tbody>${rows}${footer}</tbody>
        </table>
      </div>`;
  }

  function renderOriginFlows(rows, selectedOrigin) {
    const maxCount = Math.max(1, ...rows.map(row => row.deal_count || 0));
    return `
      <div class="origin-flow-list" role="list" aria-label="资产来源地到买方区域的披露交易走廊">
        ${rows.map(row => {
          const width = Math.max(8, (row.deal_count / maxCount) * 100);
          return `<button type="button" role="listitem" class="origin-flow-row${row.origin === selectedOrigin ? ' is-selected' : ''}"
            data-select-origin="${escapeHtml(row.origin)}" data-open-evidence="${escapeHtml((row.deal_ids || []).join('|'))}">
            <span class="flow-label"><strong>${escapeHtml(row.origin)}</strong><span>→</span><strong>${escapeHtml(row.buyer_region)}</strong></span>
            <span class="flow-track" aria-hidden="true"><span style="width:${width.toFixed(1)}%"></span></span>
            <span class="flow-value">${row.deal_count} 笔</span>
          </button>`;
        }).join('') || '<p class="empty-state">当前筛选下没有可解析的跨区域交易走廊。</p>'}
      </div>`;
  }

  return {
    escapeHtml,
    formatMoney,
    renderBuyerScatter,
    renderStructurePulse,
    renderModalityMatrix,
    renderOriginFlows,
  };
});

    return M.filterDeals(T.deals, state.filters);
  }

  function uniqueValues(rows, field) {
    return [...new Set(rows.map(row => row[field] || 'Undisclosed'))].sort((a, b) => a.localeCompare(b));
  }

  function filterSelect(key, label, values) {
    const selected = state.filters[key];
    return `<label class="filter-control"><span>${C.escapeHtml(label)}</span><select data-filter="${key}">
      <option value="all">全部</option>
      ${values.map(value => `<option value="${C.escapeHtml(value)}"${value === selected ? ' selected' : ''}>${C.escapeHtml(value)}</option>`).join('')}
    </select></label>`;
  }

  function renderBuyerTable(rows) {
    return `<div class="compact-table-wrap buyer-table-wrap"><table class="compact-table buyer-table">
      <thead><tr><th>买方</th><th>交易</th><th>Lic / M&amp;A</th><th>已披露${glossary('非或有')}现金</th><th>披露覆盖</th><th></th></tr></thead>
      <tbody>${rows.slice(0, 7).map(row => `<tr>
        <td><button type="button" class="table-link" data-select-buyer="${C.escapeHtml(row.buyer)}">${C.escapeHtml(row.buyer)}</button></td>
        <td class="numeric">${row.deals}</td>
        <td class="numeric">${row.licensing} / ${row.acquisitions}</td>
        <td class="numeric">${C.formatMoney(row.disclosed_noncontingent)}</td>
        <td><span class="cell-bar"><span style="width:${row.deals ? (row.noncontingent_disclosure_count / row.deals) * 100 : 0}%"></span></span><span class="cell-value">${row.noncontingent_disclosure_count}/${row.deals}</span></td>
        <td><button type="button" class="profile-link" data-profile-buyer="${C.escapeHtml(row.buyer)}" aria-label="查看 ${C.escapeHtml(row.buyer)} 买方画像">画像</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  }

  function renderTargetList(deals) {
    const targets = M.groupCount(deals, 'target').slice(0, 5);
    return `<ol class="target-list">${targets.map((row, index) => `<li><span>${index + 1}</span><strong>${C.escapeHtml(row.label)}</strong><em>${row.count} 笔</em></li>`).join('') || '<li class="empty-state">当前筛选下无靶点记录。</li>'}</ol>`;
  }

  function renderPanelHeading(index, title, conclusion, scope) {
    return `<header class="panel-heading">
      <div><span class="panel-index">${index}</span><h2>${title}</h2></div>
      <span class="panel-scope">${scope}</span>
      <p>${conclusion}</p>
    </header>`;
  }

  function renderEvidenceDrawer() {
    if (!state.evidenceDealIds.length) return '';
    const deals = state.evidenceDealIds.map(id => T.deals.find(row => row.deal_id === id)).filter(Boolean);
    const rows = deals.map(deal => {
      const econ = economics.get(deal.deal_id);
      const terms = T.deal_terms.filter(term => term.deal_id === deal.deal_id);
      const sources = T.source_documents.filter(source => source.deal_id === deal.deal_id);
      return `<tr>
        <td class="sticky-cell"><strong>${C.escapeHtml(deal.deal_id)}</strong><span>${C.escapeHtml(deal.announced_date)}</span></td>
        <td>${C.escapeHtml(deal.buyer_or_partner)}<span>${C.escapeHtml(deal.seller_or_partner)}</span></td>
        <td><strong>${C.escapeHtml(deal.asset_name)}</strong><span>${C.escapeHtml(deal.target || 'Undisclosed')} · ${C.escapeHtml(deal.modality || 'Undisclosed')}</span></td>
        <td><span class="tag tag-stage">${C.escapeHtml(deal.stage_at_announcement || 'Undisclosed')}</span></td>
        <td><span class="tag tag-type">${deal.deal_type === 'M_AND_A' ? 'M&amp;A' : 'Licensing'}</span></td>
        <td>${C.escapeHtml(deal.asset_origin_country || 'Undisclosed')}</td>
        <td class="numeric">${C.formatMoney(econ && econ.has_upfront_disclosure ? econ.upfront : null)}</td>
        <td class="numeric">${C.formatMoney(econ && econ.has_noncontingent_disclosure ? econ.noncontingent : null)}</td>
        <td><span class="tag ${deal.source_confidence === 'HIGH' ? 'tag-verified' : 'tag-partial'}">${C.escapeHtml(deal.source_confidence || 'Partial')}</span></td>
        <td class="row-detail"><details><summary>展开</summary>
          <div class="atomic-terms"><strong>Atomic Terms</strong>${terms.map(term => `<span>${C.escapeHtml(term.term_type)} · ${term.amount ? C.formatMoney(Number(term.amount)) : '未披露'} · ${C.escapeHtml(term.contingency)}</span>`).join('')}</div>
          <div class="source-links"><strong>Evidence</strong>${sources.map(source => `<a href="${C.escapeHtml(source.url)}" target="_blank" rel="noreferrer">${C.escapeHtml(source.publisher)} · ${C.escapeHtml(source.title)}</a>`).join('')}</div>
        </details></td>
      </tr>`;
    }).join('');
    return `<aside class="evidence-drawer" id="evidence-drawer" aria-labelledby="evidence-drawer-title">
      <header><div><span class="eyebrow">具名证据 · NAMED EVIDENCE</span><h2 id="evidence-drawer-title">证据抽屉 · Evidence Drawer</h2><p>${deals.length} 笔披露交易 · 原子条款（Atomic Terms）与来源可追溯</p></div><button type="button" class="quiet-button" id="closeEvidenceDrawer">关闭</button></header>
      <div class="evidence-table-wrap"><table class="evidence-table">
        <thead><tr><th>Deal / Date</th><th>Buyer / Seller</th><th>Asset / Target / Modality</th><th>Stage</th><th>Type</th><th>Origin</th><th>${glossary('Upfront')}</th><th>${glossary('非或有')}现金</th><th>Evidence</th><th>详情</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </aside>`;
  }

  function renderBuyerProfile() {
    if (!state.profileBuyer) return '';
    const p = M.buyerProfile(state.profileBuyer, T.deals, economics, T.deal_parties, T.organizations);
    if (!p) return '';
    const prefChips = (list, unit) => list.map(item =>
      `<span class="pref-chip">${C.escapeHtml(item.label)}<em>${item.count}${unit || ''}</em></span>`).join('') || '<span class="pref-chip is-empty">无记录</span>';
    const corridorRows = p.corridors.map(c =>
      `<li><span>${C.escapeHtml(c.origin)} → ${C.escapeHtml(c.buyer_region)}</span><em>${c.deal_count} 笔</em></li>`).join('') || '<li class="is-empty">无跨区域走廊</li>';
    const dealRows = p.deal_list.map(d => `<tr>
        <td><strong>${C.escapeHtml(d.deal_id)}</strong><span>${C.escapeHtml(d.announced_date)}</span></td>
        <td><strong>${C.escapeHtml(d.asset_name)}</strong><span>${C.escapeHtml(d.target)} · ${C.escapeHtml(d.modality)}</span></td>
        <td><span class="tag tag-type">${d.deal_type === 'M_AND_A' ? 'M&amp;A' : 'Licensing'}</span></td>
        <td class="numeric">${C.formatMoney(d.disclosed_noncontingent)}</td>
        <td><button type="button" data-open-evidence="${C.escapeHtml(d.deal_id)}">证据</button></td>
      </tr>`).join('');
    const blockedCards = p.blocked_dimensions.map(b => `<article class="blocked-dimension">
        <header><span>${C.escapeHtml(b.label)}</span><b class="status-label status-blocked">Blocked</b></header>
        <p>数据源未接入 · 需要：${C.escapeHtml(b.required)}</p>
      </article>`).join('');
    return `<aside class="buyer-profile-drawer" id="buyer-profile-drawer" aria-labelledby="buyer-profile-title">
      <header>
        <div><span class="eyebrow">观察到的买方意愿 · OBSERVED BUYER APPETITE · 披露样本</span><h2 id="buyer-profile-title">${C.escapeHtml(p.buyer)}</h2>
        <p>${p.deals} 笔披露交易（Licensing ${p.licensing} / M&amp;A ${p.acquisitions}）· 活跃年份 ${p.years.join('、') || '—'}</p></div>
        <button type="button" class="quiet-button" id="closeBuyerProfile">关闭</button>
      </header>
      <div class="profile-body">
        <section class="profile-metrics">
          <div><dt>已披露${glossary('非或有')}现金</dt><dd>${C.formatMoney(p.disclosed_noncontingent)}</dd><small>${p.noncontingent_disclosure_count}/${p.deals} 笔有披露</small></div>
          <div><dt>模态偏好</dt><dd class="chips">${prefChips(p.modality_preference)}</dd></div>
          <div><dt>靶点偏好</dt><dd class="chips">${prefChips(p.target_preference)}</dd></div>
          <div><dt>阶段偏好</dt><dd class="chips">${prefChips(p.stage_preference)}</dd></div>
        </section>
        <section class="profile-corridors">
          <h3>资产来源走廊</h3><ul class="corridor-list">${corridorRows}</ul>
        </section>
        <section class="profile-deals">
          <h3>披露交易史</h3>
          <div class="compact-table-wrap"><table class="compact-table">
            <thead><tr><th>Deal / Date</th><th>Asset / Target / Modality</th><th>Type</th><th>${glossary('非或有')}现金</th><th>证据</th></tr></thead>
            <tbody>${dealRows}</tbody>
          </table></div>
        </section>
        <section class="profile-blocked">
          <h3>扩展画像维度 · 数据源未接入</h3>
          <p class="profile-blocked-note">以下维度需要外部数据源才能计算；在接入前保持 Blocked，不用估算值伪造。</p>
          <div class="blocked-dimension-grid">${blockedCards}</div>
        </section>
      </div>
    </aside>`;
  }

  function renderFilterBar() {
    return `<section class="global-filter-bar${state.filtersOpen ? ' is-open' : ''}" id="global-filter-bar" aria-label="全局筛选">
      <div class="filter-intro"><strong>分析范围</strong><span>2021–2026 · 披露样本 ${glossary('Named cohort')}</span></div>
      <button type="button" class="filter-trigger" id="filterTrigger" aria-expanded="${state.filtersOpen}">筛选条件</button>
      <div class="filter-controls">
        ${filterSelect('year', '时间', uniqueValues(T.deals.map(row => ({ year: String(row.announced_date).slice(0, 4) })), 'year'))}
        ${filterSelect('type', '交易类型', uniqueValues(T.deals, 'deal_type'))}
        ${filterSelect('stage', '资产阶段', uniqueValues(T.deals, 'stage_at_announcement'))}
        ${filterSelect('origin', '资产来源', uniqueValues(T.deals, 'asset_origin_country'))}
        ${filterSelect('modality', '模态', uniqueValues(T.deals, 'modality'))}
      </div>
      <button type="button" class="quiet-button" id="resetFilters">重置</button>
    </section>`;
  }

  function signalStateLabel(signal) {
    if (signal.release_state === 'BLOCKED') return '阻断';
    if (signal.release_state === 'WATCH') return '观察';
    return '可用';
  }

  function renderSignalInbox(activeSignal) {
    // 边界声明（dimension=BOUNDARY）不是可行动的分析信号，而是"系统不能回答什么"的诚实约束。
    // 它不该与分析信号平级混排、更不该置顶——拆出为顶部背景约束条，信号列表只留可决策的分析信号。
    const actionSignals = signals.filter(signal => signal.dimension !== 'BOUNDARY');
    const boundarySignals = signals.filter(signal => signal.dimension === 'BOUNDARY');
    const boundaryBanner = boundarySignals.map(signal => `<button type="button" class="boundary-note${signal.id === (activeSignal && activeSignal.id) ? ' is-selected' : ''}" data-select-signal="${signal.id}" aria-label="分析边界：${C.escapeHtml(signal.title)}">
        <span class="boundary-flag">分析边界</span>
        <span class="boundary-copy"><strong>${C.escapeHtml(signal.title)}</strong><small>${C.escapeHtml(signal.inference)}</small></span>
        <span class="boundary-state">${signalStateLabel(signal)}</span>
      </button>`).join('');
    return `<section class="signal-inbox" id="signal-inbox" aria-labelledby="signal-inbox-title">
      <header><div><span class="eyebrow">AI 主动洞察 · 证据编排 · EVIDENCE-ORCHESTRATED</span><h2 id="signal-inbox-title">AI 信号</h2><p class="signal-lead">点击信号，整页切换为该主题的结构化 Thesis；AI 负责证据编排，不改变 ${glossary('release gate')}。</p></div><span class="signal-count">${actionSignals.length}</span></header>
      ${boundaryBanner ? `<div class="boundary-band" aria-label="分析边界约束">${boundaryBanner}</div>` : ''}
      <div class="signal-list-label">可行动分析信号</div>
      <div class="signal-list signal-list-row">${actionSignals.map((signal, index) => `<button type="button" class="signal-card${signal.id === (activeSignal && activeSignal.id) ? ' is-selected' : ''}" data-select-signal="${signal.id}">
        <span class="signal-rank">${String(index + 1).padStart(2, '0')}</span>
        <span class="signal-copy"><strong>${C.escapeHtml(signal.title)}</strong><span>${C.escapeHtml(signal.fact)}</span><small>${signal.release_level} · ${C.escapeHtml(signal.coverage)} · 更新 ${C.escapeHtml(signal.freshness)}</small></span>
        <span class="signal-state state-${signal.release_state.toLowerCase()}">${signalStateLabel(signal)}</span>
      </button>`).join('')}</div>
    </section>`;
  }

  // 样本内可发布占比：把"能诚实发布的"(样本内结构占比)与"不能发布的"(全球份额)并置，
  // 让边界从纯免责声明升级为"这是我能给的 + 这是我不能给的"。
  function renderDisclosedShare(b) {
    const bars = b.rows.map(r => `<div class="dshare-row">
      <span class="dshare-key">${C.escapeHtml(r.key)}</span>
      <span class="dshare-track"><span class="dshare-fill" style="width:${r.pct}%"></span></span>
      <span class="dshare-val">${r.count} 笔 · ${r.pct}%</span>
    </div>`).join('');
    return `<article class="disclosed-share-block">
      <span>能诚实发布的 · 样本内结构占比</span>
      <strong>分母 = ${C.escapeHtml(b.denominator_label)}（可逐笔追溯），非全球普查。</strong>
      <div class="dshare-list">${bars}</div>
      <div class="dshare-split">
        <div class="dshare-can"><b>可发布</b><small>样本内占比（我这批交易里 X 占多少）</small></div>
        <div class="dshare-cannot"><b>不可发布</b><small>全球市场份额 / 同比（需全球分母，当前 Blocked）</small></div>
      </div>
      <small class="dshare-note">${C.escapeHtml(b.note)}</small>
    </article>`;
  }

  // 第三方引用口径的市场定位：用公开可引用的行业口径(医药魔方 NextPharma 等)作分母,
  // 回答"样本在该口径下覆盖率/定位", 明确标注来源+口径边界+误差, 把边界从 Blocked 变为有产出。
  function renderReferencedMarket(rm) {
    const rows = rm.benchmarks.map(b => `<div class="refmkt-row">
      <div class="refmkt-scope"><strong>${C.escapeHtml(b.scope)}</strong><span class="refmkt-src">来源：${C.escapeHtml(b.source_name)}（${C.escapeHtml(b.via)}，${C.escapeHtml(b.source_discovery_id)}）</span></div>
      <div class="refmkt-nums">
        <span class="refmkt-cell"><b>${C.escapeHtml(b.denominator_label)}</b><small>引用口径分母</small></span>
        <span class="refmkt-cell"><b>${b.our_sample} 笔</b><small>我方样本命中</small></span>
        <span class="refmkt-cell refmkt-pct"><b>${b.coverage_pct}%</b><small>样本覆盖率(估算)</small></span>
      </div>
    </div>`).join('');
    return `<article class="referenced-market-block">
      <span>基于第三方引用口径的市场定位 · 可引用但带误差</span>
      <strong>我们没有商业库授权，改用公开可引用的行业口径作分母，回答样本在市场中的位置。</strong>
      <div class="refmkt-list">${rows}</div>
      <small class="refmkt-method">${C.escapeHtml(rm.method)}</small>
      <small class="refmkt-error"><b>数据源限制与误差：</b>${C.escapeHtml(rm.error_note)}</small>
    </article>`;
  }

  function renderDecisionDock() {
    const signal = signals.find(item => item.id === state.selectedSignal);
    if (!state.decisionDockOpen || !signal) {
      // 未选信号时不渲染冗余触发钮（信号卡本身即入口）；选了信号但收起时给一个重新展开入口
      if (!state.selectedSignal) return '';
      return `<button type="button" class="decision-dock-trigger" id="decisionDockTrigger">展开决策坞 · 事实 → 行动</button>`;
    }
    const hasEvidence = signal.evidence_deal_ids && signal.evidence_deal_ids.length;
    // 带第三方引用口径的市场定位信号：用"事实 / 定位口径 / 影响 / 下一步"叙事，
    // 不再是"缺口 / 解锁条件"的免责声明——因为已用医药魔方等权威口径把年度趋势答出来了。
    const hasMarketContext = signal.referenced_market && signal.referenced_market.available;
    const eyebrow = hasMarketContext ? '市场定位 · MARKET POSITIONING · 第三方口径' : '交易到退出 · CAPITAL-TO-EXIT';
    const dockClass = hasMarketContext ? 'decision-dock is-market' : 'decision-dock';
    if (hasMarketContext) {
      return `<section class="${dockClass}" id="decision-dock" aria-labelledby="decision-dock-title">
        <header><div><span class="eyebrow">${eyebrow}</span><h2 id="decision-dock-title">市场定位 · ${C.escapeHtml(signal.title)}</h2></div><button type="button" class="quiet-button" id="closeDecisionDock">收起</button></header>
        <div class="decision-spine">
          <article><span>01 · 已答口径</span><strong>${C.escapeHtml(signal.fact)}</strong></article>
          ${signal.disclosed_breakdown ? renderDisclosedShare(signal.disclosed_breakdown) : ''}
          ${signal.referenced_market && signal.referenced_market.available ? renderReferencedMarket(signal.referenced_market) : ''}
          <article><span>02 · 对决策的影响</span><strong>${C.escapeHtml(signal.inference)}</strong><small>反方：${C.escapeHtml(signal.counter_thesis)}</small></article>
          <article><span>03 · 口径限制与未知</span><strong>覆盖率为定位性估算，非精确市场份额。</strong><small>未知：${C.escapeHtml(signal.unknowns.join('；'))}</small></article>
          <article><span>04 · 下一步</span><strong>${C.escapeHtml(signal.action)}</strong></article>
        </div>
      </section>`;
    }
    return `<section class="${dockClass}" id="decision-dock" aria-labelledby="decision-dock-title">
      <header><div><span class="eyebrow">${eyebrow}</span><h2 id="decision-dock-title">决策坞 · ${C.escapeHtml(signal.title)}</h2></div><button type="button" class="quiet-button" id="closeDecisionDock">收起</button></header>
      <div class="decision-spine">
        <article><span>01 · 历史事实</span><strong>${C.escapeHtml(signal.fact)}</strong>${hasEvidence ? `<button type="button" id="openSignalEvidence">查看 ${signal.evidence_deal_ids.length} 笔证据</button>` : '<small class="dock-no-evidence">此信号无披露交易证据</small>'}</article>
        <article><span>02 · 投资解释</span><strong>${C.escapeHtml(signal.inference)}</strong><small>反方：${C.escapeHtml(signal.counter_thesis)}</small></article>
        <article><span>03 · 12–36M 条件情景</span><strong>只在可验证触发条件下形成 Bull / Base / Bear，不给未经校准的单点概率。</strong><small>未知：${C.escapeHtml(signal.unknowns.join('；'))}</small></article>
        <article><span>04 · 资产行动</span><strong>${C.escapeHtml(signal.action)}</strong><button type="button" id="openFullThesis">打开完整 Thesis</button></article>
      </div>
    </section>`;
  }

  function renderConviction(result) {
    if (!result.conviction) return '';
    return `<div class="conviction-grid" aria-label="可拆解 Conviction">${result.conviction.map(item => `<article>
      <span>${C.escapeHtml(item.dimension)}</span><strong>${C.escapeHtml(item.rating)}</strong><p>${C.escapeHtml(item.evidence)}</p>
    </article>`).join('')}</div>`;
  }

  function renderThesisComparables(result) {
    if (!result.comparable_ids.length) return '';
    const rows = result.comparable_ids.map(id => {
      const deal = T.deals.find(item => item.deal_id === id);
      const econ = economics.get(id);
      const type = result.direct_comparable_ids.includes(id) ? 'Direct' : 'Adjacent';
      return `<tr><td><span class="tag ${type === 'Direct' ? 'tag-verified' : 'tag-partial'}">${type}</span></td><td><strong>${C.escapeHtml(deal.asset_name)}</strong><span>${C.escapeHtml(deal.target)}</span></td><td>${C.escapeHtml(deal.buyer_or_partner)}</td><td>${C.escapeHtml(deal.stage_at_announcement)}</td><td class="numeric">${C.formatMoney(econ && econ.has_upfront_disclosure ? econ.upfront : null)}</td><td><button type="button" data-open-evidence="${id}">证据</button></td></tr>`;
    }).join('');
    return `<section class="thesis-comparables"><header><div><span class="eyebrow">可比证据集 · COMPARABLE EVIDENCE SET</span><h2>可比交易证据集</h2></div><span>${result.direct_comparable_ids.length} ${glossary('Direct Comp', 'Direct')} · ${result.adjacent_comparable_ids.length} Adjacent</span></header>
      <div class="compact-table-wrap"><table class="compact-table"><thead><tr><th>Comp</th><th>Asset / Target</th><th>Buyer</th><th>Stage</th><th>Upfront</th><th>Lineage</th></tr></thead><tbody>${rows}</tbody></table></div>
    </section>`;
  }

  function renderActiveFilterChips() {
    const labels = {
      year: '时间', type: '类型', stage: '阶段', origin: '来源', modality: '模态',
      target: '靶点', rights: '权益', buyer: '买方',
    };
    const active = Object.entries(state.filters).filter(([, value]) => value !== 'all');
    return `<div class="active-filter-chips" id="active-filter-chips" aria-label="当前筛选">
      ${active.length ? active.map(([key, value]) => `<button type="button" data-clear-filter="${key}">${labels[key]}：${C.escapeHtml(value)} <span aria-hidden="true">×</span></button>`).join('') : '<span>全部披露交易</span>'}
    </div>`;
  }

  // 术语即时展开（inline glossary）：面向合伙人降低理解成本——专业术语带虚线下划线，
  // 悬停/点击就地弹出一句白话解释，不跳走、不打断阅读。借鉴可交互论文的 inline glossary。
  const GLOSSARY = {
    'reconciliation': '核对：同一笔交易在不同来源口径不一致时，逐字段比对、留痕并给出取舍结论，而不是静默覆盖。',
    'release gate': '发布门槛：一条结论要对外展示前必须过的检查（来源、覆盖、口径）；没过就诚实标 Blocked，不硬发。',
    '证据门控': '证据门控：没有已验证的可比 cohort 就拒绝生成结论（BLOCKED），绝不为了好看硬编一个答案。',
    'Evidence Gate': '证据门控：没有已验证的可比 cohort 就拒绝生成结论（BLOCKED），绝不为了好看硬编一个答案。',
    'BLOCKED': 'Blocked：数据或证据不足以支撑该结论，系统显式留白并写明还缺哪条数据线，而非编个估算值。',
    '非或有': '非或有付款：签约即基本确定要付的钱（首付 + 其他确定性对价），区别于要达成里程碑才付的“或有”金额。',
    'Upfront': '首付款：签约时立即支付的现金，是买方确定性承诺里最硬的部分。',
    '里程碑': '里程碑付款：只有在达成研发/监管/销售等约定节点后才触发的“或有”付款，不一定兑现。',
    'CVR': 'CVR（或有价值权利）：并购里“若未来达成某条件再补付”的凭证，属或有对价，不计入确定性现金。',
    'Named cohort': '具名队列：一组有明确出处、可逐笔追溯的真实交易，用作分析的可比样本（区别于估算的匿名总量）。',
    'T0': 'T0 一手来源：交易当事方或交易所/监管的原始披露（PR、公告、财报），证据等级最高。',
    'T1': 'T1 来源：带可核验一手出处的第三方转述（如医药魔方引用上市公司公告）；出处被追溯确认后方可用。',
    'ontology': '本体：把交易、资产、靶点、条款、来源等实体及其关系结构化的模型，是“底层数据如何变成结论”的骨架。',
    '本体': '本体：把交易、资产、靶点、条款、来源等实体及其关系结构化的模型，是“底层数据如何变成结论”的骨架。',
    'ADC': 'ADC（抗体偶联药物）：把细胞毒药物用连接子挂到抗体上、精准递送到肿瘤细胞的一类技术模态。',
    'Direct Comp': '直接可比：模态、靶点、阶段等关键维度足够接近、可用于估值锚定的同类交易。',
  };
  function glossary(term, label) {
    const def = GLOSSARY[term];
    if (!def) return C.escapeHtml(label || term);
    return `<abbr class="glossary-term" tabindex="0" role="button" aria-label="${C.escapeHtml(term)}：${C.escapeHtml(def)}" data-glossary="${C.escapeHtml(def)}">${C.escapeHtml(label || term)}</abbr>`;
  }

    return wrap('');
  }

  function ontologyGraphType(entityId) {
    // 三个子图谱着色：药物研发 / 机构关系 / 证据溯源
    const drug = ['E-06', 'E-07', 'E-17', 'E-11', 'E-19']; // Asset/Target/Modality/Trial/DealAsset
    const org = ['E-05', 'E-18', 'E-09', 'E-10', 'E-13']; // Org/DealParty/Deal/Term/BuyerProfile
    const evidence = ['E-01', 'E-02', 'E-03', 'E-04', 'E-12', 'E-20', 'E-21']; // Source*/FieldEvidence/Observation/Reconciliation
    if (drug.includes(entityId)) return 'drug';
    if (org.includes(entityId)) return 'org';
    if (evidence.includes(entityId)) return 'evidence';
    return 'core';
  }
